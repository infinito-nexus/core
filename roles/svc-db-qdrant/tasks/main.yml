---
- include_tasks: 01_core.yml
  when: run_once_svc_db_qdrant is not defined
  vars:
    application_id: svc-db-qdrant

- include_tasks: utils/load_handlers.yml
  # Necessary because docker handlers are overwritten by condition
  vars:
    handler_role_name: "sys-svc-compose"

- name: "🎬 Initialize dedicated collection namespace"
  include_tasks: 02_init.yml
  when: database_init | bool
