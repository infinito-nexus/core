---
- include_tasks: utils/once/flag.yml

- name: "🔧 Setup container network for {{ application_id }}"
  include_tasks: "{{ lookup('path_absolute', 'roles/sys-svc-compose/tasks/utils/network/routine.yml') }}"
  vars:
    compose_handlers_flush: true
    application_id: "svc-db-elasticsearch"
    database_consumer_id: "svc-db-elasticsearch"

- name: "⏳ ELASTICSEARCH | Wait until container is running (not restarting)"
  ansible.builtin.shell: >
    container inspect --format '{{ "{{.State.Status}}" }} {{ "{{.State.Restarting}}" }}' {{ ELASTICSEARCH_CONTAINER_ADDRESS }}
  register: es_state
  retries: 120
  delay: 2
  until: >
    (es_state.stdout is search('running')) and
    (es_state.stdout is not search('true'))
  changed_when: false

- name: "✅ ELASTICSEARCH | Confirm cluster answers (HTTP API)"
  ansible.builtin.shell: >
    {{ ELASTICSEARCH_EXEC_SHELL }}
    '{{ 30 | curl }} -fS -u "elastic:$ELASTIC_PW"
    "{{ ELASTICSEARCH_API_BASE }}/_cluster/health?wait_for_status=yellow&timeout=5s" >/dev/null'
  register: es_health_ready
  retries: 60
  delay: 5
  until: es_health_ready.rc == 0
  changed_when: false
  no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"
