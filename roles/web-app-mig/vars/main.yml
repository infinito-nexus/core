---
# General
application_id: "web-app-mig"
entity_name: "{{ application_id | get_entity_name }}"

# Container port from config
container_port: "{{ lookup('config', application_id, 'services.' ~ entity_name ~ '.ports.internal.http') }}"

MIG_CONTAINER: "{{ lookup('config', application_id, 'services.' ~ entity_name ~ '.name') }}"
