---
# General
application_id: "web-app-postmarks"

container_port: "{{ lookup('config', application_id, 'services.postmarks.ports.internal.http') }}"
domain: "{{ container_hostname }}"
http_port: "{{ lookup('config', application_id, 'services.postmarks.ports.local.http') }}"
container_hostname: "{{ lookup('domain', application_id) }}"

POSTMARKS_CONTAINER: "{{ lookup('config', application_id, 'services.postmarks.name') }}"

POSTMARKS_REPO_URL: "{{ lookup('config', application_id, 'services.postmarks.repository') }}"
POSTMARKS_REF: "{{ lookup('config', application_id, 'services.postmarks.ref') }}"

POSTMARKS_SSO_PROXY_GATED: "{{ lookup('sso', application_id, 'is_proxy_gated') }}"
POSTMARKS_SSO_ADMIN_GROUP: "/{{ lookup('rbac_group_path', application_id=application_id, role='administrator') }}"
