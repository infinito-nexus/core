---
- name: "📂 Include role sys-stk-front-proxy for {{ application_id }}"
  include_role:
    name: sys-stk-front-proxy
  loop: "{{ WORDPRESS_DOMAINS }}"
  loop_control:
    loop_var: domain
  vars:
    webserver_extra_configuration: "client_max_body_size {{ WORDPRESS_MAX_UPLOAD_SIZE }};"
    http_port: "{{ lookup('config', application_id, 'services.wordpress.ports.local.http') }}"

- name: "🧩 load docker and db for {{ application_id }}"
  include_role:
    name: sys-stk-backend
  vars:
    compose_handlers_flush: false

- name: "⬆️ Transfering upload.ini to {{ WORDPRESS_CONFIG_UPLD_ABS }}"
  stack_host_template:
    src: upload.ini.j2
    dest: "{{ WORDPRESS_CONFIG_UPLD_ABS }}"
  notify:
    - compose up
    - compose build

- name: "📧 Transfering msmtprc to {{ WORDPRESS_MSMTP_ABS }}"
  stack_host_template:
    src: "{{ WORDPRESS_MSMTP_SRC }}"
    dest: "{{ WORDPRESS_MSMTP_ABS }}"
  notify: compose up

- name: 🚿 Flush handlers to make {{ WORDPRESS_CONFIG_FILE }} available before patch
  meta: flush_handlers

- name: "🖥️ WordPress stack-host post-deploy (container exec, plugin install, domain ops)"
  include_tasks: 07_manager_ops.yml
  when: IS_STACK_HOST | bool
