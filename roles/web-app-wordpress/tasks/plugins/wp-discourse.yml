---
- name: Wait for Discourse API
  wait_for:
    host: "{{ lookup('domain','web-app-discourse') }}"
    port: 80
    delay: 5
    timeout: 600

- name: "WP Discourse: stack-host container ops against Discourse"
  include_tasks: wp-discourse-stack-host.yml
  when: IS_STACK_HOST | bool

- name: "Load WP Discourse settings"
  include_vars:
    file: "{{ role_path }}/vars/discourse.yml"

- name: "Install WP Discourse plugin"
  command: >
    {{ BIN_COMPOSE }} exec -u www-data -T application
      wp plugin install wp-discourse --activate
      --path={{ WORDPRESS_DOCKER_HTML_PATH }}
  args:
    chdir: "{{ lookup('container', application_id, 'directories.instance') }}"

- name: "Configure WP Discourse settings"
  loop: "{{ discourse_settings | map(attribute='name') | unique | list }}"
  loop_control:
    label: "{{ item }}"
  vars:
    option_name: "{{ item }}"

    option_items: >-
      {{ discourse_settings
         | selectattr('name', 'equalto', option_name)
         | list
      }}

    option_kv: >-
      {{ dict(
           option_items | map(attribute='key')
           | zip(option_items | map(attribute='value'))
         ) }}

    option_json_b64: "{{ option_kv | to_json | b64encode }}"

  command: >
    {{ BIN_COMPOSE }} exec -u www-data -T application bash -lc
      "wp eval \"update_option(
         '{{ option_name }}',
         json_decode(
           base64_decode('{{ option_json_b64 }}'),
           true
         )
       );\" --path={{ WORDPRESS_DOCKER_HTML_PATH }}"
  args:
    chdir: "{{ lookup('container', application_id, 'directories.instance') }}"
