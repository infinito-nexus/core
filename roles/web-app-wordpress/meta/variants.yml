---
# Matrix-deploy variant overrides for this role.
# verification). Variant 0 keeps the canonical Single-Site flow;
# variant 1 flips the role into Multisite mode against three canonical
# domains so the Multisite Playwright scenarios run against a live
# network. The development deploy wrapper purges the WordPress entities
# between rounds whenever the variant changes, so Single-Site state
# cannot bleed into the Multisite run.
# See docs/contributing/artefact/files/role/variants.md for the file format.

# variant 0: canonical Single-Site deploy.

- services:
    container_backup:
      enabled: true
    css:
      enabled: true
      shared: true
    discourse:
      enabled: true
      shared: true
    dashboard:
      enabled: true
      shared: true
    logout:
      enabled: true
      shared: true
    mariadb:
      shared: true
    matomo:
      enabled: true
      shared: true
    sso:
      enabled: true
      shared: true
    prometheus:
      enabled: true
      shared: true
- services:
    container_backup:
      enabled: false
      shared: false # nocheck: variants-static-override backup shared stays literally true
    wordpress:
      multisite:
        enabled: true
    css:
      enabled: false
      shared: false # nocheck: variants-static-override backup shared stays literally true
    discourse:
      enabled: false
      shared: false # nocheck: variants-static-override backup shared stays literally true
    dashboard:
      enabled: false
      shared: false # nocheck: variants-static-override backup shared stays literally true
    logout:
      enabled: false
      shared: false # nocheck: variants-static-override backup shared stays literally true
    mariadb:
      shared: false # nocheck: variants-static-override backup shared stays literally true
    matomo:
      enabled: false
      shared: false # nocheck: variants-static-override backup shared stays literally true
    sso:
      enabled: false
      shared: false # nocheck: variants-static-override backup shared stays literally true
    prometheus:
      enabled: false
      shared: false # nocheck: variants-static-override backup shared stays literally true
  server:
    domains:
      canonical:
        - blog.{{ DOMAIN_PRIMARY }}
        - biberblog.{{ DOMAIN_PRIMARY }}
        - biber.blog.{{ DOMAIN_PRIMARY }}
