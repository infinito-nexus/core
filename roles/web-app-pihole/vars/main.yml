---
# General
application_id: "web-app-pihole"
entity_name: "{{ application_id | get_entity_name }}"
domain: "{{ lookup('domain', application_id) }}"

PIHOLE_CONTAINER: "{{ entity_name }}"
PIHOLE_UPSTREAM_DNS: "{{ lookup('config', application_id, 'services.pihole.upstream_dns') | join(';') }}"
PIHOLE_TIMEZONE: "{{ HOST_TIMEZONE }}"

PIHOLE_OAUTH2_ENABLED: "{{ lookup('config', application_id, 'services.sso.enabled') | bool }}"
PIHOLE_PASSWORD: "{{ '' if PIHOLE_OAUTH2_ENABLED else lookup('users', 'administrator').password }}"
