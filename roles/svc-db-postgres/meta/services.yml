---
postgres:
  # nocheck: default-placement-manager  central RDBMS, single-node until multi-replica replication (streaming / logical) is in scope
  default_placement: manager
  bond: 1
  enabled: true
  shared: true
  image: postgis/postgis
  name: postgres
  version: 17-3.5
  min_storage: 10GB
  backup:
    database_routine: true
  cpus: "2.0"
  mem_reservation: 3g
  mem_limit: 6g
  pids_limit: 1024
  ports:
    local:
      postgres: 5432
    internal:
      postgres: 5432
  lifecycle: beta
