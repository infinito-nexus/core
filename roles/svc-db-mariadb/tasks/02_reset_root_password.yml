---
- name: "♻️ Root password reset | Refuse reset unless explicitly enabled"
  ansible.builtin.assert:
    that:
      - MARIADB_ALLOW_RESET_WITHOUT_PREVIOUS | bool
    fail_msg: >-
      MariaDB root password does not match the desired value, but an automated reset is disabled.
      Set MARIADB_ALLOW_RESET_WITHOUT_PREVIOUS=true to perform a recovery reset (downtime),
      or reset the password manually.
  changed_when: false

- name: "⏹️ Root password reset | Stop MariaDB compose container"
  ansible.builtin.command: "container stop {{ MARIADB_NAME }}"
  when: DEPLOYMENT_MODE == 'compose'
  changed_when: true

- name: "📏 Root password reset | Scale MariaDB swarm service to 0 replicas"
  ansible.builtin.command:
    cmd: >-
      docker service update --detach=false --replicas 0
      {{ MARIADB_SWARM_SERVICE }}
  delegate_to: "{{ STACK_HOST }}"
  run_once: true
  when: DEPLOYMENT_MODE == 'swarm'
  changed_when: true

- name: "⏳ Root password reset | Wait until MariaDB swarm task fully stops"
  ansible.builtin.shell: |
    set -euo pipefail
    running=$(docker service ps \
      --filter desired-state=running \
      --format '{{ "{{.ID}}" }}' \
      "{{ MARIADB_SWARM_SERVICE }}" | wc -l)
    test "$running" -eq 0
  args:
    executable: /bin/bash
  delegate_to: "{{ STACK_HOST }}"
  run_once: true
  register: _mariadb_stopped
  retries: 60
  delay: 2
  until: _mariadb_stopped is succeeded
  changed_when: false
  when: DEPLOYMENT_MODE == 'swarm'

- name: "🗑️ Root password reset | Remove stale recovery container from an aborted run"
  ansible.builtin.command: "container rm -f {{ MARIADB_RECOVERY_NAME }}"
  register: mariadb_recovery_stale_rm
  changed_when: mariadb_recovery_stale_rm.rc == 0
  failed_when: >-
    mariadb_recovery_stale_rm.rc != 0 and
    'No such container' not in (mariadb_recovery_stale_rm.stderr | default(''))
  delegate_to: "{{ STACK_HOST }}"
  run_once: true

- name: "▶️ Root password reset | Start recovery container (skip grants)"
  ansible.builtin.command:
    argv:
      - container
      - run
      - -d
      - --name
      - "{{ MARIADB_RECOVERY_NAME }}"
      - --restart
      - "no"
      - --network
      - none
      - -v
      - "{{ MARIADB_VOLUME }}:/var/lib/mysql"
      - "{{ MARIADB_RECOVERY_IMAGE }}"
      - mariadbd
      - --skip-grant-tables
      - --skip-networking
  delegate_to: "{{ STACK_HOST }}"
  run_once: true
  changed_when: true

- name: "⏳ Root password reset | Wait until recovery server is ready"
  ansible.builtin.command:
    argv:
      - container
      - exec
      - -i
      - "{{ MARIADB_RECOVERY_NAME }}" # nocheck: container-exec-resolver  recovery container is created by this role via container run, same name in both modes
      - mariadb
      - -uroot
    stdin: "{{ lookup('file', role_path ~ '/files/sql/health_probe.sql') }}"
  delegate_to: "{{ STACK_HOST }}"
  run_once: true
  register: mariadb_recovery_ready
  changed_when: false
  retries: 30
  delay: 2
  until: (mariadb_recovery_ready['rc'] | default(1)) == 0

- name: "🔧 Root password reset | Set new root password in recovery mode"
  ansible.builtin.command:
    argv:
      - container
      - exec
      - -i
      - "{{ MARIADB_RECOVERY_NAME }}" # nocheck: container-exec-resolver  recovery container is created by this role via container run, same name in both modes
      - mariadb
      - -uroot
    stdin: |
      SET @root_pwd := '{{ MARIADB_ROOT_PWD | replace("'", "''") }}';
      {{ lookup('file', role_path ~ '/files/sql/reset_root_password.sql') }}
  delegate_to: "{{ STACK_HOST }}"
  run_once: true
  register: mariadb_reset_root
  no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"
  changed_when: true
  failed_when: mariadb_reset_root.rc != 0

- name: "⏹️ Root password reset | Stop and remove recovery container"
  ansible.builtin.command: "container rm -f {{ MARIADB_RECOVERY_NAME }}"
  register: mariadb_recovery_rm
  delegate_to: "{{ STACK_HOST }}"
  run_once: true
  changed_when: mariadb_recovery_rm.rc == 0
  failed_when: >-
    mariadb_recovery_rm.rc != 0 and
    'No such container' not in (mariadb_recovery_rm.stderr | default(''))

- name: "▶️ Root password reset | Start MariaDB compose container again"
  ansible.builtin.command: "container start {{ MARIADB_NAME }}"
  when: DEPLOYMENT_MODE == 'compose'
  changed_when: true

- name: "📏 Root password reset | Scale MariaDB swarm service back to 1 replica"
  ansible.builtin.command:
    cmd: >-
      docker service update --detach=false --replicas 1
      {{ MARIADB_SWARM_SERVICE }}
  delegate_to: "{{ STACK_HOST }}"
  run_once: true
  when: DEPLOYMENT_MODE == 'swarm'
  changed_when: true
