---
- include_tasks: utils/once/flag.yml

- name: "Setup container network for {{ application_id }}"
  include_tasks: "{{ [playbook_dir, 'roles/sys-svc-compose/tasks/utils/network/routine.yml' ] | path_join }}"
  vars:
    compose_handlers_flush: true

- name: Install MySQL Python client library via pip
  include_role:
    name: sys-pip-install
  vars:
    package_name: PyMySQL
    package_state: present
    global_install: true
  when: MARIADB_EXPOSE_LOCAL | bool

- name: "[compose] Wait until the MariaDB container with hostname '{{ MARIADB_NAME }}' is running"
  community.docker.docker_container_info:
    name: "{{ MARIADB_NAME }}"
  register: db_info
  until:
    - db_info.container is defined
    - db_info.container is not none
    - db_info.container.State.Running
  retries: 30
  delay: 5
  when: >-
    DEPLOYMENT_MODE != 'swarm'
    or (service_is_stateful | default(false) | bool)

- block:
    - name: "[swarm] Wait until MariaDB task container is running and resolve its ID"
      ansible.builtin.script:
        cmd: "swarm_mariadb_cid.sh {{ application_id | get_entity_name }}"
      register: mariadb_swarm_cid
      changed_when: false
      retries: 60
      delay: 5
      until: mariadb_swarm_cid.rc == 0

    - name: "[swarm] Re-bind MARIADB_NAME to the resolved task container ID"
      ansible.builtin.set_fact:
        MARIADB_NAME: "{{ mariadb_swarm_cid.stdout }}"
  when:
    - DEPLOYMENT_MODE == 'swarm'
    - not (service_is_stateful | default(false) | bool)

- block:
    - name: "Root password reset | Check login with desired password (inside container)"
      ansible.builtin.command:
        argv: >-
          {{
            ['container', 'exec', '-i', MARIADB_NAME, 'mariadb']
            + (['-h127.0.0.1', '-P3306'] if MARIADB_EXPOSE_LOCAL else [])
            + ['-uroot', '-p' ~ MARIADB_ROOT_PWD]
          }}
        stdin: "{{ lookup('file', role_path ~ '/files/sql/health_probe.sql') }}"
      register: mariadb_login_desired
      no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"
      changed_when: false
      failed_when: false
      retries: 30
      delay: 5
      until: mariadb_login_desired.rc == 0

    - name: "Ensure MariaDB root password matches desired value"
      include_tasks: 03_reset_root_password.yml
      when:
        - mariadb_login_desired.rc != 0
        - DEPLOYMENT_MODE != 'swarm'

  when: MARIADB_ALLOW_RESET_WITHOUT_PREVIOUS | bool

- name: "Wait until MariaDB accepts root credentials (inside container)"
  ansible.builtin.command:
    argv: >-
      {{
        ['container', 'exec', '-i', MARIADB_NAME, 'mariadb']
        + (['-h127.0.0.1', '-P3306'] if MARIADB_EXPOSE_LOCAL else [])
        + ['-uroot', '-p' ~ MARIADB_ROOT_PWD]
      }}
    stdin: "{{ lookup('file', role_path ~ '/files/sql/health_probe.sql') }}"
  register: mariadb_cli
  no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"
  changed_when: false
  retries: 30
  delay: 5
  until: mariadb_cli.rc == 0

- name: "Wait until MariaDB accepts root credentials (via mysql_db)"
  community.mysql.mysql_db:
    name: "{{ MARIADB_HEALTHCHECK_DB }}"
    state: present
    login_user: root
    login_password: "{{ MARIADB_ROOT_PWD }}"
    login_host: "{{ MARIADB_HOST }}"
    login_port: "{{ MARIADB_PORT }}"
    config_file: ""
  register: mariadb_ready
  retries: 30
  delay: 5
  until: mariadb_ready is succeeded
  changed_when: false
  when: MARIADB_EXPOSE_LOCAL | bool
