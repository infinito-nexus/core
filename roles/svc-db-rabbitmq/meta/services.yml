---
rabbitmq:
  modes:
    compose:
      enabled: true
    swarm:
      enabled: true
  # nocheck: default-placement-manager  engine on-disk state (Mnesia message store + fsync/locking) cannot live on NFS, so the central engine is node-local in swarm
  placement: manager
  enabled: true
  shared: true
  bond: 1
  image: rabbitmq
  name: rabbitmq
  version: "4.3-management-alpine"
  min_storage: 5GB
  backup:
    database_routine: true
  cpus: "1.0"
  mem_reservation: 512m
  mem_limit: 1g
  pids_limit: 1024
  ports:
    local:
      rabbitmq: 5672
    internal:
      rabbitmq: 5672
  lifecycle: beta

# nocheck: playwright-service-flag, dynamic-flag infrastructure backup consumer
container_backup: # nocheck: bond-baseline backup host joins outside the variant topology
  bond: 1
  enabled: "{{ 'svc-bkp-volume-2-local' in group_names }}"
  shared: true
