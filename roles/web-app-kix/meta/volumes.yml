---
kix_db:
  type: volume
  name: kix_kix_db
  mounts:
    - service: kix-db
      target: /var/lib/postgresql/data

kix_shared:
  type: volume
  name: kix_kix_shared
  mounts:
    - service: kix-backend
      target: /mnt/shared
    - service: kix-frontend
      target: /mnt/shared

kix_backend:
  type: volume
  name: kix_kix_backend
  mounts:
    - service: kix-backend
      target: /mnt/data

kix_frontend:
  type: volume
  name: kix_kix_frontend
  mounts:
    - service: kix-frontend
      target: /mnt/data

auth_ldap:
  type: config
  source: "{{ [lookup('container', 'web-app-kix', 'directories.volumes'), 'auth_ldap.xml'] | path_join }}"
  mode: "0440"
  mounts:
    - service: kix-backend
      target: /opt/kix/Kernel/Config/Files/zzz_auth_ldap.xml
      when: "{{ lookup('config', 'web-app-kix', 'services.ldap.enabled') | bool }}"

proxy_nginx_conf:
  type: config
  source: "{{ [lookup('container', 'web-app-kix', 'directories.volumes'), 'kix-proxy.default.conf'] | path_join }}"
  mode: "0440"
  mounts:
    - service: kix-proxy
      target: /etc/nginx/conf.d/default.conf
