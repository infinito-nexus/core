---
application_id: "web-app-kix"
entity_name: "{{ application_id | get_entity_name }}"

KIX_PROXY_CONTAINER: "kix-proxy"
KIX_BACKEND_CONTAINER: "kix-backend"
KIX_FRONTEND_CONTAINER: "kix-frontend"
KIX_DB_CONTAINER: "kix-db"

KIX_DB_NAME: "kix"
KIX_DB_USER: "kix"
KIX_DB_PASSWORD: "{{ lookup('config', application_id, 'credentials.kix_db_password') }}"
KIX_INITIAL_ADMIN_PW: "{{ lookup('config', application_id, 'credentials.kix_initial_admin_pw') }}"

KIX_LDAP_ENABLED: "{{ lookup('config', application_id, 'services.ldap.enabled') | bool }}"
KIX_LDAP_HOST: "{{ LDAP.SERVER.DOMAIN }}"
KIX_LDAP_PORT: "{{ LDAP.SERVER.PORT }}"
KIX_LDAP_BASE_DN: "{{ LDAP.DN.OU.USERS }}"
KIX_LDAP_BIND_DN: "{{ LDAP.DN.ADMINISTRATOR.DATA }}"
KIX_LDAP_BIND_PW: "{{ LDAP.BIND_CREDENTIAL }}"
KIX_LDAP_UID_ATTR: "{{ LDAP.USER.ATTRIBUTES.ID }}"
KIX_LDAP_ADMINISTRATOR_GROUP_DN: "cn={{ application_id }}-administrator,{{ LDAP.DN.OU.ROLES }}"
KIX_LDAP_USER_GROUP_DN: "cn={{ application_id }}-user,{{ LDAP.DN.OU.ROLES }}"

KIX_AUTH_LDAP_HOST_PATH: "{{ lookup('container', application_id, 'directories.volumes') }}auth_ldap.xml"

KIX_PROXY_NGINX_HOST_PATH: "{{ lookup('container', application_id, 'directories.volumes') }}kix-proxy.default.conf"
