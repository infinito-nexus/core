---
# Mapping logic for baudolo CLI arguments
#
# - BKP_CONTAINER_2_LOCAL_DB_ROUTINE:       All service names where backup.database_routine is set (for --database-containers)
# - BKP_CONTAINER_2_LOCAL_NO_STOP_REQUIRED: All images where backup.no_stop_required is set (for --images-no-stop-required)
# - BKP_CONTAINER_2_LOCAL_DISABLED:         All images where backup.disabled is set (for --images-no-backup-required)
# CLI-ready variables render these lists as argument strings.

application_id: svc-bkp-container-2-local
system_service_id: "{{ application_id }}"

BKP_CONTAINER_2_LOCAL_BAUDOLO_BIN: "{{ lookup('command_path', 'baudolo') }}"

# Verify if DB seeding is enabled (kept compatible with your current variable scheme)
BKP_CONTAINER_2_LOCAL_DB_ENABLED: >-
  {{
    (database_type | default(false) | string | trim | lower)
    in ['1', 'true', 'yes', 'on', 'y', 't']
  }}

# Gather mapped values as lists
BKP_CONTAINER_2_LOCAL_DB_ROUTINE: >-
  {{ lookup('applications') | find_dock_val_by_bkp_entr('database_routine', 'name') }}

BKP_CONTAINER_2_LOCAL_NO_STOP_REQUIRED: >-
  {{ lookup('applications') | find_dock_val_by_bkp_entr('no_stop_required', 'image') }}

BKP_CONTAINER_2_LOCAL_DISABLED: >-
  {{ lookup('applications') | find_dock_val_by_bkp_entr('disabled', 'image') }}

# CLI argument strings (only set if list not empty)
BKP_CONTAINER_2_LOCAL_DB_ROUTINE_CLI: >-
  {% if BKP_CONTAINER_2_LOCAL_DB_ROUTINE | length > 0 -%}
    --database-containers {{ BKP_CONTAINER_2_LOCAL_DB_ROUTINE | join(' ') }}
  {%- endif %}

BKP_CONTAINER_2_LOCAL_NO_STOP_REQUIRED_CLI: >-
  {% if BKP_CONTAINER_2_LOCAL_NO_STOP_REQUIRED | length > 0 -%}
    --images-no-stop-required {{ BKP_CONTAINER_2_LOCAL_NO_STOP_REQUIRED | join(' ') }}
  {%- endif %}

BKP_CONTAINER_2_LOCAL_DISABLED_CLI: >-
  {% if BKP_CONTAINER_2_LOCAL_DISABLED | length > 0 -%}
    --images-no-backup-required {{ BKP_CONTAINER_2_LOCAL_DISABLED | join(' ') }}
  {%- endif %}

# List of CLI args for convenience (e.g. for looping or joining)
BKP_CONTAINER_2_LOCAL_CLI_ARGS_LIST:
  - "{{ BKP_CONTAINER_2_LOCAL_DB_ROUTINE_CLI }}"
  - "{{ BKP_CONTAINER_2_LOCAL_NO_STOP_REQUIRED_CLI }}"
  - "{{ BKP_CONTAINER_2_LOCAL_DISABLED_CLI }}"

# Main baudolo command
BKP_CONTAINER_2_LOCAL_EXEC: >-
  {{ BKP_CONTAINER_2_LOCAL_BAUDOLO_BIN }}
  --compose-dir {{ DIR_COMPOSITIONS }}
  --databases-csv {{ FILE_DATABASE_SECRETS }}
  --backups-dir {{ DIR_BACKUPS }}
  --dump-only
  {{ BKP_CONTAINER_2_LOCAL_CLI_ARGS_LIST | select('string') | join(' ') }}
