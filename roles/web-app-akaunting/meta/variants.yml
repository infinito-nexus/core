---
# Matrix-deploy variant overrides. Both auth-flow
# variants ride the same the `web-app-keycloak` SSO-proxy sidecar (flavor: oauth2) sidecar in front of
# the Akaunting web UI.

# variant 0: OIDC variant (canonical default).

- services:
    container_backup:
      enabled: true
    dashboard:
      enabled: true
      shared: true
    email:
      enabled: true
      shared: true
    logout:
      enabled: true
      shared: true
    mariadb:
      shared: true
    redis:
      shared: true
    matomo:
      enabled: true
      shared: true
    sso:
      enabled: true
      shared: true
    prometheus:
      enabled: true
      shared: true
    css:
      enabled: true
      shared: true
    seaweedfs:
      enabled: true
      shared: true
- services:
    container_backup:
      enabled: false
      shared: false # nocheck: variants-static-override backup shared stays literally true
    dashboard:
      enabled: false
      shared: false # nocheck: variants-static-override backup shared stays literally true
    email:
      enabled: false
      shared: false # nocheck: variants-static-override backup shared stays literally true
    logout:
      enabled: false
      shared: false # nocheck: variants-static-override backup shared stays literally true
    mariadb:
      shared: false # nocheck: variants-static-override backup shared stays literally true
    redis:
      shared: false # nocheck: variants-static-override backup shared stays literally true
    matomo:
      enabled: false
      shared: false # nocheck: variants-static-override backup shared stays literally true
    sso:
      enabled: false
      shared: false # nocheck: variants-static-override backup shared stays literally true
    prometheus:
      enabled: false
      shared: false # nocheck: variants-static-override backup shared stays literally true
    css:
      enabled: false
      shared: false # nocheck: variants-static-override backup shared stays literally true
    seaweedfs:
      enabled: false
      shared: false # nocheck: variants-static-override backup shared stays literally true
