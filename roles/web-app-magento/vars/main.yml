---
application_id: "web-app-magento"

MAGENTO_VOLUME: "{{ lookup('volume', application_id, 'data').name }}"
MAGENTO_USER: "app"

MAGENTO_DOMAIN: "{{ lookup('domain',application_id) }}"
MAGENTO_URL: "{{ lookup('tls', application_id, 'url.base') }}"

MAGENTO_NGINX_DIR: "{{ [ lookup('container', application_id, 'directories.config'), 'nginx' ] | path_join }}"
MAGENTO_PHP_DIR: "{{ [ lookup('container', application_id, 'directories.config'), 'php' ]   | path_join }}"
MAGENTO_NGINX_CONF_PATH: "{{ [ MAGENTO_NGINX_DIR, 'nginx.conf' ] | path_join }}"
MAGENTO_PHP_ZZ_CONF_PATH: "{{ [ MAGENTO_PHP_DIR, 'php-fpm-zz-docker.conf' ] | path_join }}"

MAGENTO_PHP_HOST: "php"
MAGENTO_PHP_PORT: 9000
MAGENTO_NGINX_PORT: 8000

MAGENTO_SEARCH_CONTAINER: "{{ lookup('config', application_id, 'services.search.name') }}"

MAGENTO_PHP_CONTAINER: "{{ lookup('config', application_id, 'services.php.name') }}"
MAGENTO_PHP_CONTAINER_ADDRESS: "{{ lookup('container_address', application_id, 'php') }}"

MAGENTO_NGINX_CONTAINER: "{{ lookup('config', application_id, 'services.nginx.name') }}"

MAGENTO_REPO_PUBLIC_KEY: "{{ lookup('config', application_id, 'credentials.adobe_public_key') }}"
MAGENTO_REPO_PRIVATE_KEY: "{{ lookup('config', application_id, 'credentials.adobe_private_key') }}"
