---
- name: "⏳ Wait until Mailu antispam container is up"
  block:
    - name: "🔍 Probe Mailu antispam"
      ansible.builtin.shell: >
        container exec -i {{ MAILU_ANTISPAM_CONTAINER_ADDRESS }} true
      register: mailu_antispam_check
      retries: 30
      delay: 5
      until: mailu_antispam_check.rc == 0
      changed_when: false

  rescue:
    - block:
        - name: "📊 Collect Mailu antispam container logs after readiness timeout"
          ansible.builtin.shell: >
            container logs --tail=300 {{ MAILU_ANTISPAM_CONTAINER_ADDRESS }}
          register: mailu_antispam_logs
          changed_when: false
      always:
        - name: "🛑 Fail: Mailu antispam not ready"
          ansible.builtin.fail:
            msg: |
              Mailu antispam container did not become ready in time.

              Last stderr:
              {{ mailu_antispam_check.stderr | default('') }}

              --- Mailu antispam container logs (last 300 lines) ---
              {{ mailu_antispam_logs.stdout | default('No logs available') }}
