---
application_id: "web-app-mailu"
http_port: "{{ lookup('config', application_id, 'services.mailu.ports.local.http') }}"
database_password: "{{ lookup('config', application_id, 'credentials.database_password') }}"
MAILU_VOLUMES_DIR: "{{ lookup('container', application_id, 'directories.volumes') }}"
MAILU_INSTANCE_DIR: "{{ lookup('container', application_id, 'directories.instance') }}"
MAILU_OVERRIDES_DIR: "{{ [ MAILU_VOLUMES_DIR, 'overrides' ] | path_join }}"
MAILU_CERTS_HOST_DIR: "{{ [ MAILU_VOLUMES_DIR, 'certs' ] | path_join }}"
MAILU_WEBSITE: "{{ lookup('tls', application_id, 'url.base') }}"
MAILU_API_SERVICE_BASE_URL: "http://localhost:8080/api/v1"
MAILU_DOMAIN: "{{ lookup('config', application_id, 'services.mailu.domain') }}"
MAILU_DOMAIN_DNS_ZONE: "{{ MAILU_DOMAIN | to_zone }}"
MAILU_EMAIL: "{{ lookup('email', application_id) }}"
MAILU_HOSTNAME: "{{ MAILU_EMAIL.host }}"
# Exception: the vhost this instance is actually served under — mail. when
# active MAIL_PROVIDER, legacy-mail. otherwise (see meta/server.yml).
# MAILU_HOSTNAME stays the mail identity (MX/SPF/PTR) and may belong to the
# active provider.
MAILU_CANONICAL_HOST: "{{ lookup('domain', application_id) }}"
MAILU_ACTIVE_PROVIDER: "{{ MAIL_PROVIDER == application_id }}"
# Exception: legacy instances terminate TLS at the proxy only — no public mail
# ports, no own cert stack (the shared cert-deploy unit belongs to the active
# provider).
MAILU_TLS_FLAVOR: "{{ (MAILU_EMAIL.tls and MAILU_ACTIVE_PROVIDER | bool) | ternary('mail', 'notls') }}"
MAILU_HOSTNAME_DNS_ZONE: "{{ MAILU_HOSTNAME | to_zone }}"
MAILU_VERSION: "{{ lookup('config', application_id, 'services.mailu.version') }}"
MAILU_PORTS: "{{ lookup('config', application_id, 'services.mailu.ports.internal') }}"
MAILU_FRONT_CONTAINER_ADDRESS: "{{ lookup('container_address', application_id, 'front') }}"
MAILU_ADMIN_CONTAINER_ADDRESS: "{{ lookup('container_address', application_id, 'admin') }}"
MAILU_IMAP_CONTAINER_ADDRESS: "{{ lookup('container_address', application_id, 'imap') }}"
MAILU_SMTP_CONTAINER_ADDRESS: "{{ lookup('container_address', application_id, 'smtp') }}"
MAILU_OLETOOLS_CONTAINER_ADDRESS: "{{ lookup('container_address', application_id, 'oletools') }}"
MAILU_ANTISPAM_CONTAINER_ADDRESS: "{{ lookup('container_address', application_id, 'antispam') }}"
MAILU_ANTIVIRUS_CONTAINER_ADDRESS: "{{ lookup('container_address', application_id, 'antivirus') }}"
MAILU_WEBDAV_CONTAINER_ADDRESS: "{{ lookup('container_address', application_id, 'webdav') }}"
MAILU_FETCHMAIL_CONTAINER_ADDRESS: "{{ lookup('container_address', application_id, 'fetchmail') }}"
MAILU_WEBMAIL_CONTAINER_ADDRESS: "{{ lookup('container_address', application_id, 'webmail') }}"
MAILU_REDIS_CONTAINER_ADDRESS: "{{ lookup('container_address', application_id, 'redis') }}"
MAILU_FRONT_SERVICE: "front"
MAILU_SMTP_QUEUE_VOLUME: "{{ lookup('volume', application_id, 'smtp_queue').name }}"
MAILU_ADMIN_DATA_VOLUME: "{{ lookup('volume', application_id, 'admin_data').name }}"
MAILU_FILTER_VOLUME: "{{ lookup('volume', application_id, 'filter').name }}"
MAILU_DKIM_VOLUME: "{{ lookup('volume', application_id, 'dkim').name }}"
MAILU_DOVECOT_MAIL_VOLUME: "{{ lookup('volume', application_id, 'dovecot_mail').name }}"
MAILU_DNS_RESOLVER: "{{ lookup('config', 'svc-dns-unbound', 'networks.local.dns_resolver') }}"
MAILU_SWARM_DB_HOST: "{{ lookup('database', application_id, 'host') }}"
MAILU_SWARM_DB_ENGINE: "{{ lookup('database', application_id, 'type') }}"
MAILU_SWARM_REDIS_HOST: "{{ lookup('engine', 'redis', application_id, 'host') }}"
MAILU_IP4_PUBLIC: "{{ DOCKER_PUBLIC_BIND_HOST }}"
MAILU_IP6_PUBLIC: ""
MAILU_SUBNET: "{{ lookup('config', 'web-app-mailu', 'networks.local.subnet') }}"
MAILU_SECRET_KEY: "{{ lookup('config', application_id, 'credentials.secret_key') }}"
MAILU_API_TOKEN: "{{ lookup('config', application_id, 'credentials.api_token') }}"
MAILU_OIDC_HOST: "{{ lookup('domain','web-app-keycloak') }}"
MAILU_OIDC_ENABLED: "{{ lookup('config', application_id, 'services.sso.enabled') }}"
MAILU_OIDC_EMAIL_BY_USERNAME_ENABLED: "{{ lookup('config', application_id, 'services.sso.oidc.email_by_username') }}"
MAILU_OIDC_ENABLE_USER_CREATION: "{{ lookup('config', application_id, 'services.sso.oidc.enable_user_creation') | string | capitalize }}"
MAILU_DOCKER_FLAVOR: "{{ 'ghcr.io/heviat' if MAILU_OIDC_ENABLED | bool else 'ghcr.io/mailu' }}"
MAILU_DMARC_RUF: "{{ lookup('config', application_id, 'users.administrator.email') }}"
MAILU_DKIM_KEY_FILE: "{{ MAILU_DOMAIN }}.dkim.key"
MAILU_DKIM_KEY_PATH: "/dkim/{{ MAILU_DKIM_KEY_FILE }}"
MAILU_NGINX_HOST_DIR: "{{ [ MAILU_OVERRIDES_DIR, 'nginx' ] | path_join }}"
MAILU_RSPAMD_HOST_DIR: "{{ [ MAILU_OVERRIDES_DIR, 'rspamd' ] | path_join }}"
MAILU_RSPAMD_HOST_FILE: "{{ [ MAILU_RSPAMD_HOST_DIR,'ratelimit.conf' ] | path_join }}"
MAILU_RSPAMD_LIMITS_DEFAULTS:
  RATE: "30 / 1min"
  BURST: 50
MAILU_CLAMAV_DB_VOLUME: "{{ lookup('volume', application_id, 'clamav_db').name }}"
MAILU_WEBDAV_DATA_VOLUME: "{{ lookup('volume', application_id, 'webdav_data').name }}"
MAILU_WEBMAIL_DATA_VOLUME: "{{ lookup('volume', application_id, 'webmail_data').name }}"
