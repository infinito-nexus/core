---
# Install Odoo modules

- name: "🔨 Build list of modules to install"
  set_fact:
    odoo_modules_to_install: "{{ (ODOO_MODULES_CORE + ODOO_MODULES_OPTIONAL) | join(',') }}"

- name: "📦 Install core modules"
  shell: >
    container exec {{ ODOO_CONTAINER_ADDRESS }}
    odoo -i {{ odoo_modules_to_install }}
    -d {{ ODOO_DB_NAME }}
    --db_host {{ ODOO_DB_HOST }}
    --db_port {{ ODOO_DB_PORT }}
    --db_user {{ ODOO_DB_USER }}
    --db_password {{ ODOO_DB_PASSWORD | quote }}
    --stop-after-init
    --no-http
  register: module_install
  changed_when: "'loading' in module_install.stdout"
  failed_when: false
  when: odoo_modules_to_install | length > 0

- name: "🔄 Update installed modules"
  shell: >
    container exec {{ ODOO_CONTAINER_ADDRESS }}
    odoo -u all
    -d {{ ODOO_DB_NAME }}
    --db_host {{ ODOO_DB_HOST }}
    --db_port {{ ODOO_DB_PORT }}
    --db_user {{ ODOO_DB_USER }}
    --db_password {{ ODOO_DB_PASSWORD | quote }}
    --stop-after-init
    --no-http
  register: module_update
  changed_when: "'loading' in module_update.stdout"
  failed_when: false

- name: "📦 Install OIDC-related modules (auth_oauth + auth_signup + auth_oauth_https)"
  when: ODOO_OIDC_ENABLED | bool
  block:
    - name: "📦 Install auth_oauth module for OIDC support"
      shell: >
        container exec {{ ODOO_CONTAINER_ADDRESS }}
        odoo -i auth_oauth
        -d {{ ODOO_DB_NAME }}
        --db_host {{ ODOO_DB_HOST }}
        --db_port {{ ODOO_DB_PORT }}
        --db_user {{ ODOO_DB_USER }}
        --db_password {{ ODOO_DB_PASSWORD | quote }}
        --stop-after-init
        --no-http
      register: auth_oauth_install
      changed_when: "'loading' in auth_oauth_install.stdout"
      failed_when: false

    - name: "📦 Install auth_signup module for OAuth user auto-creation"
      shell: >
        container exec {{ ODOO_CONTAINER_ADDRESS }}
        odoo -i auth_signup
        -d {{ ODOO_DB_NAME }}
        --db_host {{ ODOO_DB_HOST }}
        --db_port {{ ODOO_DB_PORT }}
        --db_user {{ ODOO_DB_USER }}
        --db_password {{ ODOO_DB_PASSWORD | quote }}
        --stop-after-init
        --no-http
      register: auth_signup_install
      changed_when: "'loading' in auth_signup_install.stdout"
      failed_when: false

    - name: "📦 Install auth_oauth_https module for HTTPS redirect URI fix"
      shell: >
        container exec {{ ODOO_CONTAINER_ADDRESS }}
        odoo -i auth_oauth_https
        -d {{ ODOO_DB_NAME }}
        --db_host {{ ODOO_DB_HOST }}
        --db_port {{ ODOO_DB_PORT }}
        --db_user {{ ODOO_DB_USER }}
        --db_password {{ ODOO_DB_PASSWORD | quote }}
        --stop-after-init
        --no-http
      register: auth_oauth_https_install
      changed_when: "'loading' in auth_oauth_https_install.stdout"
      failed_when: false

- name: "📦 Install auth_ldap module for LDAP support"
  shell: >
    container exec {{ ODOO_CONTAINER_ADDRESS }}
    odoo -i auth_ldap
    -d {{ ODOO_DB_NAME }}
    --db_host {{ ODOO_DB_HOST }}
    --db_port {{ ODOO_DB_PORT }}
    --db_user {{ ODOO_DB_USER }}
    --db_password {{ ODOO_DB_PASSWORD | quote }}
    --stop-after-init
    --no-http
  register: auth_ldap_install
  changed_when: "'loading' in auth_ldap_install.stdout"
  failed_when: false
  when: ODOO_LDAP_ENABLED | bool
