---
- name: "🔨 Build list of modules to install"
  set_fact:
    odoo_modules_to_install: "{{ (ODOO_MODULES_CORE + ODOO_MODULES_OPTIONAL) | join(',') }}"

- name: "⏸️ Pause Odoo crons for the module install/update window"
  database_query:
    mask_values: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"
    config: "{{ lookup('database', application_id) }}"
    query_file: "{{ role_path }}/files/sql/update/ir-cron/pause.sql"
  changed_when: true

- name: "📦 Run module install/update with crons paused"
  block:
    - name: "📦 Load module operations"
      include_tasks: 02a_module_ops.yml
  always:
    - name: "▶️ Resume Odoo crons after the module window"
      database_query:
        mask_values: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"
        config: "{{ lookup('database', application_id) }}"
        query_file: "{{ role_path }}/files/sql/update/ir-cron/resume.sql"
      changed_when: true
