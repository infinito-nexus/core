---
# nocheck: dynamic-flag
# nocheck: logout
logout:
  enabled: false
  shared: false
# nocheck: dynamic-flag
# nocheck: oidc
# nocheck: sso
sso:
  enabled: false
  shared: false
dashboard:
  bond: 1
  enabled: "{{ 'web-app-dashboard' in group_names }}"
  shared: "{{ 'web-app-dashboard' in group_names }}"
matomo:
  bond: 1
  enabled: "{{ 'web-app-matomo' in group_names }}"
  shared: "{{ 'web-app-matomo' in group_names }}"
css:
  bond: 1
  enabled: "{{ 'web-svc-css' in group_names }}"
  shared: "{{ 'web-svc-css' in group_names }}"
# nocheck: dynamic-flag
javascript:
  bond: 1
  enabled: true
  shared: true
littlejs:
  modes:
    compose:
      enabled: true
    swarm:
      enabled: true
  repository: https://github.com/KilledByAPixel/LittleJS.git
  ref: main
  image: nginx
  version: alpine
  custom: true
  ports:
    local:
      http: 8063
    internal:
      http: 80
  run_after:
    - web-app-matomo
  lifecycle: alpha
  min_storage: 5GB
  cpus: "0.5"
  mem_reservation: 256m
  mem_limit: 1g
  pids_limit: 512
# nocheck: email
# nocheck: dynamic-flag
email:
  enabled: false
  shared: false
prometheus:
  bond: 1
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
