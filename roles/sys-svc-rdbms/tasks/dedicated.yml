---
- name: "✅ Ensure env dir exists: {{ _container_env_dir }}"
  ansible.builtin.file:
    path: "{{ _container_env_dir }}"
    state: directory
    mode: "0755"

- name: "📄 For '{{ application_id }}/{{ _database_consumer_id }}': Create env file"
  stack_host_template:
    src: "env/{{ _database_type }}.env.j2"
    dest: "{{ _database_env }}"
  notify: compose up

- name: "🔧 For '{{ application_id }}/{{ _database_consumer_id }}': Apply postgres setup"
  include_tasks: dedicated_postgres.yml
  when: _database_type == 'postgres'

# Exception: without this row baudolo has no credentials for the embedded
# sidecar, silently falls back to a FILE snapshot of the live database volume,
# and the restore drill replays a torn data dir (postgres PANICs on a missing
# checkpoint record). Mirrors the central-path seed in main.yml; the instance
# resolves to the consumer entity, matching baudolo's `<entity>-database`
# container-name derivation.
- name: "➕ For '{{ _database_consumer_id }}': Add Entry for Backup Procedure"
  include_tasks: "{{ lookup('path_absolute', 'roles/svc-bkp-volume-2-local/tasks/04_seed-database-to-backup.yml') }}"
  vars:
    database_consumer_id: "{{ _database_consumer_id }}"
    database_type: "{{ _database_type }}"
    database_instance: "{{ lookup('database', _database_consumer_id, 'instance') }}"
    database_host: "{{ lookup('database', _database_consumer_id, 'host') }}"
    database_port: "{{ lookup('database', _database_consumer_id, 'port') }}"
    database_name: "{{ lookup('database', _database_consumer_id, 'name') }}"
    database_username: "{{ lookup('database', _database_consumer_id, 'username') }}"
    database_password: "{{ lookup('database', _database_consumer_id, 'password') }}"
  when:
    - "'svc-bkp-volume-2-local' in group_names"
    - IS_STACK_HOST | bool
