---
- include_tasks: utils/once/flag.yml

- name: "Ensure {{ WAZUH_CERTS_DIR_HOST }} exists for the cert-generator bind mount"
  ansible.builtin.file:
    path: "{{ WAZUH_CERTS_DIR_HOST }}"
    state: directory
    mode: "0755"

- name: "Render node topology for wazuh-certs-generator"
  ansible.builtin.template:
    src: certs.yml.j2
    dest: "{{ WAZUH_CERTS_CONFIG_HOST }}"
    mode: "0644"
  notify: compose up

- name: "Render Wazuh config files bind-mounted into manager/indexer/dashboard"
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "{{ [ WAZUH_INSTANCE_DIR, item ] | path_join }}"
    mode: "0644"
  loop:
    - wazuh_manager.conf
    - wazuh.indexer.yml
    - internal_users.yml
    - config.yml
    - roles_mapping.yml
    - opensearch_dashboards.yml
    - wazuh.yml
  notify: compose up

# roles.yml has no Jinja substitutions (a fully static custom role
# definition), so it is a files/ + copy: asset rather than a templates/ +
# template: one.
- name: "Copy static Wazuh indexer roles.yml"
  ansible.builtin.copy:
    src: roles.yml
    dest: "{{ [ WAZUH_INSTANCE_DIR, 'roles.yml' ] | path_join }}"
    mode: "0644"
  notify: compose up

# vm.max_map_count is not namespaced by the Linux kernel, so setting it from
# inside a DinD sandbox would only affect the sandbox's own view, not the
# real host the outer dockerd runs on. Skip the host-level change there;
# there is no per-container fallback (Docker/runc rejects a `sysctls:`
# override for a non-namespaced param — confirmed empirically), so a DinD
# sandbox deploy may see the indexer fail to boot on an under-provisioned
# host, same as svc-runner's inotify tuning. No ignore_errors: a real host
# MUST accept this write, and a failure here means the indexer will fail to
# boot regardless.
- name: "Set vm.max_map_count for the Wazuh indexer (OpenSearch requirement)"
  ansible.posix.sysctl:
    name: vm.max_map_count
    value: "262144"
    state: present
    reload: true
    sysctl_file: "{{ WAZUH_SYSCTL_CONF }}"
  when: not (DOCKER_IN_CONTAINER | bool)

- name: "load docker for {{ application_id }}"
  include_role:
    name: sys-stk-backend
  vars:
    compose_handlers_flush: false

# The primary/metadata entity ("wazuh") carries no ports, so sys-stk-full
# (which derives http_port from services.<get_entity_name(role)>.ports.local.http)
# cannot be used here - it would resolve to an empty port. sys-stk-front-proxy
# is included directly instead, with http_port pointed explicitly at the
# console (dashboard) entity's port, following the same pattern
# web-app-bluesky uses for the same structural reason.
- name: "Include front proxy for {{ application_id }}"
  include_role:
    name: sys-stk-front-proxy
  vars:
    http_port: "{{ WAZUH_DASHBOARD_HTTP_PORT }}"

# securityadmin.sh (below) is what actually pushes this role's own
# credentials into the security index - it authenticates via the admin
# client certificate, not a username/password. Until it has run, the
# 'admin' user's real bcrypt hash is not guaranteed to be live, so this
# gate MUST NOT require our own admin password (confirmed against a live
# deploy: doing so is a chicken-and-egg deadlock that never resolves). A
# 401 proves the security plugin has loaded and is answering HTTPS
# requests, which is everything this gate needs before securityadmin.sh
# can run against it.
- name: "Wait for Wazuh indexer to answer HTTPS requests (security plugin loaded)"
  uri_retry:
    url: "{{ WAZUH_INDEXER_INTERNAL_API_URL }}/_cluster/health"
    method: GET
    validate_certs: false
    status_code: [200, 401]
  retries: 60
  delay: 5

- name: "Apply Wazuh indexer security config via securityadmin.sh"
  include_tasks: 02_securityadmin.yml

# Authoritative confirmation that securityadmin.sh actually landed: this is
# the first point where the role's own generated admin password is
# guaranteed to work, since it is this task that proves the just-applied
# internal_users.yml is live.
- name: "Confirm the role's own indexer admin credentials are live post-securityadmin.sh"
  uri_retry:
    url: "{{ WAZUH_INDEXER_INTERNAL_API_URL }}/_cluster/health"
    method: GET
    user: admin
    password: "{{ WAZUH_INDEXER_ADMIN_PASSWORD }}"
    force_basic_auth: true
    validate_certs: false
    status_code: 200
    return_content: true
  register: wazuh_indexer_health
  until: >-
    wazuh_indexer_health.json is defined and
    wazuh_indexer_health.json.status in ['green', 'yellow']
  retries: 30
  delay: 5
  no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"
