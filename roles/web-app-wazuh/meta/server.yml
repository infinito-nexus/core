---
domains:
  canonical:
    - wazuh.{{ DOMAIN_PRIMARY }}
  aliases: []
csp:
  # style-src-elem/style-src-attr unsafe-inline are NOT declared here: the
  # platform grants unsafe-inline to every style-src* directive by default
  # for every role (plugins/filter/csp_filters.py get_csp_flags), so an
  # explicit declaration here would be a no-op.
  flags:
    script-src-elem:
      unsafe-inline: true
      unsafe-eval: true
  # worker-src blob: is required for the OpenSearch Dashboards Dev Tools
  # console (Ace editor) to function: confirmed via reproducible live
  # testing (files/playwright/test-csp.js) that typing a query spawns a
  # Web Worker from a blob: URL, which the browser blocks without this
  # grant ("Creating a worker from 'blob:...' violates ... worker-src
  # 'self'"). This is a whitelist scheme grant, not a flags boolean:
  # get_csp_flags quotes its keys ('blob' is not valid CSP syntax for a
  # scheme source), while get_csp_whitelist appends list entries verbatim.
  whitelist:
    worker-src:
      - "blob:"
status_codes:
  default:
    - 200
    - 302
    - 401
    - 403
networks:
  local:
    subnet: 192.168.106.32/28
