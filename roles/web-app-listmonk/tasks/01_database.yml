---
- name: Check if listmonk schema is present (probe the 'subscribers' table)
  shell: '{{ LISTMONK_EXEC_DATABASE }} -c "\dt subscribers"'
  register: db_tables
  changed_when: false
  failed_when: false

- name: Determine Listmonk database state
  set_fact:
    listmonk_db_reachable: "{{ db_tables.rc == 0 }}"
    listmonk_db_empty: >-
      {{
        ('Did not find any relation' in (db_tables.stderr | default(''))) or
        ('Did not find any relation' in (db_tables.stdout | default(''))) or
        ('No matching relations found' in (db_tables.stderr | default(''))) or
        ('No matching relations found' in (db_tables.stdout | default('')))
      }}

- name: Abort if Listmonk database is not reachable
  fail:
    msg: |
      Listmonk database is not reachable.

      Container: {{ lookup('database', application_id, 'container') }}
      Database:  {{ lookup('database', application_id, 'name') }}

      Please ensure the shared PostgreSQL stack is running.
  when: not listmonk_db_reachable

- name: Wait for Listmonk task to converge before container exec
  ansible.builtin.include_tasks: "{{ [playbook_dir, 'roles/sys-svc-compose/tasks/utils/swarm/wait_converged.yml'] | path_join }}"
  vars:
    wait_service_key: "{{ LISTMONK_SERVICE }}"
    wait_retries: 600
    wait_delay: 2

- name: Run Listmonk initial database setup
  shell: |
    container exec -i {{ LISTMONK_CONTAINER_ADDRESS }} sh -c 'set -euo pipefail; yes | ./listmonk --install'
  register: listmonk_install
  notify: compose up
  changed_when: true
  failed_when: listmonk_install.rc not in [0, 141]
  when: listmonk_db_empty

- name: Run Listmonk DB/schema upgrade (non-interactive)
  shell: |
    container exec -i {{ LISTMONK_CONTAINER_ADDRESS }} sh -c 'set -euo pipefail; echo y | ./listmonk --upgrade'
  register: listmonk_upgrade
  changed_when: true
  failed_when: listmonk_upgrade.rc not in [0, 141]
  when:
    - listmonk_db_reachable
    - not listmonk_db_empty
