---
application_id: "web-app-listmonk"
entity_name: "{{ application_id | get_entity_name }}"
container_port: "{{ lookup('config', application_id, 'services.listmonk.ports.internal.http') }}"

LISTMONK_NAME: "{{ lookup('config', application_id, 'services.listmonk.name') }}"
LISTMONK_CONFIG_HOST: "{{ [ lookup('container', application_id, 'directories.config'),'config.toml' ] | path_join }}"
LISTMONK_OIDC_ENABLED: "{{ lookup('config', application_id, 'services.sso.enabled') }}"

LISTMONK_PUBLIC_API_ENABLED: "{{ lookup('config', application_id, 'services.listmonk.public_api_activated') }}"

LISTMONK_USER_SEND: "newsletter"
LISTMONK_USER_BOUNCE: "bounce"

LISTMONK_EXEC_DATABASE: "container exec -i {{ lookup('database', application_id, 'address') }} psql -U {{ lookup('database', application_id, 'username') }} -d {{
  lookup('database', application_id, 'name') }}"
LISTMONK_EMAIL: "{{ lookup('email', application_id) }}"

LISTMONK_SETTINGS:
  - key: "app.root_url"
    value: "\"{{ lookup('tls', application_id, 'url.base') }}\""

  - key: "app.notify_emails"
    value: "{{ [ lookup('users', 'administrator').email ] | to_json }}"

  - key: "security.oidc"
    value: >-
      {{ {
         "enabled": True,
         "client_id": OIDC.CLIENT.ID,
         "provider_url": OIDC.CLIENT.ISSUER_URL,
         "client_secret": OIDC.CLIENT.SECRET
      } | to_json }}
    condition: "{{ LISTMONK_OIDC_ENABLED | bool }}"

  - key: "security.enable_captcha"
    value: "true"

  - key: "security.captcha_key"
    value: "\"{{ lookup('config', application_id, 'credentials.hcaptcha.key') }}\""

  - key: "security.captcha_secret"
    value: "\"{{ lookup('config', application_id, 'credentials.hcaptcha.secret') }}\""

  - key: "smtp"
    value: >-
      {{ [
        {
          "host":            LISTMONK_EMAIL.host,
          "port":            LISTMONK_EMAIL.port,
          "enabled":         LISTMONK_EMAIL.smtp,
          "username":        lookup('users', LISTMONK_USER_SEND).email,
          "password":        lookup('users', LISTMONK_USER_SEND).password,
          "tls_type":        (
                                LISTMONK_EMAIL.tls
                                | ternary("TLS",
                                    LISTMONK_EMAIL.start_tls
                                      | ternary("STARTTLS","NONE")
                                  )
                              ),
          "email_headers":   [],
          "hello_hostname":  "",
          "max_conns":       10,
          "idle_timeout":    "15s",
          "wait_timeout":    "5s",
          "auth_protocol":   "login",
          "max_msg_retries": 2,
          "tls_skip_verify": false
        }
      ] | to_json }}
    condition: "{{ LISTMONK_EMAIL.smtp | bool }}"

  - key: "app.lang"
    value: '"{{ HOST_LL }}"'

  - key: "app.logo_url"
    value: '"{{ service_provider.platform.logo }}"'
    condition: "{{ service_provider.platform.logo | length > 0 }}"

  - key: "app.site_name"
    value: '"{{ service_provider.company.titel }} Mailing list"'

  - key: "bounce.enabled"
    value: "true"

  - key: "bounce.mailboxes"
    value: >-
      {{ [
        {
          "host":            LISTMONK_EMAIL.host,
          "port":            995,
          "type":            "pop",
          "uuid":            "471fd0e9-8c33-4e4a-9183-c4679699faca",
          "enabled":         true,
          "username":        lookup('users', LISTMONK_USER_BOUNCE).email,
          "password":        lookup('users', LISTMONK_USER_BOUNCE).get('tokens', {}).get(MAIL_PROVIDER, ''),
          "return_path":     lookup('users', LISTMONK_USER_BOUNCE).email,
          "tls_enabled":     LISTMONK_EMAIL.tls,
          "auth_protocol":   "userpass",
          "scan_interval":   "15m",
          "tls_skip_verify": false
        }
      ] | to_json }}

  - key: "app.from_email"
    value: '"{{ service_provider.company.titel }} Newsletter <{{ lookup(''users'', LISTMONK_USER_SEND).email }}>"'

  - key: "app.favicon_url"
    value: '"{{ service_provider.platform.favicon }}"'
    condition: "{{ service_provider.platform.favicon | length > 0 }}"

  - key: "app.check_updates"
    value: "true"

  - key: "app.enable_public_archive_rss_content"
    value: "true"

  - key: "upload.provider"
    value: '"s3"'
    condition: "{{ lookup('objstore', application_id, 'enabled') | bool }}"

  - key: "upload.s3.aws_access_key_id"
    value: "{{ lookup('objstore', application_id, 'access_key') | to_json }}"
    condition: "{{ lookup('objstore', application_id, 'enabled') | bool }}"

  - key: "upload.s3.aws_secret_access_key"
    value: "{{ lookup('objstore', application_id, 'secret_key') | to_json }}"
    condition: "{{ lookup('objstore', application_id, 'enabled') | bool }}"

  - key: "upload.s3.aws_default_region"
    value: "{{ lookup('objstore', application_id, 'region') | to_json }}"
    condition: "{{ lookup('objstore', application_id, 'enabled') | bool }}"

  - key: "upload.s3.bucket"
    value: "{{ lookup('objstore', application_id, 'bucket') | to_json }}"
    condition: "{{ lookup('objstore', application_id, 'enabled') | bool }}"

  - key: "upload.s3.url"
    value: "{{ lookup('objstore', application_id, 'url') | to_json }}"
    condition: "{{ lookup('objstore', application_id, 'enabled') | bool }}"

  - key: "upload.s3.public_url"
    value: "{{ lookup('objstore', application_id, 'public_url') | to_json }}"
    condition: "{{ lookup('objstore', application_id, 'enabled') | bool }}"

  - key: "upload.s3.bucket_type"
    value: '"public"'
    condition: "{{ lookup('objstore', application_id, 'enabled') | bool }}"
