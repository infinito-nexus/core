---
- name: "🔎 Find every role that declares frontend dependencies"
  ansible.builtin.find:
    paths: "{{ lookup('path_absolute', 'roles') }}"
    patterns: "package-lock.json"
    recurse: true
    depth: 3
  register: cdn_asset_locks
  delegate_to: localhost
  run_once: true

- name: "📁 Stage each deployed role's frontend manifests on the CDN host"
  ansible.builtin.include_tasks: utils/stage_manifest.yml
  loop: "{{ cdn_asset_locks.files }}"
  loop_control:
    loop_var: manifest
    label: "{{ manifest_role }}"
  vars:
    manifest_role: "{{ manifest.path | dirname | dirname | basename }}"
  when: manifest_role in groups

- name: "🛠️ npm ci each manifest and mirror it under {{ CDN_WEB_ROOT }}/npm"
  ansible.builtin.command:
    argv:
      - container
      - run
      - --rm
      - --network=host
      - -e
      - "CDN_WEB_ROOT=/cdn"
      - -e
      - "ROLES_DIR=/pkgsrc"
      - -v
      - "{{ CDN_WEB_ROOT }}:/cdn"
      - -v
      - "{{ CDN_ASSET_STAGE }}:/pkgsrc:ro"
      - -v
      - "{{ [ role_path, 'files', 'build_assets.sh' ] | path_join }}:/build_assets.sh:ro"
      - "{{ CDN_ASSET_BUILD_IMAGE }}"
      - sh
      - /build_assets.sh
  changed_when: true
  timeout: "{{ lookup('timeout', 600) | int }}"
