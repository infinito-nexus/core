---
- include_tasks: utils/once/flag.yml

- name: 📂 Include dependencies
  include_role:
    name: "{{ item }}"
  loop:
    - sys-stk-front-proxy
    - dev-git

- name: "📦 Mirror every deployed role's frontend dependencies into the CDN"
  include_tasks: 02_assets.yml
  when:
    - IS_STACK_HOST | bool
    - (CDN_FLAVOR | default('internal')) == 'internal'
