---
# nocheck: playwright-service-flag — CDN does not appear as a dashboard tile
# nocheck: dynamic-flag
dashboard:
  enabled: false
# nocheck: playwright-service-flag — self-provider
cdn:
  modes:
    host:
      enabled: true
  bond: 1
  enabled: true
  shared: true
  cpus: "0.2"
  mem_reservation: 128m
  mem_limit: 256m
  pids_limit: 128
  min_storage: "1GB"
  lifecycle: beta
# nocheck: playwright-service-flag — CDN serves static assets, no HTML pages with tracking snippet
matomo:
  bond: 1
  enabled: "{{ 'web-app-matomo' in group_names }}"
  shared: "{{ 'web-app-matomo' in group_names }}"
  # nocheck: matomo-track
  track: false
# nocheck: playwright-service-flag — canonical:cdn alias of self-provider
# nocheck: dynamic-flag
javascript:
  enabled: false
  shared: true
  canonical: cdn
# nocheck: playwright-service-flag — /metrics endpoint covered by web-app-prometheus's own spec
prometheus:
  bond: 1
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
  # nocheck: prometheus-scrape
  scrape: false
