---
# which is necessary for building
- name: install which
  package:
    name: which
    state: present
- name: "load docker, db and proxy for {{ application_id }}"
  include_role:
    name: sys-stk-full
  vars:
    compose_handlers_flush: true
    webserver_vhost_flavour: "basic"
    application_id: "web-app-discourse"

- name: "Create the discourse network so the launcher can attach --network={{ DISCOURSE_NETWORK }}"
  include_tasks:
    file: "{{ [playbook_dir, 'roles/sys-svc-compose/tasks/utils/network/create.yml'] | path_join }}"
    apply:
      delegate_to: "{{ STACK_HOST }}"
      run_once: true
  vars:
    network_role_id: "{{ application_id }}"

- name: "Run the standalone Discourse launcher container"
  include_tasks: 04_launcher.yml
  when: IS_STACK_HOST | bool
