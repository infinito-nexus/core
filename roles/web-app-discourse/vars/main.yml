---
application_id: "web-app-discourse"
entity_name: "{{ application_id | get_entity_name }}"

database_password: "{{ lookup('config', application_id, 'credentials.database_password') }}" # nocheck: lookup-config-path

DISCOURSE_CONTAINER: "{{ entity_name }}"
DISCOURSE_NETWORK: "{{ application_id | get_entity_name }}"
DISCOURSE_VOLUME: "{{ lookup('volume', application_id, 'data').name }}"
DISCOURSE_PLUGINS: "{{ lookup('config', application_id, 'addons') }}"
DISCOURSE_PG_NETWORK: "{{ ('svc-db-' ~ DISCOURSE_DATABASE_TYPE) | get_entity_name }}"
DISCOURSE_REDIS_NETWORK: "{{ 'svc-db-redis' | get_entity_name }}"
DISCOURSE_WEB_NETWORK: "{{ 'svc-prx-openresty' | get_entity_name }}"
DISCOURSE_REDIS_SHARED: "{{ not (lookup('engine', 'redis', application_id, 'local') | bool) }}"
DISCOURSE_REDIS_HOST: "{{ lookup('engine', 'redis', application_id, 'host') }}"
DISCOURSE_REDIS_PORT: "{{ lookup('engine', 'redis', application_id, 'port') }}"
DISCOURSE_REDIS_PASSWORD: "{{ lookup('engine', 'redis', application_id, 'password') }}"
DISCOURSE_REPOSITORY_URL: "{{ lookup('config', application_id, 'services.' ~ entity_name ~ '.repository') }}"
DISCOURSE_REF: "{{ lookup('config', application_id, 'services.' ~ entity_name ~ '.ref') }}"
DISCOURSE_LDAP_AUTH_PLUGIN_REPOSITORY: "{{ lookup('config', application_id, 'addons.discourse-ldap-auth.config.repository') }}"
DISCOURSE_LDAP_AUTH_PLUGIN_REF: "{{ lookup('config', application_id, 'addons.discourse-ldap-auth.config.ref') }}"

DISCOURSE_DATABASE: "{{ lookup('database', application_id ) }}"
DISCOURSE_DATABASE_TYPE: "{{ DISCOURSE_DATABASE.type }}"
DISCOURSE_DATABASE_CONTAINER: "{{ DISCOURSE_DATABASE.container }}" # nocheck: container-var-name-lookup references the shared database container, not this role's service
DISCOURSE_DATABASE_IS_SHARED: "{{ DISCOURSE_DATABASE.shared }}"

DISCOURSE_REPOSITORY_DIR: "{{ lookup('container', application_id, 'directories.services') }}{{ lookup('config', application_id, 'services.discourse.repository') }}/"
DISCOURSE_CONTAINERS_DIR: "{{ [ DISCOURSE_REPOSITORY_DIR, 'containers' ] | path_join }}"

DISCOURSE_APPLICATION_YML_DEST: "{{ [ DISCOURSE_CONTAINERS_DIR, DISCOURSE_CONTAINER ~ '.yml' ] | path_join }}"

DISCOURSE_LDAP_ENABLED: "{{ lookup('config', application_id, 'services.ldap.enabled') }}"

# Exception: HOST_LL_CC is not available in the container; derive the locale from HOST_CS instead
DISCOURSE_LOCAL: "C.{{ HOST_CS }}"

DISCOURSE_OIDC_ENABLED: "{{ lookup('config', application_id, 'services.sso.enabled') }}"
DISCOURSE_OIDC_LOGOUT_REDIRECT_URL: "{{ lookup('tls', 'web-svc-logout', 'url.base') }}"
DISCOURSE_LOCAL_LOGIN_ENABLED: "{{ lookup('config', application_id, 'services.discourse.local_login_enabled') }}"

DISCOURSE_TLS_ENABLED: "{{ lookup('tls', application_id, 'enabled') | bool }}"
DISCOURSE_TLS_SELFSIGNED: "{{ lookup('tls', application_id, 'mode') == 'self_signed' }}"
DISCOURSE_TLS_SELFSIGNED_ENABLED: "{{ ( DISCOURSE_TLS_ENABLED | bool ) and ( DISCOURSE_TLS_SELFSIGNED | bool ) }}"
