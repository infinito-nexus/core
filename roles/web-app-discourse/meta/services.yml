---
# nocheck: seaweedfs-required — Discourse's aws-sdk-s3 defaults a custom endpoint to virtual-host addressing and exposes no force_path_style option, incompatible with SeaweedFS path-style without a global SeaweedFS virtual-host/wildcard-DNS change affecting all consumers; uploads stay on the local volume
# nocheck: playwright-service-flag — static-asset provider, no Playwright surface
asset:
  bond: 1
  enabled: "{{ 'web-svc-asset' in group_names }}"
  shared: "{{ 'web-svc-asset' in group_names }}"
sso:
  bond: 1
  enabled: "{{ 'web-app-keycloak' in group_names }}"
  shared: "{{ 'web-app-keycloak' in group_names }}"
  flavor: oidc
# nocheck: dynamic-flag
ldap:
  enabled: false
  shared: false
logout:
  bond: 1
  enabled: "{{ 'web-svc-logout' in group_names }}"
  shared: "{{ 'web-svc-logout' in group_names }}"
dashboard:
  bond: 1
  enabled: "{{ 'web-app-dashboard' in group_names }}"
  shared: "{{ 'web-app-dashboard' in group_names }}"
matomo:
  bond: 1
  enabled: "{{ 'web-app-matomo' in group_names }}"
  shared: "{{ 'web-app-matomo' in group_names }}"
email:
  bond: 1
  enabled: "{{ MAIL_PROVIDER in group_names }}"
  shared: "{{ MAIL_PROVIDER in group_names }}"
# nocheck: playwright-service-flag — DB engine, covered by role-local integration tests
postgres:
  bond: 1
  enabled: true # nocheck: dynamic-flag
  shared: "{{ 'svc-db-postgres' in group_names }}"
  extensions:
    - vector
# nocheck: shared
# nocheck: dynamic-flag
# nocheck: playwright-service-flag — DB engine, covered by role-local integration tests
redis:
  bond: 1
  backup:
    disabled: true
  enabled: true # nocheck: dynamic-flag
  shared: "{{ 'svc-db-redis' in group_names }}"
  cpus: "0.5"
  mem_reservation: 128m
  mem_limit: 512m
  pids_limit: 512
# nocheck: playwright-service-flag — self-provider
discourse:
  modes:
    compose:
      enabled: true
    swarm:
      enabled: true
  bond: 1
  shared: true
  enabled: true # nocheck: dynamic-flag
  name: discourse
  ref: main
  min_storage: 15GB
  repository: https://github.com/discourse/discourse_docker.git
  plugins:
    docker_manager:
      enabled: true
    discourse-activity-pub:
      enabled: true
    discourse-akismet:
      enabled: true
    discourse-ldap-auth:
      enabled: "{{ lookup('config', 'web-app-discourse', 'services.ldap.enabled') | bool }}"
      repository: https://github.com/jonmbake/discourse-ldap-auth.git
      ref: master
  ports:
    local:
      http: 8020
    internal:
      http: 80
  proxy:
    service_key: discourse
  lifecycle: beta
  cpus: "1.0"
  mem_reservation: 1g
  mem_limit: 2g
  pids_limit: 1024
  local_login_enabled: "{{ not (lookup('config', 'web-app-discourse', 'services.sso.enabled') | bool) or (lookup('config', 'web-app-discourse', 'services.ldap.enabled')
    | bool) }}"
# nocheck: playwright-service-flag — css consumer, no Playwright surface (provider: web-svc-css)
css:
  bond: 1
  enabled: "{{ 'web-svc-css' in group_names }}"
  shared: "{{ 'web-svc-css' in group_names }}"
prometheus:
  bond: 1
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
# nocheck: dynamic-flag
# nocheck: playwright-service-flag, dynamic-flag infrastructure backup consumer
container_backup: # nocheck: bond-baseline backup host joins outside the variant topology
  bond: 1
  enabled: "{{ 'svc-bkp-volume-2-local' in group_names }}"
  shared: true
