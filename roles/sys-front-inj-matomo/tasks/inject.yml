---
- name: "Check if site {{ domain }} is already registered at Matomo"
  uri_retry:
    url: "{{ matomo_index_php_url }}?module=API&method=SitesManager.getSitesIdFromSiteUrl&url={{ lookup('tls', application_id, 'protocols.web') }}://{{ base_domain
      }}&format=json&token_auth={{ lookup('users', 'administrator').tokens['web-app-matomo'] }}"
    method: GET
    return_content: true
    status_code: 200
    validate_certs: true
  register: site_check
  failed_when: false
  no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"

- name: "Disable Matomo tracking for '{{ domain }}' (Matomo API not ready yet, reapplied on a later pass)"
  ansible.builtin.set_fact:
    inj_enabled: "{{ inj_enabled | combine({'matomo': false}) }}"
  when: site_check.status is not defined or site_check.status != 200 or site_check.json is not defined

- name: "Register site + inject Matomo tracking for '{{ domain }}'"
  ansible.builtin.include_tasks: inject_apply.yml
  when: site_check.status is defined and site_check.status == 200 and site_check.json is defined
