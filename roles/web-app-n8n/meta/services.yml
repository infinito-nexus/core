---
# nocheck: seaweedfs-required — n8n stores workflows in postgres, not object storage
sso:
  bond: 1
  enabled: "{{ 'web-app-keycloak' in group_names }}"
  shared: "{{ 'web-app-keycloak' in group_names }}"
  flavor: oauth2
  oauth2:
    origin:
      host: n8n
      port: 5678
email:
  bond: 1
  enabled: "{{ 'web-app-mailu' in group_names }}"
  shared: "{{ 'web-app-mailu' in group_names }}"
logout:
  bond: 1
  enabled: "{{ 'web-svc-logout' in group_names }}"
  shared: "{{ 'web-svc-logout' in group_names }}"
dashboard:
  bond: 1
  enabled: "{{ 'web-app-dashboard' in group_names }}"
  shared: "{{ 'web-app-dashboard' in group_names }}"
matomo:
  bond: 1
  enabled: "{{ 'web-app-matomo' in group_names }}"
  shared: "{{ 'web-app-matomo' in group_names }}"
prometheus:
  bond: 1
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
# nocheck: playwright-service-flag — css consumer, no Playwright surface (provider: web-svc-css)
css:
  bond: 1
  enabled: "{{ 'web-svc-css' in group_names }}"
  shared: "{{ 'web-svc-css' in group_names }}"
# nocheck: shared
# nocheck: dynamic-flag
# nocheck: playwright-service-flag — DB engine, covered by role-local integration tests
postgres:
  bond: 1
  enabled: true
  shared: "{{ 'svc-db-postgres' in group_names }}"
n8n:
  modes:
    compose:
      enabled: true
    swarm:
      enabled: true
  backup:
    no_stop_required: false
  image: docker.n8n.io/n8nio/n8n
  version: "1.95.3"
  name: n8n
  min_storage: 5GB
  cpus: "1.0"
  mem_reservation: 512m
  mem_limit: 1g
  pids_limit: 512
  # nocheck: single-replica n8n Community Edition caches isInstanceOwnerSetUp per process with no cross-replica invalidation; replicas that miss the owner-setup POST keep serving showSetupOnFirstLoad=true and bounce the SPA to /setup after login; multi-main requires licensed queue mode
  replicas: 1
  ports:
    internal:
      http: 5678
    local:
      http: 8080
      sso: 16510
  run_after:
    - web-app-keycloak
    - web-app-matomo
    - web-app-mailu
  lifecycle: beta
# nocheck: dynamic-flag
# nocheck: playwright-service-flag, dynamic-flag infrastructure backup consumer
container_backup: # nocheck: bond-baseline backup host joins outside the variant topology
  bond: 1
  enabled: "{{ 'svc-bkp-volume-2-local' in group_names }}"
  shared: true
