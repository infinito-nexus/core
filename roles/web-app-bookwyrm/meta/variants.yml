---
# Matrix-deploy variant overrides. The OIDC auth flow rides the
# web-app-keycloak SSO-proxy sidecar (flavor: oauth2) in front of the BookWyrm
# web UI.
#
# variant 0: OIDC (canonical default). variant 1: services disabled.

- services:
    dashboard:
      enabled: true
      shared: true
    email:
      enabled: true
      shared: true
    logout:
      enabled: true
      shared: true
    matomo:
      enabled: true
      shared: true
    sso:
      enabled: true
      shared: true
    postgres:
      shared: true
    redis:
      shared: true
    prometheus:
      enabled: true
      shared: true
    seaweedfs:
      enabled: true
      shared: true
    css:
      enabled: true
      shared: true
- services:
    dashboard:
      enabled: false
      shared: false
    email:
      enabled: false
      shared: false
    logout:
      enabled: false
      shared: false
    matomo:
      enabled: false
      shared: false
    sso:
      enabled: false
      shared: false
    postgres:
      shared: false
    redis:
      shared: false
    prometheus:
      enabled: false
      shared: false
    seaweedfs:
      enabled: false
      shared: false
    css:
      enabled: false
      shared: false
