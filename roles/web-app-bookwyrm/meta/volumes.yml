---
data:
  type: volume
  name: bookwyrm_data
  mounts:
    - service: application
      target: /app/data
    - service: worker
      target: /app/data
media:
  type: volume
  name: bookwyrm_media
  mounts:
    - service: application
      target: /app/media
    - service: worker
      target: /app/media
