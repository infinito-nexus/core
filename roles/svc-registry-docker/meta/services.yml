---
# nocheck: dynamic-flag
node:
  enabled: true
  shared: true
  bond: 1
docker:
  modes:
    compose:
      enabled: true
    swarm:
      enabled: false
  # nocheck: default-placement-manager  local registry that holds locally-built infinito images for docker stack deploy; chicken-and-egg if scheduled on a worker
  placement: manager
  enabled: true
  shared: true
  bond: 1
  image: registry
  version: "3"
  name: registry
  min_storage: 5GB
  backup:
    disabled: true
  cpus: "0.5"
  mem_reservation: 128m
  mem_limit: 512m
  pids_limit: 256
  ports:
    local:
      registry: 5000
    internal:
      registry: 5000
  lifecycle: beta
# nocheck: dynamic-flag - locally built images are rebuildable, the backup consumer stays permanently off
container_backup:
  bond: 1
  enabled: false
  shared: true
