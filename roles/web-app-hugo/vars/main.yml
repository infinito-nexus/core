---
application_id: "web-app-hugo"
entity_name: "{{ application_id | get_entity_name }}"

HUGO_CONTAINER: "{{ entity_name }}"
HUGO_SERVICE: "{{ entity_name }}"

HUGO_NGINX_IMAGE: "{{ lookup('config', application_id, 'services.hugo.image') }}"
HUGO_NGINX_VERSION: "{{ lookup('config', application_id, 'services.hugo.version') }}"
HUGO_BUILDER_IMAGE: "{{ lookup('config', application_id, 'services.hugo.builder_image') }}"
HUGO_BUILDER_VERSION: "{{ lookup('config', application_id, 'services.hugo.builder_version') }}"

HUGO_SOURCE_REPO: "{{ lookup('config', application_id, 'services.hugo.source_repository') }}"
HUGO_SOURCE_REF: "{{ lookup('config', application_id, 'services.hugo.source_version') }}"

HUGO_BASE_URL: "{{ lookup('tls', application_id, 'url.base') }}"
HUGO_ENVIRONMENT: "{{ lookup('config', application_id, 'services.hugo.hugo_environment') }}"
HUGO_MINIFY: "{{ lookup('config', application_id, 'services.hugo.hugo_minify') }}"
