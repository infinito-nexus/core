---
# nocheck: dynamic-flag
# nocheck: logout
logout:
  enabled: false
  shared: false
# nocheck: dynamic-flag
# nocheck: oidc
# nocheck: sso
sso:
  enabled: false
  shared: false
dashboard:
  bond: 1
  enabled: "{{ 'web-app-dashboard' in group_names }}"
  shared: "{{ 'web-app-dashboard' in group_names }}"
matomo:
  bond: 1
  enabled: "{{ 'web-app-matomo' in group_names }}"
  shared: "{{ 'web-app-matomo' in group_names }}"
# nocheck: playwright-service-flag — css consumer, no Playwright surface (provider: web-svc-css)
css:
  bond: 1
  enabled: "{{ 'web-svc-css' in group_names }}"
  shared: "{{ 'web-svc-css' in group_names }}"
hugo:
  modes:
    compose:
      enabled: true
    swarm:
      enabled: true
  image: nginx
  version: 1.31-alpine
  custom: true
  builder_image: hugomods/hugo
  builder_version: exts-0.148.0
  source_repository: https://github.com/gohugoio/hugoDocs.git
  source_version: v0.148.0
  hugo_environment: production
  hugo_minify: true
  ports:
    local:
      http: 8008
    internal:
      http: 80
  proxy:
    service_key: hugo
  lifecycle: beta
  min_storage: 1GB
  cpus: "0.2"
  mem_reservation: 128m
  mem_limit: 256m
  pids_limit: 256
# nocheck: email
# nocheck: dynamic-flag
email:
  enabled: false
  shared: false
prometheus:
  bond: 1
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
