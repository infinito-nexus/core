---
swarm:
  enabled: "{{ 'svc-docker-swarm' in group_names }}"
  shared: "{{ 'svc-docker-swarm' in group_names }}"
swarm-manager:
  name: swarm-manager
  lifecycle: pre-alpha
  min_storage: "1MB"
  cpus: "0.01"
  mem_reservation: "8m"
  mem_limit: "16m"
  pids_limit: 8
  run_after:
    - svc-docker-swarm
