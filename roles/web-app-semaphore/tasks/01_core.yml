---
- include_tasks: utils/once/flag.yml

- name: "🧩 load docker, db and proxy for {{ application_id }}"
  include_role:
    name: sys-stk-full
  vars:
    compose_handlers_flush: true

- name: "👤 Provision the external OIDC administrator in Semaphore"
  include_tasks: 02_oidc.yml
  when:
    - IS_STACK_HOST | bool
    - SEMAPHORE_OIDC_ENABLED | bool
