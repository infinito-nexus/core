---
- name: "📦 Egress router | Install dnsmasq (host split-DNS forwarder)"
  ansible.builtin.package:
    name: dnsmasq
    state: present
- name: "📁 Egress router | Ensure the dnsmasq drop-in directory exists"
  ansible.builtin.file:
    path: "{{ TOR_DNSMASQ_CONF | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
- name: "🔧 Egress router | Ensure dnsmasq reads the drop-in directory"
  ansible.builtin.lineinfile:
    path: /etc/dnsmasq.conf
    regexp: "^conf-dir="
    line: "conf-dir={{ TOR_DNSMASQ_CONF | dirname }}/,*.conf"
    create: true
    owner: root
    group: root
    mode: "0644"
  register: _tor_dnsmasq_confdir
- name: "📁 Egress router | Ensure state directory exists"
  ansible.builtin.file:
    path: "{{ [ DIR_VAR_LIB, application_id ] | path_join }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
- name: "🔎 Egress router | Check for persisted clearnet upstreams"
  ansible.builtin.stat:
    path: "{{ TOR_DNS_UPSTREAMS_FILE }}"
  register: _tor_upstreams_stat
- name: "📖 Egress router | Read the current resolver (to capture upstreams once)"
  ansible.builtin.slurp:
    src: /etc/resolv.conf
  register: _tor_resolv_now
  when: not _tor_upstreams_stat.stat.exists
- name: "💾 Egress router | Persist clearnet upstreams (first setup only)"
  ansible.builtin.copy:
    dest: "{{ TOR_DNS_UPSTREAMS_FILE }}"
    content: "{{ (_tor_upstream_list | join('\n')) ~ '\n' }}"
    owner: root
    group: root
    mode: "0644"
  vars:
    _tor_upstream_list: >-
      {{ (_tor_resolv_now.content | b64decode)
         | regex_findall('(?m)^nameserver\s+(\S+)')
         | reject('equalto', '127.0.0.1') | list }}
  when: not _tor_upstreams_stat.stat.exists
- name: "📥 Egress router | Load captured upstreams"
  ansible.builtin.slurp:
    src: "{{ TOR_DNS_UPSTREAMS_FILE }}"
  register: _tor_dns_upstreams_raw
- name: "🔎 Egress router | Detect foreign dnsmasq drop-ins (shared instance)"
  ansible.builtin.find:
    paths: "{{ TOR_DNSMASQ_CONF | dirname }}"
    patterns: "*.conf"
    excludes: "{{ TOR_DNSMASQ_CONF | basename }}"
  register: _tor_dnsmasq_foreign
- name: "📝 Egress router | Render dnsmasq .onion split-DNS drop-in"
  ansible.builtin.template: # nocheck: stack-host-template (per-host dnsmasq system config in /etc/dnsmasq.d)
    src: dnsmasq-tor-onion.conf.j2
    dest: "{{ TOR_DNSMASQ_CONF }}"
    owner: root
    group: root
    mode: "0644"
  vars:
    TOR_DNS_UPSTREAMS: "{{ (_tor_dns_upstreams_raw.content | b64decode).split('\n') | map('trim') | reject('equalto', '') | list }}"
    TOR_DNSMASQ_OWNS_LISTENER: "{{ _tor_dnsmasq_foreign.matched == 0 }}"
  register: _tor_dnsmasq_conf
- name: "🚀 Egress router | Enable + (re)start dnsmasq"
  ansible.builtin.systemd:
    name: dnsmasq
    enabled: true
    state: "{{ 'restarted' if (_tor_dnsmasq_conf is changed or _tor_dnsmasq_confdir is changed) else 'started' }}"
- name: "🔀 Egress router | Point the host resolver at dnsmasq (127.0.0.1)"
  ansible.builtin.copy:
    dest: /etc/resolv.conf
    content: |
      nameserver 127.0.0.1
      options ndots:1
    owner: root
    group: root
    mode: "0644"
    unsafe_writes: true
- name: "🔀 Egress router | Redirect .onion virtual-IP TCP to Tor TransPort"
  ansible.builtin.iptables:
    table: nat
    chain: OUTPUT
    protocol: tcp
    destination: "{{ TOR_EGRESS_VIRTUAL_NET_IPV4 }}"
    jump: REDIRECT
    to_ports: "{{ TOR_TRANS_PORT | string }}"
    comment: "Tor egress router: .onion virtual range -> TransPort"
