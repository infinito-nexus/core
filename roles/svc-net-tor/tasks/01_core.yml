---
- include_tasks: utils/once/flag.yml

- name: "Ensure Tor config directory exists"
  ansible.builtin.file:
    path: "{{ TOR_CONFIG_DIR }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: "Ensure Tor data + HiddenServiceDir exist"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0700"
  loop:
    - "{{ TOR_DATA_DIR }}"
    - "{{ TOR_HS_DIR }}"
  become: true

- name: "Install authoritative hidden-service keys (must match DOMAIN_PRIMARY)"
  ansible.builtin.copy:
    src: "{{ [ TOR_HS_SRC_DIR, item.name ] | path_join }}"
    dest: "{{ [ TOR_HS_DIR, item.name ] | path_join }}"
    owner: root
    group: root
    mode: "{{ item.mode }}"
    force: true
  loop:
    - { name: "hostname", mode: "0600" }
    - { name: "hs_ed25519_public_key", mode: "0600" }
    - { name: "hs_ed25519_secret_key", mode: "0600" }
  become: true
  register: _tor_hs_keys

- name: "Render torrc"
  ansible.builtin.template:
    src: torrc.j2
    dest: "{{ TOR_TORRC_HOST }}"
    owner: root
    group: root
    mode: "0644"
  become: true
  register: _tor_torrc

- name: "For '{{ application_id }}': Load sys-svc-compose"
  include_role:
    name: sys-svc-compose
  vars:
    compose_repository_pull: false
    compose_handlers_flush: true
    application_id: svc-net-tor

- name: "Restart Tor to apply hidden-service key / torrc changes"
  ansible.builtin.shell: |
    set -euo pipefail
    compose up -d --force-recreate --remove-orphans
  args:
    chdir: "{{ lookup('container', application_id, 'directories.instance') }}"
    executable: /bin/bash
  become: true
  when: (_tor_hs_keys is changed) or (_tor_torrc is changed)

- name: "Wire the host-level transparent .onion egress router"
  include_tasks: router.yml
  when: TOR_EGRESS_ROUTER_ENABLED | bool

# A (re)started Tor republishes its hidden-service descriptor; until that
# lands on the HSDirs the node onion is unreachable (~2-5 min) and every
# later deploy step touching an onion URL (front-proxy checks, injections,
# Playwright) fails as if transient. Gate the role on self-reachability:
# any HTTP reaction — including OpenResty's 444 connection-close for the
# bare node onion — proves the rendezvous works; only no-contact fails.
- name: "Wait until the node onion answers over the Tor egress router"
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - |
        import sys, urllib.error, urllib.request
        try:
            urllib.request.urlopen("http://{{ TOR_NODE_ONION }}/", timeout=30)
        except urllib.error.HTTPError:
            pass
        except Exception as exc:
            detail = f"{type(exc).__name__}: {exc}"
            if "closed connection" not in detail and "RemoteDisconnected" not in detail:
                sys.exit(detail)
  register: _tor_self_reach
  retries: 90
  delay: 5
  until: _tor_self_reach.rc == 0
  changed_when: false
  when:
    - TOR_EGRESS_ROUTER_ENABLED | bool
    - TOR_NODE_ONION | length > 0
