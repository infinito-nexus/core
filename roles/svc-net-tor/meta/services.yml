---
tor:
  bond: 1
  enabled: true
  shared: true
  exclusive: true
  primary: true
  # Base image for the local Debian+tor build (files/Dockerfile).
  image: debian
  version: trixie-slim
  name: tor
  node: ""  # node onion address SPOT; set by the inventory provisioner (ensure_node_onion)
  ports:
    local:
      socks: 9050  # Tor SOCKS port SPOT; referenced by torrc, tests and the playwright runner
  min_storage: 100MB
  cpus: "0.25"
  mem_reservation: 128m
  mem_limit: 256m
  pids_limit: 128
  lifecycle: alpha
