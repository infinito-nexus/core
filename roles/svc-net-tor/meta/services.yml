---
tor:
  bond: 1
  enabled: true
  shared: true
  exclusive: true
  primary: true
  # Base image for the local Debian+tor build (files/Dockerfile).
  image: debian
  version: trixie-slim
  name: tor
  node: ""
  ports:
    local:
      socks: 9050
      trans: 9040
      dns: 9053
  min_storage: 100MB
  cpus: "0.25"
  mem_reservation: 128m
  mem_limit: 256m
  pids_limit: 128
  lifecycle: alpha
