---
application_id: "web-app-friendica"
entity_name: "{{ application_id | get_entity_name }}"

FRIENDICA_SERVICE: "{{ entity_name }}"
FRIENDICA_CONTAINER: "{{ entity_name }}"
FRIENDICA_IMAGE: "{{ lookup('config', application_id, 'services.' ~ FRIENDICA_SERVICE ~ '.image') }}"
FRIENDICA_VERSION: "{{ lookup('config', application_id, 'services.' ~ FRIENDICA_SERVICE ~ '.version') }}"
FRIENDICA_INIT_GATE_FILE: "friendica-init-gate.sh"
FRIENDICA_INIT_GATE_HOST: "{{ [lookup('container', application_id, 'directories.instance'), FRIENDICA_INIT_GATE_FILE] | path_join }}"
FRIENDICA_BASE_URL: "{{ lookup('tls', application_id, 'url.base') | regex_replace('/+$', '') }}"

FRIENDICA_APPLICATION_DIR: "/var/www/html"
FRIENDICA_CONFIG_DIR: "{{ [ FRIENDICA_APPLICATION_DIR,          'config' ] | path_join }}"
FRIENDICA_CONFIG_FILE: "{{ [ FRIENDICA_CONFIG_DIR,               'local.config.php' ] | path_join }}"
FRIENDICA_USER: "www-data"
FRIENDICA_ADDONS: "{{ lookup('config', application_id, 'addons') }}"

FRIENDICA_OIDC_ENABLED: "{{ lookup('config', application_id, 'services.sso.enabled') }}"
FRIENDICA_LDAP_ENABLED: "{{ lookup('config', application_id, 'services.ldap.enabled') }}"
FRIENDICA_LDAP_CONFIG_DOCKER: "{{ [ FRIENDICA_APPLICATION_DIR,         'config/ldapauth.config.php' ] | path_join }}"
FRIENDICA_LDAP_CONFIG_HOST: "{{ [ lookup('container', application_id, 'directories.volumes'), 'ldapauth.config.php' ] | path_join }}"
