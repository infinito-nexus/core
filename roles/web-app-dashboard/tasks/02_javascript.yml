---
- name: Ensure {{ DASHBOARD_JS_SERVER_DIR }} exists
  file:
    path: "{{ DASHBOARD_JS_SERVER_DIR }}"
    state: directory
    mode: "0755"

- name: "Include file specific JS Routines"
  include_tasks: "_javascript_file.yml"
  loop: "{{ DASHBOARD_JS_FILES }}"
  loop_control:
    loop_var: js_file_name

- name: "Vendor keycloak-js adapter next to oidc.js"
  get_url_retry:
    url: "{{ DASHBOARD_KEYCLOAK_JS_SRC_URL }}"
    dest: "{{ [ DASHBOARD_JS_SERVER_DIR, DASHBOARD_KEYCLOAK_JS_FILE_NAME ] | path_join }}"
    mode: "0644"
  when: DASHBOARD_OIDC_ENABLED | bool
