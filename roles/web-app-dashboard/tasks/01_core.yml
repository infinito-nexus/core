---
- include_tasks: utils/once/flag.yml

- name: "Include JS routines"
  include_tasks: "02_javascript.yml"
  when: IS_STACK_HOST | bool

- name: "load docker, proxy for '{{ application_id }}'"
  include_role:
    name: sys-stk-full
  vars:
    compose_handlers_flush: false
    compose_repository_pull: false
    webserver_extra_configuration: "{{ lookup('template', 'nginx/sso.html.conf.j2') }}"

- name: "Dashboard manager-side operations (file deploys + container exec)"
  include_tasks: 02_manager_ops.yml
  when: IS_STACK_HOST | bool
