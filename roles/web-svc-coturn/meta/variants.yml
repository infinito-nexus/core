---
# Matrix-deploy variant overrides for web-svc-coturn.
# See docs/contributing/artefact/files/role/variants.md for the file format.

# variant pinning every dynamic services.yml flag to true so the
# matrix exercises the in-group_names branch of web-svc-coturn.

- services:
    container_backup:
      enabled: true
    prometheus:
      enabled: true
      shared: true
    redis:
      shared: true
- services:
    container_backup:
      enabled: false
      shared: false # nocheck: variants-static-override backup shared stays literally true
    prometheus:
      enabled: false
      shared: false # nocheck: variants-static-override backup shared stays literally true
    redis:
      shared: false # nocheck: variants-static-override backup shared stays literally true
