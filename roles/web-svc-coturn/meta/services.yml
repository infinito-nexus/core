---
coturn:
  modes:
    compose:
      enabled: true
    swarm:
      enabled: true
  bond: 1
  enabled: true
  shared: true
  image: coturn/coturn
  version: 4.14.0
  min_storage: 1GB
  user_auth_enabled: false
  cpus: 1.0
  mem_reservation: 512m
  mem_limit: 1g
  pids_limit: 256
  network_mode: host
  username: coturnconsumer
  ports:
    internal:
      http: 80
    local:
      http: 8064
    public:
      stun_turn: 3481
      stun_turn_tls: 5351
      relay:
        start: 20000
        end: 39999
  lifecycle: beta
gateway:
  image: nginx
  version: alpine
  cpus: "0.3"
  mem_reservation: 256m
  mem_limit: 512m
  pids_limit: 256
# nocheck: dynamic-flag
redis:
  backup:
    disabled: true
  enabled: false
  shared: "{{ 'svc-db-redis' in group_names }}"
prometheus:
  bond: 1
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
# nocheck: dynamic-flag
# nocheck: playwright-service-flag, dynamic-flag infrastructure backup consumer
container_backup: # nocheck: bond-baseline backup host joins outside the variant topology
  bond: 1
  enabled: "{{ 'svc-bkp-volume-2-local' in group_names }}"
  shared: true
