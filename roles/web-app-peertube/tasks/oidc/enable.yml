---
- name: "⚙️ Load OIDC Settings for Peertube"
  include_vars: vars/oidc-settings.yml
  changed_when: false

- name: 🔎 Check if OIDC plugin is already installed
  shell: >
    container exec {{ PEERTUBE_CONTAINER_ADDRESS }} test -d /data/plugins/data/peertube-plugin-auth-openid-connect
  register: peertube_oidc_plugin_check
  failed_when: false
  changed_when: false

- name: "📦 Install auth-openid-connect plugin for Peertube (mem_limit bump + diagnostics)"
  when: peertube_oidc_plugin_check.rc != 0
  block:
    # Exception: install runs via `container exec` and shares the cgroup; combined RSS plus native allocs trips mem_limit and SIGKILLs peertube, so raise the ceiling and allow unlimited swap for the install window.
    - name: "📦 PEERTUBE | Raise mem_limit for plugin install"
      ansible.builtin.command: >-
        container update
        --memory {{ PEERTUBE_OIDC_PLUGIN_INSTALL_MEM_LIMIT }}
        --memory-swap -1
        {{ PEERTUBE_CONTAINER_ADDRESS }}
      changed_when: true

    - name: "📦 Install auth-openid-connect plugin for Peertube"
      # Exception: cgroup bump covers native memory; --max-old-space-size still caps the install's V8 old-generation.
      ansible.builtin.shell: >
        container exec
        -e NODE_OPTIONS=--max-old-space-size={{ PEERTUBE_OIDC_PLUGIN_INSTALL_MAX_OLD_SPACE_MB }}
        {{ PEERTUBE_CONTAINER_ADDRESS }} npm run plugin:install -- --npm-name {{ PEERTUBE_OIDC_PLUGIN }}
      register: peertube_oidc_install
      changed_when: peertube_oidc_install.rc == 0
      retries: 3
      delay: 15
      until: peertube_oidc_install.rc == 0
      notify: compose up

    # Exception: happy-path only; on failure the rescue leaves bumped limits so diagnostics reflect install-time state, and the next `compose up` restores compose.yml defaults.
    - name: "♻️ PEERTUBE | Restore compose-defined mem_limit"
      ansible.builtin.command: >-
        container update
        --memory {{ PEERTUBE_MEM_LIMIT }}
        --memory-swap {{ PEERTUBE_MEM_LIMIT }}
        {{ PEERTUBE_CONTAINER_ADDRESS }}
      changed_when: true

  rescue:
    - name: "💾 PEERTUBE | Dump diagnostics after install failure"
      ansible.builtin.script: "{{ role_path }}/files/diagnostics.sh {{ PEERTUBE_CONTAINER }}"
      environment:
        PEERTUBE_OIDC_PLUGIN_INSTALL_MAX_OLD_SPACE_MB: "{{ PEERTUBE_OIDC_PLUGIN_INSTALL_MAX_OLD_SPACE_MB }}"
        PEERTUBE_MAX_OLD_SPACE_SIZE: "{{ PEERTUBE_MAX_OLD_SPACE_SIZE }}"
      changed_when: false
      failed_when: false

    - name: "🛑 PEERTUBE | Fail explicitly after diagnostics"
      ansible.builtin.fail:
        msg: >-
          Installing peertube-plugin-auth-openid-connect failed.
          See PEERTUBE DIAGNOSTICS block above for state, OOMKilled, exit
          code, logs, stats, host memory, and dmesg OOM-killer evidence.

- name: "🔄 Update the settings column of the auth-openid-connect plugin"
  database_query:
    mask_values: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"
    config: "{{ lookup('database', application_id) }}"
    query: "{{ lookup('file', role_path ~ '/files/sql/upsert-oidc-plugin.sql') }}" # nocheck: database-query-raw  controller-read so the SQL travels to the remote swarm host that lacks the repo files
    named_args:
      settings: "{{ oidc_settings | to_json }}"
  register: _peertube_oidc_update
  retries: 5
  delay: 3
  until: _peertube_oidc_update is succeeded
  notify: compose up

- name: "✅ Ensure plugin is enabled in PeerTube (CLI)"
  shell: >
    container exec {{ PEERTUBE_CONTAINER_ADDRESS }} npm run plugin:enable -- --npm-name {{ PEERTUBE_OIDC_PLUGIN }}
  register: _peertube_enable
  failed_when: false
  changed_when: >
    _peertube_enable.stdout is defined and
    ('already enabled' not in _peertube_enable.stdout)
