---
# nocheck: seaweedfs-playwright - Shopware ships no templates/playwright.env.j2; the object-store upload is covered by the Flysystem amazon-s3 public/private/theme/sitemap config, not a Playwright surface
logout:
  bond: 1
  enabled: "{{ 'web-svc-logout' in group_names }}"
  shared: "{{ 'web-svc-logout' in group_names }}"
# nocheck: dynamic-flag
# nocheck: oidc
sso:
  bond: 1
  enabled: "{{ 'web-app-keycloak' in group_names }}"
  shared: "{{ 'web-app-keycloak' in group_names }}"
  flavor: oauth2
  oauth2:
    origin:
      host: web
      port: "8000"
ldap:
  bond: 1
  enabled: "{{ 'svc-db-openldap' in group_names }}"
  shared: "{{ 'svc-db-openldap' in group_names }}"
dashboard:
  bond: 1
  enabled: "{{ 'web-app-dashboard' in group_names }}"
  shared: "{{ 'web-app-dashboard' in group_names }}"
matomo:
  bond: 1
  enabled: "{{ 'web-app-matomo' in group_names }}"
  shared: "{{ 'web-app-matomo' in group_names }}"
email:
  bond: 1
  enabled: "{{ 'web-app-mailu' in group_names }}"
  shared: "{{ 'web-app-mailu' in group_names }}"
mariadb:
  bond: 1
  enabled: true # nocheck: dynamic-flag
  shared: "{{ 'svc-db-mariadb' in group_names }}"
init:
  name: shopware-init
  # nocheck: single-replica
  replicas: 1
  cpus: 1.0
  mem_reservation: 1g
  mem_limit: 2g
  min_storage: 1GB
  pids_limit: 256
shopware:
  modes:
    compose:
      enabled: true
    swarm:
      enabled: true
  image: composer
  version: "2.10"
  custom: true
  min_storage: 20GB
  package:
    name: shopware/production
    version: 6.7.8.2
  title: "{{ ORGANIZATION }} Shop"
  proxy:
    service_key: web
  ports:
    internal:
      http: 8000
    local:
      sso: 16503
      http: 8060
  run_after:
    - web-app-keycloak
    - web-app-mailu
  lifecycle: beta
  cpus: "1.0"
  mem_reservation: 1g
  mem_limit: 2g
  pids_limit: 1024
php:
  image: ghcr.io/shopware/docker-base
  version: "8.3"
  min_storage: 5GB
  cpus: "0.5"
  mem_reservation: 256m
  mem_limit: 1g
  pids_limit: 512
web:
  name: shopware-web
  cpus: 1.0
  mem_reservation: 1g
  mem_limit: 2g
  ports:
    internal:
      http: 8000
  min_storage: 5GB
  pids_limit: 512
worker:
  name: shopware-worker
  entrypoint:
    - php
    - bin/console
    - messenger:consume
    - async
    - low_priority
    - --time-limit=300
    - --memory-limit=512M
  cpus: 1.0
  mem_reservation: 1g
  mem_limit: 2g
  min_storage: 5GB
  pids_limit: 512
scheduler:
  name: shopware-scheduler
  # nocheck: single-replica
  replicas: 1
  entrypoint:
    - php
    - bin/console
    - scheduled-task:run
  cpus: 0.5
  mem_reservation: 512m
  mem_limit: 1g
  min_storage: 1GB
  pids_limit: 256
# nocheck: shared
# nocheck: dynamic-flag
redis:
  bond: 1
  backup:
    disabled: true
  enabled: true # nocheck: dynamic-flag
  shared: "{{ 'svc-db-redis' in group_names }}"
  image: redis
  version: 8-alpine
  cpus: 0.25
  mem_reservation: 256m
  mem_limit: 512m
  min_storage: 1GB
  pids_limit: 256
# nocheck: shared
# nocheck: dynamic-flag
opensearch:
  enabled: true # nocheck: dynamic-flag
  # nocheck: single-replica
  replicas: 1
  image: opensearchproject/opensearch
  version: 3.7.0
  name: shopware-opensearch
  ports:
    internal:
      http: 9200
  cpus: 1.0
  mem_reservation: 2g
  mem_limit: 4g
  min_storage: 10GB
  pids_limit: 1024
seaweedfs:
  bond: 1
  enabled: "{{ 'web-app-seaweedfs' in group_names }}"
  shared: "{{ 'web-app-seaweedfs' in group_names }}"
  public: true
css:
  bond: 1
  enabled: "{{ 'web-svc-css' in group_names }}"
  shared: "{{ 'web-svc-css' in group_names }}"
prometheus:
  bond: 1
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
# nocheck: dynamic-flag
# nocheck: playwright-service-flag, dynamic-flag infrastructure backup consumer
container_backup: # nocheck: bond-baseline backup host joins outside the variant topology
  bond: 1
  enabled: "{{ 'svc-bkp-volume-2-local' in group_names }}"
  shared: true
