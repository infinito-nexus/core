---
- name: ✅ Ensure '{{ SYS_SVC_DOCKER_DIR }}' exists
  file:
    path: "{{ SYS_SVC_DOCKER_DIR }}"
    state: directory
    mode: "0755"

- name: 📦 Install fuse-overlayfs in container
  ansible.builtin.package:
    name: fuse-overlayfs
    state: present
  notify: container manager restart

- name: 🧮 Compute and set Docker daemon MTU (container)
  include_tasks: "_mtu.yml"

- name: 🔧 Configure docker daemon storage driver (container)
  ansible.builtin.template: # nocheck: stack-host-template (per-host docker daemon config, runs on every container-host)
    src: daemon.json.j2
    dest: "{{ SYS_SVC_DOCKER_DAEMON }}"
    mode: "0644"
  notify: container manager restart

- name: 🔎 Check if TCP MSS clamp to PMTU is already present (container)
  ansible.builtin.command:
    argv:
      - iptables
      - -t
      - mangle
      - -C
      - FORWARD
      - -p
      - tcp
      - --tcp-flags
      - SYN,RST
      - SYN
      - -j
      - TCPMSS
      - --clamp-mss-to-pmtu
  register: mss_clamp_check
  changed_when: false
  failed_when: false

- name: ✅ Ensure TCP MSS clamping to PMTU on FORWARD (container)
  ansible.builtin.command:
    argv:
      - iptables
      - -t
      - mangle
      - -A
      - FORWARD
      - -p
      - tcp
      - --tcp-flags
      - SYN,RST
      - SYN
      - -j
      - TCPMSS
      - --clamp-mss-to-pmtu
  when:
    - mss_clamp_check.rc != 0
    - mss_clamp_check.stderr is not search('Permission denied')
