---
# nocheck: dynamic-flag
node:
  enabled: true
  shared: true
  bond: 1
cache:
  # nocheck: default-placement-manager  pull-through cache backs docker stack deploy; chicken-and-egg if scheduled on a worker that still needs to pull custom images from it
  placement: manager
  enabled: true
  shared: true
  bond: 1
  image: registry
  version: "2"
  name: cache-registry
  min_storage: 10GB
  cpus: "0.5"
  mem_reservation: 128m
  mem_limit: 512m
  pids_limit: 256
  ports:
    local:
      registry: 5001
    internal:
      registry: 5000
  proxy:
    remote_url: "https://registry-1.docker.io" # nocheck: url
  lifecycle: alpha
# nocheck: dynamic-flag
# nocheck: playwright-service-flag, dynamic-flag infrastructure backup consumer
container_backup: # nocheck: bond-baseline backup host joins outside the variant topology
  bond: 1
  enabled: "{{ 'svc-bkp-volume-2-local' in group_names }}"
  shared: true
