---
# nocheck: dynamic-flag
swarm:
  enabled: true
  shared: true
cache:
  default_placement: manager
  enabled: true
  shared: true
  image: registry
  version: "2"
  name: cache-registry
  min_storage: 10GB
  cpus: "0.5"
  mem_reservation: 128m
  mem_limit: 512m
  pids_limit: 256
  ports:
    local:
      registry: 5001
  proxy:
    remote_url: "https://registry-1.docker.io" # nocheck: url
  lifecycle: alpha
  run_after:
    - svc-swarm
