---
# nocheck: dynamic-flag
node:
  enabled: true
  shared: true
  bond: 1
cache:
  modes:
    compose:
      enabled: true
    swarm:
      enabled: false
  # nocheck: default-placement-manager  pull-through cache backs docker stack deploy; chicken-and-egg if scheduled on a worker that still needs to pull custom images from it
  placement: manager
  enabled: true
  shared: true
  bond: 1
  image: registry
  version: "3"
  name: cache-registry
  min_storage: 10GB
  backup:
    disabled: true
  cpus: "0.5"
  mem_reservation: 128m
  mem_limit: 512m
  pids_limit: 256
  ports:
    local:
      registry: 5001
    internal:
      registry: 5000
  proxy:
    remote_url: "https://registry-1.docker.io" # nocheck: url
  lifecycle: beta
# nocheck: dynamic-flag - pull-through cache content is re-fetchable, the backup consumer stays permanently off
container_backup:
  bond: 1
  enabled: false
  shared: true
