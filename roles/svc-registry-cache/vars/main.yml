---
application_id: svc-registry-cache
entity_name: "{{ application_id | get_entity_name }}"

REGISTRY_CACHE_IMAGE: "{{ lookup('config', application_id, 'services.cache.image') }}"
REGISTRY_CACHE_VERSION: "{{ lookup('config', application_id, 'services.cache.version') }}"
REGISTRY_CACHE_CONTAINER: "{{ lookup('config', application_id, 'services.cache.name') }}"
REGISTRY_CACHE_PORT: "{{ lookup('config', application_id, 'services.cache.ports.local.registry') }}"
REGISTRY_CACHE_PROXY_REMOTE_URL: "{{ lookup('config', application_id, 'services.cache.proxy.remote_url') }}"
