---
- include_tasks: utils/once/flag.yml

- name: "Setup container network for {{ application_id }}"
  include_tasks: "{{ [playbook_dir, 'roles/sys-svc-compose/tasks/utils/network/routine.yml' ] | path_join }}"
  vars:
    compose_handlers_flush: true
    # Explicit overwritting to be sure that there isn't a scope leak by another variable
    application_id: "svc-db-typesense"
    database_consumer_id: "svc-db-typesense"

- name: "TYPESENSE | Wait until container is running (not restarting)"
  ansible.builtin.shell: >
    container inspect --format '{{ "{{.State.Status}}" }} {{ "{{.State.Restarting}}" }}' {{ TYPESENSE_CONTAINER_ADDRESS }}
  register: ts_state
  retries: 120
  delay: 2
  until: >
    (ts_state.stdout is search('running')) and
    (ts_state.stdout is not search('true'))
  changed_when: false

- name: "TYPESENSE | Wait until the engine answers /health (inside container)"
  ansible.builtin.shell: >
    {{ TYPESENSE_EXEC_SHELL }}
    'exec 3<>/dev/tcp/127.0.0.1/8108; printf "GET /health HTTP/1.0\r\n\r\n" >&3; grep -q "200 OK" <&3'
  register: ts_health
  retries: 30
  delay: 5
  until: ts_health.rc == 0
  changed_when: false
