---
matomo:
  bond: 1
  enabled: "{{ 'web-app-matomo' in group_names }}"
  shared: "{{ 'web-app-matomo' in group_names }}"
# nocheck: shared
# nocheck: dynamic-flag
redis:
  backup:
    disabled: true
  enabled: true
  cpus: "0.5"
  mem_reservation: 128m
  mem_limit: 512m
  pids_limit: 512
postgres:
  bond: 1
  enabled: true # nocheck: dynamic-flag
  shared: "{{ 'svc-db-postgres' in group_names }}"
onlyoffice:
  bond: 1
  enabled: true
  shared: true
  image: onlyoffice/documentserver
  version: latest
  name: onlyoffice
  min_storage: 20GB
  cpus: 2
  mem_reservation: 1g
  mem_limit: 4g
  pids_limit: 4096
  backup:
    no_stop_required: true
  ports:
    local:
      http: 8061
  lifecycle: beta
css:
  bond: 1
  enabled: "{{ 'web-svc-css' in group_names }}"
  shared: "{{ 'web-svc-css' in group_names }}"
prometheus:
  bond: 1
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"

tor:
  bond: 1
  enabled: "{{ 'svc-net-tor' in group_names }}"
  shared: true  # nocheck: dynamic-flag
