---
# Matrix-deploy variant overrides for web-app-zammad.
# See docs/contributing/artefact/files/role/variants.md for the file format.

# V1: oidc + ldap + everything that can be true, is true
- services:
    container_backup:
      enabled: true
    css:
      enabled: true
      shared: true
    dashboard:
      enabled: true
      shared: true
    email:
      enabled: true
      shared: true
    ldap:
      enabled: true
      shared: true
    logout:
      enabled: true
      shared: true
    matomo:
      enabled: true
      shared: true
    memcached:
      shared: true
    sso:
      enabled: true
      shared: true
    postgres:
      shared: true
    prometheus:
      enabled: true
      shared: true
    redis:
      shared: true

- services:
    container_backup:
      enabled: false
      shared: false # nocheck: variants-static-override backup shared stays literally true
    css:
      enabled: false
      shared: false # nocheck: variants-static-override backup shared stays literally true
    dashboard:
