---
# nocheck: seaweedfs-required - object storage not implemented for this role
sso:
  bond: 1
  enabled: "{{ 'web-app-keycloak' in group_names }}"
  shared: "{{ 'web-app-keycloak' in group_names }}"
  flavor: oidc
ldap:
  bond: 1
  enabled: "{{ 'svc-db-openldap' in group_names }}"
  shared: "{{ 'svc-db-openldap' in group_names }}"
email:
  bond: 1
  enabled: "{{ 'web-app-mailu' in group_names }}"
  shared: "{{ 'web-app-mailu' in group_names }}"
logout:
  bond: 1
  enabled: "{{ 'web-svc-logout' in group_names }}"
  shared: "{{ 'web-svc-logout' in group_names }}"
dashboard:
  bond: 1
  enabled: "{{ 'web-app-dashboard' in group_names }}"
  shared: "{{ 'web-app-dashboard' in group_names }}"
matomo:
  bond: 1
  enabled: "{{ 'web-app-matomo' in group_names }}"
  shared: "{{ 'web-app-matomo' in group_names }}"
prometheus:
  bond: 1
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
# nocheck: playwright-service-flag - css consumer, no Playwright surface (provider: web-svc-css)
css:
  bond: 1
  enabled: "{{ 'web-svc-css' in group_names }}"
  shared: "{{ 'web-svc-css' in group_names }}"
# nocheck: shared
# nocheck: dynamic-flag
# nocheck: playwright-service-flag - DB engine, covered by role-local integration tests
postgres:
  bond: 1
  enabled: true
  shared: "{{ 'svc-db-postgres' in group_names }}"
# nocheck: shared
# nocheck: dynamic-flag
# nocheck: playwright-service-flag - DB engine, covered by role-local integration tests
redis:
  bond: 1
  enabled: true
  shared: "{{ 'svc-db-redis' in group_names }}"
# nocheck: shared
# nocheck: dynamic-flag
# nocheck: playwright-service-flag - DB engine, covered by role-local integration tests
memcached:
  bond: 1
  enabled: true
  shared: "{{ 'svc-db-memcached' in group_names }}"
# nocheck: playwright-service-flag: shared provider entity; the app itself is covered by this role's own Playwright spec
zammad:
  bond: 1
  enabled: true
  shared: true
  # nocheck: default-placement-manager  embedded elasticsearch engine state; node-local in swarm
  default_placement: manager
  image: ghcr.io/zammad/zammad
  version: "6.5.0"
  name: zammad-railsserver
  min_storage: 15GB
  proxy:
    service_key: nginx
  ports:
    internal:
      http: 8080
    local:
      http: 8077
  run_after:
    - web-app-keycloak
    - web-app-mailu
  lifecycle: beta
  cpus: "1.0"
  mem_reservation: 1g
  mem_limit: 2g
  pids_limit: 1024
railsserver:
  name: zammad-railsserver
  ports:
    internal:
      http: 3000
  cpus: "1.0"
  mem_reservation: 1g
  mem_limit: 2g
  pids_limit: 1024
websocket:
  ports:
    internal:
      http: 6042
  cpus: "0.5"
  mem_reservation: 256m
  mem_limit: 512m
  pids_limit: 512
# nocheck: playwright-service-flag - internal sub-component (bundled search)
search:
  image: docker.elastic.co/elasticsearch/elasticsearch
  version: "8.13.4"
  min_storage: 5GB
  cpus: "1.0"
  mem_reservation: 1g
  mem_limit: 2g
  pids_limit: 512
elasticsearch:
  ports:
    internal:
      http: 9200
  cpus: "1.0"
  mem_reservation: 1g
  mem_limit: 2g
  pids_limit: 512
