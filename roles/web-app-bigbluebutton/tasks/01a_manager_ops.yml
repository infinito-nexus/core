---
- name: "🔧 Set BBB Facts"
  set_fact:
    BBB_ENV_FILE_LINK: "{{ [compose_repository_path, '.env'] | path_join }}"
    BBB_ENV_FILE_ORIGINE: "{{ lookup('container', application_id, 'files.env') }}"
    BBB_COMPOSE_FILE_ORIGINE: "{{ [compose_repository_path, 'docker-compose.yml'] | path_join }}"
    BBB_COMPOSE_FILE_FINAL: "{{ [lookup('container', application_id, 'directories.instance'), 'compose.yml'] | path_join }}"

- name: ✏️ Write compose.override.yml for BigBlueButton
  stack_host_template:
    src: compose.override.yml.j2
    dest: "{{ [lookup('container', application_id, 'directories.instance'), 'compose.override.yml'] | path_join }}"
  notify: compose up

- name: "🩹 Vendor the ep_redis_publisher fix mounted over the etherpad plugin"
  stack_host_copy:
    src: ep_redis_publisher_index.js
    dest: "{{ [lookup('container', application_id, 'directories.instance'), 'ep_redis_publisher_index.js'] | path_join }}"
    mode: "0444"
  notify: compose up

- name: "🩹 Vendor the etherpad postgres-DB entrypoint wrapper"
  stack_host_copy:
    src: etherpad_pg_entrypoint.sh
    dest: "{{ [lookup('container', application_id, 'directories.instance'), 'etherpad_pg_entrypoint.sh'] | path_join }}"
    mode: "0444"
  notify: compose up

- name: 📁 Create symbolic link from .env file to target location
  file:
    src: "{{ BBB_ENV_FILE_ORIGINE }}"
    dest: "{{ BBB_ENV_FILE_LINK }}"
    state: link

- name: "🔧 Setup compose.yml file"
  include_tasks: "02_compose.yml"

- name: 🚿 flush docker service
  meta: flush_handlers

- name: "✅ Ensure PostgreSQL password matches POSTGRESQL_SECRET"
  ansible.builtin.include_tasks: "02a_postgres_password_sync.yml"

- name: "🔧 Setup administrator"
  include_tasks: "03_administrator.yml"
