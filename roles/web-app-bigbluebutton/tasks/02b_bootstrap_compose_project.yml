---
# include-gated: when: DEPLOYMENT_MODE == "compose"
- name: "📁 create compose.yml for bigbluebutton"
  command:
    cmd: bash ./scripts/generate-compose
    chdir: "{{ compose_repository_path }}"
- name: 🐳 Slurp compose.yml from remote host
  slurp:
    src: "{{ BBB_COMPOSE_FILE_ORIGINE }}"
  register: compose_slurp
- name: 🐳 Transform compose.yml with compose_mods
  copy:
    content: "{{ compose_slurp.content | b64decode | compose_mods(compose_repository_path, lookup('container', application_id, 'files.env')) }}"
    dest: "{{ BBB_COMPOSE_FILE_FINAL }}"
  notify:
    - compose up
- name: 🔨 Prebuild etherpad image
  # `compose build --network=host` is no longer accepted by current
  # docker-compose; the legacy flag was dropped. Prebuild remains
  # required for local-test correctness.
  command:
    cmd: compose build etherpad
    chdir: "{{ lookup('container', application_id, 'directories.instance') }}"
