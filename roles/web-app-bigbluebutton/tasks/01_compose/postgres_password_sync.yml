---
- name: "⏳ Wait until PostgreSQL is ready"
  ansible.builtin.shell: > # nocheck: container-address-quote compose_mode_force role
    container exec -i {{ BBB_POSTGRES_CONTAINER_ADDRESS | quote }}
    pg_isready -U postgres
  register: pg_ready
  retries: 20
  delay: 3
  until: pg_ready.rc == 0
  changed_when: false

- name: "⏳ Wait for PostgreSQL to accept SQL after initdb restarts"
  ansible.builtin.shell: > # nocheck: container-address-quote compose_mode_force role
    container exec -i {{ BBB_POSTGRES_CONTAINER_ADDRESS | quote }}
    psql -U postgres -d postgres -tAc "SELECT 1;"
  register: pg_sql_ready
  retries: 30
  delay: 2
  until: pg_sql_ready.rc == 0 and (pg_sql_ready.stdout | trim) == '1'
  changed_when: false

- name: "✅ Ensure PostgreSQL password matches POSTGRESQL_SECRET"
  ansible.builtin.shell: > # nocheck: container-address-quote compose_mode_force role
    container exec -i {{ BBB_POSTGRES_CONTAINER_ADDRESS | quote }}
    psql -U postgres -d postgres
    -c "ALTER USER postgres WITH PASSWORD '{{ BBB_POSTGRESQL_SECRET }}';"
  register: bbb_pg_alter
  retries: 20
  delay: 3
  until: bbb_pg_alter.rc == 0
  changed_when: false

- name: "🔎 Check whether the etherpad database exists"
  ansible.builtin.shell: > # nocheck: container-address-quote compose_mode_force role
    container exec -i {{ BBB_POSTGRES_CONTAINER_ADDRESS | quote }}
    psql -U postgres -d postgres -tAc
    "SELECT 1 FROM pg_database WHERE datname = 'etherpad'"
  register: bbb_etherpad_db
  changed_when: false

- name: "🗄️ Create the etherpad database"
  ansible.builtin.shell: > # nocheck: container-address-quote compose_mode_force role
    container exec -i {{ BBB_POSTGRES_CONTAINER_ADDRESS | quote }}
    psql -U postgres -d postgres -c "CREATE DATABASE etherpad"
  when: (bbb_etherpad_db.stdout | trim) != '1'
  changed_when: true
