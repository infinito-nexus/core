---
# nocheck: seaweedfs-required — object storage not implemented for this role
sso:
  bond: 1
  enabled: "{{ 'web-app-keycloak' in group_names }}"
  shared: "{{ 'web-app-keycloak' in group_names }}"
  flavor: oidc
logout:
  bond: 1
  enabled: "{{ 'web-svc-logout' in group_names }}"
  shared: "{{ 'web-svc-logout' in group_names }}"
# nocheck: dynamic-flag
ldap:
  enabled: false
dashboard:
  bond: 1
  enabled: "{{ 'web-app-dashboard' in group_names }}"
  shared: "{{ 'web-app-dashboard' in group_names }}"
matomo:
  bond: 1
  enabled: "{{ 'web-app-matomo' in group_names }}"
  shared: "{{ 'web-app-matomo' in group_names }}"
email:
  bond: 1
  enabled: "{{ MAIL_PROVIDER in group_names }}"
  shared: "{{ MAIL_PROVIDER in group_names }}"
# nocheck: playwright-service-flag: shared provider entity; the app itself is covered by this role's own Playwright spec
bigbluebutton:
  modes:
    compose:
      enabled: true
    swarm:
      enabled: true
  bond: 1
  enabled: true
  shared: true
  workload: node-local
  repository: https://github.com/bigbluebutton/docker.git
  ref: v3.0.23
  recording:
    enabled: false
    cleanup: true
    max_age_days: 30
  min_storage: 50GB
  api_suffix: /bigbluebutton/
  upstream_host: "10.7.7.1"
  ports:
    local:
      http: 48087
    internal:
      http: 48087
    public:
      stun_turn: 3478
      stun_turn_tls: 5349
      relay:
        start: 40000
        end: 49999
  run_after:
    - web-app-keycloak
  lifecycle: beta
  cpus: "4.0"
  mem_reservation: "2g"
  mem_limit: "6g"
  pids_limit: 4096
# nocheck: dynamic-flag
# nocheck: playwright-service-flag — DB engine, covered by role-local integration tests
postgres:
  name: bigbluebutton-postgres-1
  shared: false
  enabled: true
# nocheck: dynamic-flag
# nocheck: playwright-service-flag — internal sub-component (multi-entity role)
greenlight:
  name: bigbluebutton-greenlight-1
  enabled: true
  shared: false
  cpus: "0.5"
  mem_reservation: 256m
  mem_limit: 1g
  pids_limit: 512
# nocheck: playwright-service-flag — infrastructural sub-component (TURN/STUN)
coturn:
  bond: 1
  shared: "{{ 'web-svc-coturn' in group_names }}"
  enabled: "{{ 'web-svc-coturn' in group_names }}"
# nocheck: playwright-service-flag — infrastructural sub-component (collaborative editing)
collabora:
  bond: 1
  shared: "{{ 'web-svc-collabora' in group_names }}"
  enabled: "{{ 'web-svc-collabora' in group_names }}"
# nocheck: playwright-service-flag — css consumer, no Playwright surface (provider: web-svc-css)
css:
  bond: 1
  enabled: "{{ 'web-svc-css' in group_names }}"
  shared: "{{ 'web-svc-css' in group_names }}"
prometheus:
  bond: 1
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
# nocheck: playwright-service-flag: prebuilt upstream-compose image, mirror pre-pull only
# nocheck: dynamic-flag: fixed upstream-compose sub-service, not group-gated
bbb-web:
  image: alangecker/bbb-docker-web
  version: "v3.0.23"
  enabled: false
# nocheck: playwright-service-flag: prebuilt upstream-compose image, mirror pre-pull only
# nocheck: dynamic-flag: fixed upstream-compose sub-service, not group-gated
