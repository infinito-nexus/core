---
# nocheck: playwright-service-flag — self-provider
libretranslate:
  modes:
    compose:
      enabled: true
    swarm:
      enabled: true
  bond: 1
  enabled: true
  shared: true
  image: libretranslate/libretranslate
  version: v1.9.6
  custom: true
  min_storage: 5GB
  load_only:
    - en
    - de
  ports:
    local:
      http: 8045
      sso: 16493
    internal:
      http: 5000
  proxy:
    service_key: libretranslate
  lifecycle: beta
  cpus: "0.2"
  mem_reservation: 128m
  mem_limit: 256m
  pids_limit: 256
sso:
  bond: 1
  enabled: "{{ 'web-app-keycloak' in group_names }}"
  shared: "{{ 'web-app-keycloak' in group_names }}"
  flavor: oauth2
  oauth2:
    origin:
      host: libretranslate
      port: 5000
    allowed_groups:
      - "{{ lookup('rbac_group_path', application_id='web-svc-libretranslate', role='administrator') }}"
    # nocheck: dynamic-flag
    acl:
      whitelist:
        - /translate
        - /detect
        - /languages
        - /spec
        - /frontend/settings
        - /api
# nocheck: dynamic-flag
logout:
  enabled: false
  shared: false
matomo:
  bond: 1
  enabled: "{{ 'web-app-matomo' in group_names }}"
  shared: "{{ 'web-app-matomo' in group_names }}"
# nocheck: dynamic-flag
# nocheck: playwright-service-flag — DB engine, covered by role-local integration tests
redis:
  backup:
    disabled: true
  enabled: false
  shared: "{{ 'svc-db-redis' in group_names }}"
# nocheck: playwright-service-flag — css consumer, no Playwright surface (provider: web-svc-css)
css:
  bond: 1
  enabled: "{{ 'web-svc-css' in group_names }}"
  shared: "{{ 'web-svc-css' in group_names }}"
# nocheck: dynamic-flag
# nocheck: playwright-service-flag — captcha backend, infrastructural
recaptcha:
  enabled: false
# nocheck: dynamic-flag
# nocheck: playwright-service-flag — canonical:cdn alias of static-asset provider
javascript:
  enabled: false
  shared: true
prometheus:
  bond: 1
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
