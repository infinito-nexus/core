---
application_id: web-svc-libretranslate # ID of the application

entity_name: "{{ application_id | get_entity_name }}"

LIBRETRANSLATE_SERVICE: "{{ entity_name }}"
LIBRETRANSLATE_IMAGE: "{{ lookup('config', application_id, 'services.libretranslate.image') }}"
LIBRETRANSLATE_VERSION: "{{ lookup('config', application_id, 'services.libretranslate.version') }}"
LIBRETRANSLATE_LOAD_ONLY: "{{ lookup('config', application_id, 'services.libretranslate.load_only') | join(',') }}"
