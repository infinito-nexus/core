---
config_upstream_url: https://ip.bsky.app/config # nocheck: url
status_codes:
  web: [405, 302]
domains:
  aliases: []
  canonical:
    web: web.bluesky.{{ DOMAIN_PRIMARY }}
    api: api.bluesky.{{ DOMAIN_PRIMARY }}
    view: view.bluesky.{{ DOMAIN_PRIMARY }}
csp:
  flags:
    script-src-elem:
      unsafe-inline: true
  whitelist:
    connect-src:
      - "{{ lookup('config', 'web-app-bluesky', 'server.domains.canonical.api') }}"
      - https://plc.directory
      - https://bsky.social
      - https://api.bsky.app
      - https://public.api.bsky.app
      - https://events.bsky.app
      - https://*.workers.bsky.app # nocheck: url
      - https://statsigapi.net # nocheck: url
      - https://ip.bsky.app # nocheck: url
      - https://video.bsky.app
      - https://bsky.app
      - wss://bsky.network
      - wss://*.bsky.app
    media-src:
      - "blob:"
    worker-src:
      - "blob:"
networks:
  local:
    subnet: 192.168.101.64/28
