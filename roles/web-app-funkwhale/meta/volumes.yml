---
media:
  type: volume
  name: funkwhale_media
  mounts:
    - service: celeryworker
      target: /var/lib/funkwhale/media
    - service: celerybeat
      target: /var/lib/funkwhale/media
    - service: api
      target: /var/lib/funkwhale/media
    - service: front
      target: /var/lib/funkwhale/media
      read_only: true

music:
  type: volume
  name: funkwhale_music
  mounts:
    - service: celeryworker
      target: /var/lib/funkwhale/music
      read_only: true
    - service: celerybeat
      target: /var/lib/funkwhale/music
      read_only: true
    - service: api
      target: /var/lib/funkwhale/music
      read_only: true

static:
  type: volume
  name: funkwhale_static
  mounts:
    - service: celeryworker
      target: /var/lib/funkwhale/static
    - service: celerybeat
      target: /var/lib/funkwhale/static
    - service: api
      target: /var/lib/funkwhale/static
    - service: front
      target: /var/lib/funkwhale/static
      read_only: true

typesense_data:
  type: volume
  name: funkwhale_typesense_data
  mounts:
    - service: typesense
      target: /data
