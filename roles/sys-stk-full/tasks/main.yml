---
# nocheck: run-once
- name: "🧊 For '{{ application_id }}': freeze full-stack context"
  ansible.builtin.set_fact:
    sys_stk_full_application_id: "{{ application_id }}"
    sys_stk_full_domain: "{{ lookup('domain', application_id) }}"
    sys_stk_full_http_port: >-
      {{
        lookup(
          'config',
          application_id,
          'services.' ~ (application_id | get_entity_name) ~ '.ports.local.http',
          ''
        )
      }}
  changed_when: false

- name: "📂 '{{ application_id }}': include role sys-stk-front-proxy"
  include_role:
    name: sys-stk-front-proxy
    apply:
      delegate_to: "{{ (groups['svc-prx-openresty'] | default([]))[0] | default(inventory_hostname) }}"
      run_once: true
  vars:
    application_id: "{{ sys_stk_full_application_id }}"
    domain: "{{ sys_stk_full_domain }}"
    http_port: "{{ sys_stk_full_http_port }}"
  when: (groups['svc-prx-openresty'] | default([])) | length > 0

- name: "🧩 For '{{ application_id }}': load docker and db"
  include_role:
    name: sys-stk-backend
  vars:
    application_id: "{{ sys_stk_full_application_id }}"
