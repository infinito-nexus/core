---
- include_tasks: utils/once/flag.yml

- name: "Include dependent services for '{{ system_service_id  }}'"
  include_role:
    name: "{{ item }}"
  loop: "{{ SYSTEMCTL_ALARM_COMPOSER_SUBSERVICES }}"
  vars:
    system_service_timer_enabled: false
    system_service_copy_files: true
    system_service_tpl_exec_start: "{{ system_service_script_exec }} %I"
    system_service_tpl_on_failure: ""
    system_service_force_linear_sync: false

- name: "Include core service for '{{ system_service_id  }}'"
  include_role:
    name: sys-service
  vars:
    system_service_timer_enabled: false
    system_service_copy_files: true
    system_service_tpl_exec_start: "{{ system_service_script_exec }} %I"
    system_service_tpl_exec_start_post: '/bin/echo "Success! Send: %I"'
    system_service_tpl_on_failure: "" # No on failure needed, because it's anyhow the default on failure procedure
    system_service_force_linear_sync: false

- name: Assert '{{ system_service_id }}'
  block:
    - name: Escape instance name for systemctl call
      ansible.builtin.command:
        argv:
          - systemd-escape
          - "{{ SYSTEMCTL_ALARM_COMPOSER_DUMMY_MESSAGE }}"
      register: escaped_name
      changed_when: false

    - name: Start '{{ system_service_id }}' instance
      ansible.builtin.systemd:
        name: "{{ lookup('unit_name',system_service_id, suffix=False) ~ escaped_name.stdout }}.service"
        state: started
  when:
    - MODE_ASSERT | bool
    # Shared-service preloading happens before Mailu exposes its final TLS SMTP
    # listener, so the notifier self-test must wait for the normal app phase.
    - not (_service_loader_preloading | default(false) | bool)
    # Only run the self-test (which sends a real email) when mail can actually be
    # sent: a local relay, or an external provider that provisioned a no-reply
    # account. On a reserved TLD (e.g. .example) Stalwart rejects the domain, so
    # no token exists and this send would fail for an expected reason. Mirrors
    # the sys-ctl-hlth-msmtp guard.
    - >-
      not (lookup('email').external | bool)
      or (lookup('users', 'no-reply').tokens | default({})).get(MAIL_PROVIDER, '') | length > 0
