---
- name: 🚿 Flush handlers to ensure Gitea is up before DB patch
  meta: flush_handlers

- name: 🩹 Patch Gitea DB host in app.ini
  shell: >
    container exec -i --user {{ GITEA_USER }} {{ GITEA_CONTAINER_ADDRESS }}
    sed -ri "s|^(HOST\s*=\s*).*$|\1{{ lookup('database', application_id, 'host') | sed_escape('|') }}:{{ lookup('database', application_id, 'port') | sed_escape('|')
    }}|" {{ GITEA_CONFIG }}
  notify: compose up

- name: 🩹 Patch Gitea DB name in app.ini
  shell: >
    container exec -i --user {{ GITEA_USER }} {{ GITEA_CONTAINER_ADDRESS }}
    sed -ri "s|^(NAME\s*=\s*).*$|\1{{ lookup('database', application_id, 'name') | sed_escape('|') }}|" {{ GITEA_CONFIG }}
  notify: compose up

- name: 🩹 Patch Gitea DB user in app.ini
  shell: >
    container exec -i --user {{ GITEA_USER }} {{ GITEA_CONTAINER_ADDRESS }}
    sed -ri "s|^(USER\s*=\s*).*$|\1{{ lookup('database', application_id, 'username') | sed_escape('|') }}|" {{ GITEA_CONFIG }}
  notify: compose up

- name: 🩹 Patch Gitea DB password in app.ini
  shell: >
    container exec -i --user {{ GITEA_USER }}
    -e PATCH_VALUE={{ lookup('database', application_id, 'password') | sed_escape('|') | quote }}
    {{ GITEA_CONTAINER_ADDRESS }}
    sh -c 'sed -ri "s|^(PASSWD\s*=\s*).*$|\1${PATCH_VALUE}|" {{ GITEA_CONFIG }}'
  notify: compose up

- name: "🚿 Flush database patches"
  meta: flush_handlers
