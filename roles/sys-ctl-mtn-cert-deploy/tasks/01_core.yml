---
- name: "✅ Ensure cert deploy target directory exists"
  file:
    path: "{{ lookup('container', application_id, 'directories.volumes') }}certs"
    state: directory
    mode: "0755"

- include_role:
    name: sys-service
  vars:
    system_service_state: restarted
    system_service_on_calendar: "{{ SYS_SCHEDULE_MAINTANANCE_LETSENCRYPT_DEPLOY }}"
    system_service_timer_enabled: true
    system_service_tpl_on_failure: "{{ SYS_SERVICE_ON_FAILURE_COMPOSE }}"
    # Subsequent tasks may exec into containers from the same compose project.
    # Keep this oneshot cert deployment synchronous to avoid restart races.
    system_service_force_linear_sync: true
    system_service_timer_persistent: true
    system_service_force_flush_instant: true # Required, because otherwise Mailu may doesn't have certificates
    compose_cmd: >-
      {{ BIN_COMPOSE }}
      --chdir {{ lookup('container', application_id, 'directories.instance') }}
      --project {{ (lookup('container', application_id, 'directories.instance') | regex_replace('/+$', '')) | basename }}

# Local: the material the unit just deployed parses, key matches, not expiring.
# Remote: live endpoints from CERT_TEST_REMOTE_ENDPOINTS ("host[:port] ...",
# fed via CI/GitHub variables) so a misconfigured production server fails here.
- name: "✅ Verify deployed certificate material"
  ansible.builtin.command:
    argv:
      - "{{ [ role_path, 'files/test.sh' ] | path_join }}"
      - "{{ lookup('container', application_id, 'directories.instance') }}"
  environment:
    CERT_TEST_REMOTE_ENDPOINTS: "{{ lookup('env', 'CERT_TEST_REMOTE_ENDPOINTS') }}"
  changed_when: false

- name: 📂 Include dependency 'sys-ctl-alm-compose'
  include_role:
    name: sys-ctl-alm-compose
  when: run_once_sys_ctl_alm_compose is not defined

- include_tasks: utils/once/flag.yml
