---
- name: "🔍 Resolve {{ application_id }} hosting node + container id"
  ansible.builtin.include_tasks: "{{ lookup('path_absolute', 'roles/sys-svc-compose/tasks/utils/swarm/resolve_host_cid.yml') }}"
  vars:
    resolve_service_key: fider
    resolve_output_prefix: FIDER
    resolve_compose_cid: "{{ FIDER_CONTAINER }}"

- name: "⏳ Wait for {{ application_id }} HTTP endpoint (compose host-port)"
  wait_for:
    host: "{{ DOCKER_REACH_HOST }}"
    port: "{{ lookup('config', application_id, 'services.fider.ports.local.http') }}"
    delay: 5
    timeout: 300
  when: DEPLOYMENT_MODE == 'compose'

- name: "⏳ Wait for {{ application_id }} HTTP endpoint (swarm in-container)"
  ansible.builtin.shell: > # nocheck: container-exec-resolver  runtime-resolved CID, delegated to the hosting node
    container exec {{ FIDER_LOCAL_CID | quote }} ./fider ping
  register: fider_http_ready
  changed_when: false
  retries: 60
  delay: 5
  until: fider_http_ready.rc == 0
  delegate_to: "{{ FIDER_HOST_NODE }}"
  when: DEPLOYMENT_MODE == 'swarm'

- name: "🔎 Fider | Check if tenant is already initialized"
  database_query:
    config: "{{ lookup('database', application_id) }}"
    query_file: "{{ role_path }}/files/sql/count-tenants.sql"
    expect_rows: true
    mask_values: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"
  register: fider_tenant_count
  changed_when: false

- name: "🥾 Fider | Bootstrap initial tenant via API (compose host-port)"
  uri_retry:
    url: "http://{{ DOCKER_REACH_HOST }}:{{ lookup('config', application_id, 'services.fider.ports.local.http') }}/_api/tenants"
    method: POST
    body_format: json
    body: "{{ FIDER_TENANT_BOOTSTRAP_BODY }}"
    status_code: [200, 201]
  when:
    - DEPLOYMENT_MODE == 'compose'
    - (fider_tenant_count.rows[0][0] | int) == 0

- name: "🥾 Fider | Bootstrap initial tenant via API (swarm, routing-mesh port)"
  uri_retry:
    url: "http://127.0.0.1:{{ lookup('config', application_id, 'services.fider.ports.local.http') }}/_api/tenants"
    method: POST
    body_format: json
    body: "{{ FIDER_TENANT_BOOTSTRAP_BODY }}"
    status_code: [200, 201]
  register: fider_tenant_bootstrap
  changed_when: true
  delegate_to: "{{ FIDER_HOST_NODE }}"
  when:
    - DEPLOYMENT_MODE == 'swarm'
    - (fider_tenant_count.rows[0][0] | int) == 0

- name: "📁 Fider | Create admin user (bypass email verification)"
  database_query:
    config: "{{ lookup('database', application_id) }}"
    query_file: "{{ role_path }}/files/sql/create-admin-user.sql"
    named_args:
      full_name: "{{ lookup('users', 'administrator').firstname }} {{ lookup('users', 'administrator').lastname }}"
      email: "{{ lookup('users', 'administrator').email }}"
    mask_values: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"
  changed_when: true

- name: "🟢 Fider | Activate tenant (set status=1 to bypass email confirmation)"
  database_query:
    config: "{{ lookup('database', application_id) }}"
    query_file: "{{ role_path }}/files/sql/activate-tenants.sql"
    mask_values: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"
  changed_when: true

- name: "🔧 Fider | Configure Keycloak as OIDC provider in database"
  database_query:
    config: "{{ lookup('database', application_id) }}"
    query_file: "{{ role_path }}/files/sql/configure-oidc-provider.sql"
    named_args:
      display_name: "{{ SOFTWARE_NAME }} SSO"
      client_id: "{{ OIDC.CLIENT.ID }}"
      client_secret: "{{ OIDC.CLIENT.SECRET }}"
      authorize_url: "{{ OIDC.CLIENT.AUTHORIZE_URL }}"
      token_url: "{{ OIDC.CLIENT.TOKEN_URL }}"
      profile_url: "{{ OIDC.CLIENT.USER_INFO_URL }}"
    mask_values: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"
  changed_when: true
