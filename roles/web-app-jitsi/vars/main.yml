---
application_id: "web-app-jitsi"
entity_name: "{{ application_id | get_entity_name }}"

JITSI_WEB_SERVICE: "web"
JITSI_PROSODY_SERVICE: "prosody"
JITSI_JICOFO_SERVICE: "jicofo"
JITSI_JVB_SERVICE: "jvb"

JITSI_WEB_CONTAINER: "{{ lookup('config', application_id, 'services.' ~ JITSI_WEB_SERVICE ~ '.name') }}"
JITSI_PROSODY_CONTAINER: "{{ lookup('config', application_id, 'services.' ~ JITSI_PROSODY_SERVICE ~ '.name') }}"
JITSI_JICOFO_CONTAINER: "{{ lookup('config', application_id, 'services.' ~ JITSI_JICOFO_SERVICE ~ '.name') }}"
JITSI_JVB_CONTAINER: "{{ lookup('config', application_id, 'services.' ~ JITSI_JVB_SERVICE ~ '.name') }}"

JITSI_JVB_MEDIA_PORT: "{{ lookup('config', application_id, 'services.jitsi.ports.public.media') }}"

JITSI_PROSODY_XMPP_PORT: "{{ lookup('config', application_id, 'services.' ~ JITSI_PROSODY_SERVICE ~ '.ports.internal.xmpp') }}"
JITSI_PROSODY_COMPONENT_PORT: "{{ lookup('config', application_id, 'services.' ~ JITSI_PROSODY_SERVICE ~ '.ports.internal.component') }}"
JITSI_PROSODY_HTTP_PORT: "{{ lookup('config', application_id, 'services.' ~ JITSI_PROSODY_SERVICE ~ '.ports.internal.http') }}"

JITSI_PUBLIC_URL: "{{ lookup('tls', application_id, 'url.base') }}"

JITSI_VOLUMES_DIR: "{{ lookup('container', application_id, 'directories.volumes') }}"
JITSI_PROSODY_CONFIG_HOST_PATH: "{{ JITSI_VOLUMES_DIR }}prosody-config"
JITSI_PROSODY_PLUGINS_HOST_PATH: "{{ JITSI_VOLUMES_DIR }}prosody-plugins-custom"

JITSI_OIDC_ENABLED: "{{ lookup('config', application_id, 'services.sso.enabled')  | bool }}"
JITSI_LDAP_ENABLED: "{{ lookup('config', application_id, 'services.ldap.enabled') | bool }}"

JITSI_XMPP_DOMAIN: "meet.jitsi"
JITSI_XMPP_AUTH_DOMAIN: "auth.meet.jitsi"
JITSI_XMPP_GUEST_DOMAIN: "guest.meet.jitsi"
JITSI_XMPP_MUC_DOMAIN: "muc.meet.jitsi"
JITSI_XMPP_INTERNAL_MUC_DOMAIN: "internal-muc.meet.jitsi"
JITSI_XMPP_RECORDER_DOMAIN: "recorder.meet.jitsi"

JITSI_JICOFO_COMPONENT_SECRET: "{{ lookup('config', application_id, 'credentials.jicofo_component_secret') }}"
JITSI_JICOFO_AUTH_PASSWORD: "{{ lookup('config', application_id, 'credentials.jicofo_auth_password') }}"
JITSI_JVB_AUTH_PASSWORD: "{{ lookup('config', application_id, 'credentials.jvb_auth_password') }}"
JITSI_JIGASI_XMPP_PASSWORD: "{{ lookup('config', application_id, 'credentials.jigasi_xmpp_password') }}"
JITSI_JIBRI_RECORDER_PASSWORD: "{{ lookup('config', application_id, 'credentials.jibri_recorder_password') }}"
JITSI_JIBRI_XMPP_PASSWORD: "{{ lookup('config', application_id, 'credentials.jibri_xmpp_password') }}"

JITSI_AUTH_TYPE: "{{ 'ldap' if (JITSI_LDAP_ENABLED and not JITSI_OIDC_ENABLED) else 'internal' }}"
JITSI_ENABLE_AUTH: "{{ JITSI_AUTH_TYPE != 'internal' }}"
JITSI_ENABLE_GUESTS: false
