---
data:
  type: volume
  name: joomla_data
  mounts:
    - service: application
      target: /var/www/html

php_upload:
  type: config
  source: "{{ [lookup('container', 'web-app-joomla', 'directories.instance'), 'php-upload.ini'] | path_join }}"
  mode: "0440"
  mounts:
    - service: application
      target: /usr/local/etc/php/conf.d/uploads.ini
