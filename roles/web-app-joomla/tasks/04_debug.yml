---
- name: "🐛 Toggle Joomla debug flags safely (configuration.php)"
  shell: >
    container exec -i
    -e J_CONFIG_FILE={{ JOOMLA_CONFIG_FILE | quote }}
    -e J_MODE_DEBUG={{ MODE_DEBUG | bool | ternary('1','0') }}
    -e J_ERR_LEVEL={{ MODE_DEBUG | bool | ternary('maximum','default') }}
    {{ JOOMLA_CONTAINER_ADDRESS }} php --
  args:
    stdin: "{{ lookup('file', role_path ~ '/files/php/toggle_debug.php') }}"
  register: j_cfg_debug
  changed_when: (j_cfg_debug.stdout | trim) == "changed"
  failed_when: j_cfg_debug.rc != 0
