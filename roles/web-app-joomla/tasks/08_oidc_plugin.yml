---
- name: "📌 Define OIDC plugin paths"
  ansible.builtin.set_fact:
    JOOMLA_OIDC_PLUGIN_HOST_DIR: "{{ role_path }}/files/joomla-oidc-plugin"
    JOOMLA_OIDC_PLUGIN_BUILD_DIR: "/tmp/plg_system_keycloak"
    JOOMLA_OIDC_PLUGIN_ZIP: "/tmp/plg_system_keycloak.zip"

- name: "♻️ Reset plugin build dir inside Joomla container"
  ansible.builtin.shell: >
    container exec {{ JOOMLA_CONTAINER_ADDRESS }} rm -rf {{ JOOMLA_OIDC_PLUGIN_BUILD_DIR | quote }}
  changed_when: false
  failed_when: false

- name: "📋 Stream plugin source into Joomla container"
  ansible.builtin.shell: >
    base64 -d | container exec -i {{ JOOMLA_CONTAINER_ADDRESS }}
    sh -c 'mkdir -p {{ JOOMLA_OIDC_PLUGIN_BUILD_DIR }} && tar -xzf - -C {{ JOOMLA_OIDC_PLUGIN_BUILD_DIR }}'
  args:
    stdin: "{{ lookup('pipe', 'tar -C ' ~ ((JOOMLA_OIDC_PLUGIN_HOST_DIR ~ '/plg_system_keycloak') | quote) ~ ' -czf - . | base64') }}"
  changed_when: true

- name: "📦 composer install (vendor jumbojett/openid-connect-php inside container)"
  ansible.builtin.shell: >
    container exec
    -e COMPOSER_HOME=/tmp/composer-home
    -e COMPOSER_ALLOW_SUPERUSER=1
    {{ JOOMLA_CONTAINER_ADDRESS }} composer install
    --working-dir={{ JOOMLA_OIDC_PLUGIN_BUILD_DIR | quote }}
    --no-dev --no-interaction --no-progress --prefer-dist --optimize-autoloader
  changed_when: true

- name: "✅ Ensure Joomla cache directories are writable by the web user"
  ansible.builtin.shell: "container exec {{ JOOMLA_CONTAINER_ADDRESS }} bash -lc 'mkdir -p /var/www/html/administrator/cache /var/www/html/cache /var/www/html/tmp
    && chown -R {{ JOOMLA_WEB_USER }}:{{ JOOMLA_WEB_USER }} /var/www/html/administrator/cache /var/www/html/cache /var/www/html/tmp && chmod -R u+rwX /var/www/html/administrator/cache
    /var/www/html/cache /var/www/html/tmp'"
  changed_when: false

- name: "🗜️ Package plugin into a ZIP for Joomla CLI install"
  ansible.builtin.shell: >
    container exec -i
    -e J_ZIP={{ JOOMLA_OIDC_PLUGIN_ZIP | quote }}
    -e J_BUILD_DIR={{ JOOMLA_OIDC_PLUGIN_BUILD_DIR | quote }}
    {{ JOOMLA_CONTAINER_ADDRESS }} php --
  args:
    stdin: "{{ lookup('file', role_path ~ '/files/php/package_plugin.php') }}"
  changed_when: true

- name: "📦 Install plg_system_keycloak via Joomla CLI"
  ansible.builtin.shell: >
    container exec --user {{ JOOMLA_WEB_USER | quote }} {{ JOOMLA_CONTAINER_ADDRESS }}
    php -d memory_limit=512M {{ JOOMLA_CLI_FILE | quote }}
    extension:install --path={{ JOOMLA_OIDC_PLUGIN_ZIP | quote }}
  register: plugin_install
  changed_when: "'Extension installed successfully' in plugin_install.stdout"
  failed_when:
    - plugin_install.rc != 0
    - plugin_install.stdout | default('') is not search('already')

- name: "🔍 Resolve plg_system_keycloak extension ID"
  ansible.builtin.shell: "container exec --user {{ JOOMLA_WEB_USER }} {{ JOOMLA_CONTAINER_ADDRESS }} php -d memory_limit=512M {{ JOOMLA_CLI_FILE }} extension:list
    | awk '/plg_system_keycloak/ {print $2; exit}'"
  register: plugin_id_lookup
  changed_when: false
  failed_when: plugin_id_lookup.stdout | trim | length == 0

- name: "🟢 Enable plg_system_keycloak via Joomla CLI"
  ansible.builtin.shell: >
    container exec --user {{ JOOMLA_WEB_USER | quote }} {{ JOOMLA_CONTAINER_ADDRESS }}
    php -d memory_limit=512M {{ JOOMLA_CLI_FILE | quote }}
    extension:enable {{ plugin_id_lookup.stdout | trim | quote }}
  register: plugin_enable
  changed_when: "'has been enabled' in plugin_enable.stdout or 'enabled successfully' in plugin_enable.stdout"
  failed_when:
    - plugin_enable.rc != 0
    - plugin_enable.stdout | default('') is not search('already')
