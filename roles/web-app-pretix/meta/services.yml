---
# nocheck: seaweedfs-required — open-source pretix has no S3/object-store backend: src/pretix/settings.py hardcodes MEDIA_ROOT=DATA_DIR/media (local disk), ships no django-storages/boto3, and the upstream config reference (https://docs.pretix.eu/self-hosting/config/) documents no storage/S3/bucket section
sso:
  bond: 1
  enabled: "{{ 'web-app-keycloak' in group_names }}"
  shared: "{{ 'web-app-keycloak' in group_names }}"
  flavor: oidc
logout:
  bond: 1
  enabled: "{{ 'web-svc-logout' in group_names }}"
  shared: "{{ 'web-svc-logout' in group_names }}"
dashboard:
  bond: 1
  enabled: "{{ 'web-app-dashboard' in group_names }}"
  shared: "{{ 'web-app-dashboard' in group_names }}"
matomo:
  bond: 1
  enabled: "{{ 'web-app-matomo' in group_names }}"
  shared: "{{ 'web-app-matomo' in group_names }}"
email:
  bond: 1
  enabled: "{{ 'web-app-mailu' in group_names }}"
  shared: "{{ 'web-app-mailu' in group_names }}"
# nocheck: shared
# nocheck: dynamic-flag
# nocheck: playwright-service-flag — Redis cache, no Playwright surface
redis:
  bond: 1
  backup:
    disabled: true
  enabled: true
  shared: "{{ 'svc-db-redis' in group_names }}"
  cpus: "0.5"
  mem_reservation: 128m
  mem_limit: 512m
  pids_limit: 512
# nocheck: playwright-service-flag — DB engine, no Playwright surface (role-local integration tests)
postgres:
  bond: 1
  enabled: true # nocheck: dynamic-flag
  shared: "{{ 'svc-db-postgres' in group_names }}"
pretix:
  image: pretix/standalone
  version: stable
  name: pretix
  min_storage: 10GB
  backup:
    no_stop_required: true
  cpus: "2.0"
  mem_reservation: 1.5g
  mem_limit: 2g
  pids_limit: 1024
  ports:
    local:
      http: 8046
    internal:
      http: 80
  run_after:
    - web-app-matomo
    - web-app-keycloak
    - web-app-mailu
  lifecycle: beta
# nocheck: playwright-service-flag — CSS consumer, no Playwright surface (provider: web-svc-css)
css:
  bond: 1
  enabled: "{{ 'web-svc-css' in group_names }}"
  shared: "{{ 'web-svc-css' in group_names }}"
prometheus:
  bond: 1
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
