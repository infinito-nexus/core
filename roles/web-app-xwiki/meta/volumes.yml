---
data:
  type: volume
  name: xwiki_data
  mounts:
    - service: application
      target: /usr/local/xwiki

properties:
  type: config
  source: "{{ [lookup('container', 'web-app-xwiki', 'directories.config'), 'xwiki.properties'] | path_join }}"
  mode: "0440"
  mounts:
    - service: application
      target: /usr/local/tomcat/webapps/ROOT/WEB-INF/xwiki.properties
