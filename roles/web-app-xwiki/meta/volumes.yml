---
data:
  type: volume
  name: xwiki_data
  mounts:
    - service: xwiki
      target: /usr/local/xwiki

properties:
  type: config
  name: "xwiki_properties_{{ 'oidc' if xwiki_oidc_enabled_switch | default(false) | bool else 'std' }}"
  source: "{{ [lookup('container', 'web-app-xwiki', 'directories.config'), 'xwiki.properties'] | path_join }}"
  mode: "0444"
  mounts:
    - service: xwiki
      target: /etc/infinito/xwiki.properties
