---
- include_tasks: utils/once/flag.yml

- name: ✅ Validate XWiki variables
  include_tasks: 02_validation.yml

- block:
    - name: "🧩 load docker, db and proxy for {{ application_id }}"
      include_role:
        name: sys-stk-full
      vars:
        compose_handlers_flush: false

    - name: "🎬 Stage the XWiki entrypoint wrapper into the compose build context"
      stack_host_copy:
        src: xwiki-entrypoint.sh
        dest: "{{ [ lookup('container', application_id, 'directories.instance'), 'xwiki-entrypoint.sh' ] | path_join }}"
        mode: "0755"
      when: IS_STACK_HOST | bool
      notify:
        - compose build
        - compose up

    - name: 🚀 Deploy Bootstrap Config
      include_tasks: _flush_config.yml
      when: IS_STACK_HOST | bool
  vars:
    xwiki_oidc_enabled_switch: false
    xwiki_ldap_enabled_switch: false

- name: "👔 XWiki manager-side operations (file deploys + container exec)"
  include_tasks: 02_manager_ops.yml
  when: IS_STACK_HOST | bool

- include_tasks: utils/once/flag.yml
