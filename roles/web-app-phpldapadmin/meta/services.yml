---
logout:
  bond: 1
  enabled: "{{ 'web-svc-logout' in group_names }}"
  shared: "{{ 'web-svc-logout' in group_names }}"
ldap:
  bond: 1
  enabled: true # nocheck: dynamic-flag
  shared: true # nocheck: dynamic-flag — LDAP IS the storage backend, never local
dashboard:
  bond: 1
  enabled: "{{ 'web-app-dashboard' in group_names }}"
  shared: "{{ 'web-app-dashboard' in group_names }}"
matomo:
  bond: 1
  enabled: "{{ 'web-app-matomo' in group_names }}"
  shared: "{{ 'web-app-matomo' in group_names }}"
phpldapadmin:
  modes:
    compose:
      enabled: true
    swarm:
      enabled: true
  image: phpldapadmin/phpldapadmin
  version: 2.3.11
  min_storage: 1GB
  ports:
    local:
      sso: 16486
      http: 8037
    internal:
      http: 8080
  run_after:
    - web-app-matomo
    - web-app-keycloak
  lifecycle: eol
  cpus: "0.2"
  mem_reservation: 128m
  mem_limit: 256m
  pids_limit: 256
sso:
  bond: 1
  enabled: "{{ 'web-app-keycloak' in group_names }}"
  shared: "{{ 'web-app-keycloak' in group_names }}"
  flavor: oauth2
  oauth2:
    origin:
      host: phpldapadmin
      port: 8080
    allowed_groups:
      - "{{ lookup('rbac_group_path', application_id='web-app-phpldapadmin', role='administrator') }}"
css:
  bond: 1
  enabled: "{{ 'web-svc-css' in group_names }}"
  shared: "{{ 'web-svc-css' in group_names }}"
prometheus:
  bond: 1
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
