---
# nocheck: playwright-service-flag — mirror does not appear as a dashboard tile
# nocheck: dynamic-flag
dashboard:
  enabled: false
# nocheck: playwright-service-flag — self-provider
mirror:
  bond: 1
  enabled: true
  shared: true
  cpus: "0.2"
  mem_reservation: 64m
  mem_limit: 128m
  pids_limit: 64
  min_storage: "1GB"
  lifecycle: alpha
# nocheck: playwright-service-flag — /metrics endpoint covered by web-app-prometheus's own spec
prometheus:
  bond: 1
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
# nocheck: playwright-service-flag
tor:
  bond: 1
  enabled: "{{ 'svc-net-tor' in group_names }}"
  shared: true # nocheck: dynamic-flag
