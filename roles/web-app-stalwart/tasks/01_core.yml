---
- include_tasks: utils/once/flag.yml

- name: "Disable SMTP to avoid port conflicts"
  include_tasks: "{{ [playbook_dir, 'roles/sys-svc-mail-smtp/tasks/disable.yml' ] | path_join }}"

- name: Ensure Stalwart config directory exists
  file:
    path: "{{ STALWART_CONFIG_DIR }}"
    state: directory
    mode: "0755"

- name: Render Stalwart bootstrap configuration
  template:
    src: config.json.j2
    dest: "{{ STALWART_CONFIG_FILE }}"
    # Must be world-readable: the container runs as UID 2000.
    mode: "0644"

- name: Ensure Roundcube custom-config directory exists
  file:
    path: "{{ STALWART_WEBMAIL_CONFIG_DIR }}"
    state: directory
    mode: "0755"
  when: STALWART_SSO_ENABLED | bool

- name: Render Roundcube OAuth (Keycloak SSO) configuration
  template:
    src: roundcube-oauth.inc.php.j2
    dest: "{{ STALWART_WEBMAIL_OAUTH_CONFIG }}"
    # Included by the roundcube container, which runs as www-data.
    mode: "0644"
  when: STALWART_SSO_ENABLED | bool

- name: "load docker, db and proxy for {{ application_id }}"
  include_role:
    name: sys-stk-full
  vars:
    compose_handlers_flush: true
    webserver_vhost_flavour: "basic"
    webserver_extra_configuration: "client_max_body_size 31M;"
    domain: "{{ STALWART_HOSTNAME }}"

- name: "Flush Docker Compose handlers"
  meta: flush_handlers

- name: "Proxy the Roundcube webmail at {{ STALWART_WEBMAIL_DOMAIN }}"
  include_role:
    name: sys-stk-front-proxy
  vars:
    domain: "{{ STALWART_WEBMAIL_DOMAIN }}"
    http_port: "{{ STALWART_WEBMAIL_HTTP_PORT }}"
    webserver_vhost_flavour: "basic"

- name: Wait for Stalwart database and management API
  include_tasks: 02_wait_for_api.yml

# Provision the mail domain, accounts, DKIM and DNS via the Stalwart JMAP API.
- name: "Provision Stalwart mail domain, accounts, DKIM and DNS"
  include_tasks: 03_provision_domain.yml
