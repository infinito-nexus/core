---
# Register the ClamAV container as a DATA-stage milter (idempotent by hostname).
# Short timeouts + fail-open keep mail flowing while clamd warms up.
- name: "📖 List existing Stalwart milters"
  include_tasks: jmap_call.yml
  vars:
    stalwart_jmap_body: >-
      {{ {'using': ['urn:ietf:params:jmap:core', 'urn:stalwart:jmap'],
          'methodCalls': [['x:MtaMilter/get', {'ids': none}, 'c0']]} | to_json }}

- name: "🔍 Resolve existing ClamAV milter id (if any)"
  ansible.builtin.set_fact:
    stalwart_av_milter_id: >-
      {{ (stalwart_jmap.methodResponses[0][1].list
          | selectattr('hostname', 'equalto', STALWART_CLAMAV_HOST)
          | map(attribute='id') | first) | default('') }}

- name: "📁 Create the ClamAV milter"
  include_tasks: jmap_call.yml
  vars:
    stalwart_jmap_body: >-
      {{ {'using': ['urn:ietf:params:jmap:core', 'urn:stalwart:jmap'],
          'methodCalls': [['x:MtaMilter/set', {'create': {'av': {
            'hostname': STALWART_CLAMAV_HOST,
            'port': STALWART_CLAMAV_MILTER_PORT,
            'stages': {'data': true},
            'tempFailOnError': false,
            'timeoutConnect': STALWART_CLAMAV_MILTER_TIMEOUT_CONNECT_MS,
            'timeoutCommand': STALWART_CLAMAV_MILTER_TIMEOUT_COMMAND_MS,
            'timeoutData': STALWART_CLAMAV_MILTER_TIMEOUT_DATA_MS
          }}}, 'c0']]} | to_json }}
  when: stalwart_av_milter_id | length == 0

- name: "🔄 Update the ClamAV milter timeouts (fail-open on slow/cold clamd)"
  include_tasks: jmap_call.yml
  vars:
    stalwart_jmap_body: >-
      {{ {'using': ['urn:ietf:params:jmap:core', 'urn:stalwart:jmap'],
          'methodCalls': [['x:MtaMilter/set', {'update': {stalwart_av_milter_id: {
            'tempFailOnError': false,
            'timeoutConnect': STALWART_CLAMAV_MILTER_TIMEOUT_CONNECT_MS,
            'timeoutCommand': STALWART_CLAMAV_MILTER_TIMEOUT_COMMAND_MS,
            'timeoutData': STALWART_CLAMAV_MILTER_TIMEOUT_DATA_MS
          }}}, 'c0']]} | to_json }}
  when: stalwart_av_milter_id | length > 0
