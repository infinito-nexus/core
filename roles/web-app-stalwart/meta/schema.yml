---
credentials:
  database_password:
    description: Password for the Stalwart PostgreSQL database user
    algorithm: bcrypt
    validation: ^\$2[aby]\$.{56}$
  admin_password:
    description: Fallback administrator password for the Stalwart WebAdmin and management REST API (used for domain/account/token provisioning)
    algorithm: sha256
    validation: ^[a-f0-9]{64}$
