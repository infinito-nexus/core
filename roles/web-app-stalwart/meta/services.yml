---
# nocheck: seaweedfs-required — object storage not implemented for this role
sso:
  bond: 1
  enabled: "{{ 'web-app-keycloak' in group_names }}"
  shared: "{{ 'web-app-keycloak' in group_names }}"
  flavor: oidc
  oidc:
    email_by_username: true
    enable_user_creation: true
    # Under SSO, Stalwart disables password submission, so the no-reply bot
    # relays without SMTP AUTH (see plugins/lookup/email.py). Mailu omits this.
    submission_via_relay: true
logout:
  bond: 1
  enabled: "{{ 'web-svc-logout' in group_names }}"
  shared: "{{ 'web-svc-logout' in group_names }}"
dashboard:
  bond: 1
  enabled: "{{ 'web-app-dashboard' in group_names }}"
  shared: "{{ 'web-app-dashboard' in group_names }}"
matomo:
  bond: 1
  enabled: "{{ 'web-app-matomo' in group_names }}"
  shared: "{{ 'web-app-matomo' in group_names }}"
# nocheck: playwright-service-flag — self-provider
stalwart:
  bond: 1
  enabled: true
  shared: true
  provides: email
  image: stalwartlabs/stalwart
  version: "v0.16.12"
  name: stalwart
  min_storage: 20GB
  domain: "{{ lookup('email').domain }}"
  ports:
    local:
      http: 8081
  run_after:
    - web-app-matomo
  lifecycle: beta
  cpus: "1.0"
  mem_reservation: 512m
  mem_limit: 2g
  pids_limit: 1024
# nocheck: playwright-service-flag — DB engine, covered by role-local integration tests
postgres:
  bond: 1
  enabled: true # nocheck: dynamic-flag
  shared: "{{ 'svc-db-postgres' in group_names }}"
  cpus: "0.8"
  mem_reservation: 1g
  mem_limit: 2g
  pids_limit: 512
# nocheck: dynamic-flag — role-local sub-component, always deployed with the stack
# nocheck: playwright-service-flag — internal sub-component
webmail:
  enabled: true
  shared: false
  image: roundcube/roundcubemail
  version: "1.7.2-apache"
  cpus: "0.3"
  mem_reservation: 256m
  mem_limit: 1g
  pids_limit: 512
  ports:
    local:
      http: 8089
# nocheck: dynamic-flag — role-local sub-component, always deployed with the stack
# nocheck: playwright-service-flag — antivirus milter, covered by role deploy test
clamav:
  enabled: true
  shared: false
  image: clamav/clamav
  version: "1.5.3"
  # clamd holds the full signature DB in memory.
  cpus: "1.0"
  mem_reservation: 1g
  mem_limit: 3g
  pids_limit: 512
# nocheck: playwright-service-flag — verified by web-svc-css provider spec
css:
  bond: 1
  enabled: "{{ 'web-svc-css' in group_names }}"
  shared: "{{ 'web-svc-css' in group_names }}"
prometheus:
  bond: 1
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
