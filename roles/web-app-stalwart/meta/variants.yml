---
# Matrix-deploy variant overrides for web-app-stalwart.
# See docs/contributing/artefact/files/role/variants.md for the file format.

# Two variants pin every dynamic services.yml flag on then off, so the matrix
# exercises both the in-group_names and not-in-group_names branches (required by
# tests/integration/roles/meta/variants/test_coverage.py). For a single-round
# local deploy, pin one: `make compose-deploy apps=web-app-stalwart variant=0`.

- services:
    css:
      enabled: true
      shared: true
    dashboard:
      enabled: true
      shared: true
    logout:
      enabled: true
      shared: true
    postgres:
      shared: true
    matomo:
      enabled: true
      shared: true
    sso:
      enabled: true
      shared: true
    prometheus:
      enabled: true
      shared: true
- services:
    css:
      enabled: false
      shared: false
    dashboard:
      enabled: false
      shared: false
    logout:
      enabled: false
      shared: false
    postgres:
      shared: false
    matomo:
      enabled: false
      shared: false
    sso:
      enabled: false
      shared: false
    prometheus:
      enabled: false
      shared: false
