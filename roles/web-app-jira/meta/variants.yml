---
# Matrix-deploy variant overrides for this role.
# See docs/contributing/artefact/files/role/variants.md for the file format.

# variant 0: Atlassian Jira does not expose a fully automatable
# initial-setup endpoint, so the canonical reachability probe sees
# the setup wizard at /; assert against the 302 redirect chain
# instead of the default 200.

- server:
    status_codes:
      default: 302
  services:
    container_backup:
      enabled: true
    dashboard:
      enabled: true
      shared: true
    logout:
      enabled: true
      shared: true
    matomo:
      enabled: true
      shared: true
    postgres:
      shared: true
    prometheus:
      enabled: true
      shared: true
    css:
      enabled: true
      shared: true
- services:
    container_backup:
      enabled: true
    dashboard:
      enabled: false
      shared: false # nocheck: variants-static-override backup shared stays literally true
    logout:
      enabled: false
      shared: false # nocheck: variants-static-override backup shared stays literally true
    matomo:
      enabled: false
      shared: false # nocheck: variants-static-override backup shared stays literally true
    postgres:
      shared: false # nocheck: variants-static-override backup shared stays literally true
    prometheus:
      enabled: false
      shared: false # nocheck: variants-static-override backup shared stays literally true
    css:
      enabled: false
      shared: false # nocheck: variants-static-override backup shared stays literally true
