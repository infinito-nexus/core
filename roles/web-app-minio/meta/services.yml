---
sso:
  bond: 1
  enabled: "{{ 'web-app-keycloak' in group_names }}"
  shared: "{{ 'web-app-keycloak' in group_names }}"
  flavor: oidc
ldap:
  bond: 1
  enabled: "{{ 'svc-db-openldap' in group_names }}"
  shared: "{{ 'svc-db-openldap' in group_names }}"
logout:
  bond: 1
  enabled: "{{ 'web-svc-logout' in group_names }}"
  shared: "{{ 'web-svc-logout' in group_names }}"
dashboard:
  bond: 1
  enabled: "{{ 'web-app-dashboard' in group_names }}"
  shared: "{{ 'web-app-dashboard' in group_names }}"
matomo:
  bond: 1
  enabled: "{{ 'web-app-matomo' in group_names }}"
  shared: "{{ 'web-app-matomo' in group_names }}"
# nocheck: playwright-service-flag — central object-store provider entity
minio:
  modes:
    compose:
      enabled: true
    swarm:
      enabled: true
  # nocheck: single-replica
  replicas: 1
  bond: 1
  enabled: true
  shared: true
  backup:
    no_stop_required: false
  image: quay.io/minio/minio
  version: "RELEASE.2025-09-07T16-13-09Z" # nocheck: docker-version
  name: minio
  api_port: 9000
  region: us-east-1
  min_storage: 20GB
  cpus: "2.0"
  mem_reservation: 2g
  mem_limit: 4g
  pids_limit: 2048
  run_after:
    - web-app-keycloak
    - web-app-matomo
  lifecycle: eol
# nocheck: dynamic-flag
# nocheck: playwright-service-flag — DB engine, covered by role-local integration tests
redis:
  backup:
    disabled: true
  enabled: false
# nocheck: playwright-service-flag — css consumer, no Playwright surface (provider: web-svc-css)
css:
  bond: 1
  enabled: "{{ 'web-svc-css' in group_names }}"
  shared: "{{ 'web-svc-css' in group_names }}"
# nocheck: dynamic-flag
# nocheck: playwright-service-flag — canonical:cdn alias of static-asset provider
javascript:
  enabled: false
  shared: true
# nocheck: playwright-service-flag — AI backend, infrastructural
ollama:
  bond: 1
  enabled: "{{ 'svc-ai-ollama' in group_names }}"
  shared: "{{ 'svc-ai-ollama' in group_names }}"
prometheus:
  bond: 1
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
api:
  ports:
    local:
      http: 8057
    internal:
      http: 9000
  min_storage: 5GB
  cpus: "0.5"
  mem_reservation: 256m
  mem_limit: 1g
  pids_limit: 512
console:
  ports:
    local:
      http: 8058
    internal:
      http: 9001
  min_storage: 1GB
  cpus: "0.2"
  mem_reservation: 128m
  mem_limit: 256m
  pids_limit: 256
# nocheck: playwright-service-flag — mc admin client, run as a one-shot, no Playwright surface
client:
  image: quay.io/minio/mc
  version: "RELEASE.2025-08-13T08-35-41Z" # nocheck: docker-version
  cpus: "0.2"
  mem_reservation: 128m
  mem_limit: 256m
  pids_limit: 256
# nocheck: dynamic-flag
# nocheck: playwright-service-flag, dynamic-flag infrastructure backup consumer
container_backup: # nocheck: bond-baseline backup host joins outside the variant topology
  bond: 1
  enabled: "{{ 'svc-bkp-volume-2-local' in group_names }}"
  shared: true
