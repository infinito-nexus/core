---
status_codes:
  api: 400
  console: 200
domains:
  canonical:
    console: console.minio.s3.{{ DOMAIN_PRIMARY }}
    api: api.minio.s3.{{ DOMAIN_PRIMARY }}
  aliases: []
csp:
  flags: {}
  whitelist:
    font-src: []
    connect-src: []
networks:
  local:
    subnet: 192.168.37.0/24
  overlay:
    modes: [compose, swarm]
    topology: shared_net
    consumer:
      key: minio
