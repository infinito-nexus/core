---
- name: "🧩 load docker, db and proxy for '{{ application_id }}'"
  include_role:
    name: sys-stk-full
  vars:
    compose_handlers_flush: false

- name: "📂 Load install procedures for '{{ application_id }}'"
  include_tasks: 01_configuration.yml

- name: "🐳 Finalize compose deploy for '{{ application_id }}'"
  include_tasks: "{{ lookup('path_absolute', 'roles/sys-svc-compose/tasks/utils/finalize.yml') }}"

- name: "🔍 Resolve {{ application_id }} hosting node + container id"
  ansible.builtin.include_tasks: "{{ lookup('path_absolute', 'roles/sys-svc-compose/tasks/utils/swarm/resolve_host_cid.yml') }}"
  vars:
    resolve_service_key: mediawiki
    resolve_output_prefix: MEDIAWIKI
    resolve_compose_cid: "{{ MEDIAWIKI_CONTAINER }}"
  when: IS_STACK_HOST | bool

- name: "📂 Load extensions procedures for '{{ application_id }}'"
  include_tasks:
    file: "02_extensions.yml"
    apply:
      delegate_to: "{{ MEDIAWIKI_HOST_NODE }}"
  when:
    - MEDIAWIKI_OIDC_ENABLED | bool
    - IS_STACK_HOST | bool

- name: "📂 Load update procedures for '{{ application_id }}'"
  include_tasks: 03_install.yml
  when:
    - IS_STACK_HOST | bool
    - >-
      (_role_templates_render.changed | default(false)) or
      (_install_results.changed | default(false)) or
      (_ext_composer.changed | default(false)) or
      (_vendor.changed | default(false))

- name: "📂 Load admin setup procedures for '{{ application_id }}'"
  include_tasks: 04_admin.yml
