---
- name: "MEDIAWIKI | (swarm) Ensure host directories exist on {{ _swarm_peer }}"
  ansible.builtin.file:
    path: "{{ dir.path }}"
    state: directory
    mode: "0755"
  loop:
    - path: "{{ MEDIAWIKI_LOCAL_MOUNT_DIR }}"
    - path: "{{ MEDIAWIKI_CONFIG_DIR }}"
  loop_control:
    loop_var: dir
    label: "{{ dir.path }}"
  delegate_to: "{{ _swarm_peer }}"

- name: "MEDIAWIKI | (swarm) Render host-side PHP config files on {{ _swarm_peer }}"
  ansible.builtin.template:
    src: "{{ cfg.src }}"
    dest: "{{ cfg.dest }}"
    owner: root
    group: "{{ MEDIAWIKI_USER_GID }}"
    mode: "0640"
  loop:
    - src: "oidc.php.j2"
      dest: "{{ MEDIAWIKI_LOCAL_MOUNT_DIR }}/oidc.php"
      when: "{{ MEDIAWIKI_OIDC_ENABLED | bool }}"
    - src: "debug.php.j2"
      dest: "{{ MEDIAWIKI_LOCAL_MOUNT_DIR }}/debug.php"
      when: true
    - src: "LocalSettings.php.j2"
      dest: "{{ MEDIAWIKI_LOCALSETTINGS_HOST_PATH }}"
      when: true
  loop_control:
    loop_var: cfg
    label: "{{ cfg.dest | basename }}"
  when: cfg.when | bool
  no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"
  delegate_to: "{{ _swarm_peer }}"
