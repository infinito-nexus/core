---
- name: "MEDIAWIKI | Ensure required host directories exist (local)"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ MEDIAWIKI_LOCAL_MOUNT_DIR }}"
    - "{{ MEDIAWIKI_CONFIG_DIR }}"

- name: "[swarm] MEDIAWIKI | Ensure required host directories exist on swarm peers"
  ansible.builtin.file:
    path: "{{ item.0 }}"
    state: directory
    mode: "0755"
  loop: >-
    {{
      [MEDIAWIKI_LOCAL_MOUNT_DIR, MEDIAWIKI_CONFIG_DIR]
      | product((groups['svc-docker-swarm'] | default([])) | difference([inventory_hostname]))
      | list
    }}
  loop_control:
    label: "{{ item.0 }} -> {{ item.1 }}"
  when: deployment_mode == 'swarm'
  delegate_to: "{{ item.1 }}"

- name: "MEDIAWIKI | Render host-side PHP config files (local + swarm peers)"
  ansible.builtin.include_tasks:
    file: "{{ [playbook_dir, 'roles/sys-svc-compose/tasks/utils/render_replicated_templates.yml'] | path_join }}"
  vars:
    role_templates:
      - src: "oidc.php.j2"
        dest: "{{ MEDIAWIKI_LOCAL_MOUNT_DIR }}/oidc.php"
        owner: "root"
        group: "{{ MEDIAWIKI_USER_GID }}"
        mode: "0640"
        when: "{{ MEDIAWIKI_OIDC_ENABLED | bool }}"
      - src: "debug.php.j2"
        dest: "{{ MEDIAWIKI_LOCAL_MOUNT_DIR }}/debug.php"
        owner: "root"
        group: "{{ MEDIAWIKI_USER_GID }}"
        mode: "0640"
      - src: "LocalSettings.php.j2"
        dest: "{{ MEDIAWIKI_LOCALSETTINGS_HOST_PATH }}"
        owner: "root"
        group: "{{ MEDIAWIKI_USER_GID }}"
        mode: "0640"
