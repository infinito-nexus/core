---
- name: "include sys-svc-compose role"
  include_role:
    name: sys-svc-compose
  vars:
    compose_handlers_flush: false
    compose_repository_pull: false
    application_id: "svc-net-wireguard"

- name: Create container network
  include_tasks: "{{ [playbook_dir, 'roles/sys-svc-compose/tasks/utils/network/create.yml' ] | path_join }}"
  vars:
    network_role_id: "{{ application_id }}"

- name: "Flush compose handlers"
  meta: flush_handlers

- name: "Apply the inventory WireGuard config (mesh peer set)"
  when: _wg_inventory_conf.stat.exists | default(false)
  block:
    - name: "Copy wg0.conf into the wireguard container"
      ansible.builtin.command: >-
        container cp {{ WIREGUARD_INVENTORY_CONF }}
        {{ WIREGUARD_CONTAINER }}:/config/wg_confs/wg0.conf
      changed_when: true

    - name: "Restart the wireguard container to bring up the tunnel"
      ansible.builtin.command: "container restart {{ WIREGUARD_CONTAINER }}"
      changed_when: true

- name: "adapt iptable rules (NAT masquerade for WireGuard client behind NAT)"
  shell: >-
    iptables -C FORWARD -i {{ WIREGUARD_NAT_IN_INTERFACE }} -j ACCEPT 2>/dev/null ||
    iptables -A FORWARD -i {{ WIREGUARD_NAT_IN_INTERFACE }} -j ACCEPT;
    iptables -t nat -C POSTROUTING -o {{ WIREGUARD_NAT_OUT_INTERFACE }} -j MASQUERADE 2>/dev/null ||
    iptables -t nat -A POSTROUTING -o {{ WIREGUARD_NAT_OUT_INTERFACE }} -j MASQUERADE
  changed_when: false
  when:
    - "'nat' in WIREGUARD_FLAVOR"
