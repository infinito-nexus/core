---
# Matrix-deploy variant overrides for web-app-jellyfin.
# See docs/contributing/artefact/files/role/variants.md for the file format.

# V1: sso + ldap + everything that can be true, is true
- services:
    css:
      enabled: true
      shared: true
    dashboard:
      enabled: true
      shared: true
    ldap:
      enabled: true
      shared: true
    logout:
      enabled: true
      shared: true
    matomo:
      enabled: true
      shared: true
    prometheus:
      enabled: true
      shared: true
    sso:
      enabled: true
      shared: true

# V2: no auth — everything false
- services:
    css:
      enabled: false
      shared: false
    dashboard:
      enabled: false
      shared: false
    ldap:
      enabled: false
      shared: false
    logout:
      enabled: false
      shared: false
    matomo:
      enabled: false
      shared: false
    prometheus:
      enabled: false
      shared: false
    sso:
      enabled: false
      shared: false

# V3: ldap only
- services:
    css:
      enabled: false
      shared: false
    dashboard:
      enabled: false
      shared: false
    ldap:
      enabled: true
      shared: true
    logout:
      enabled: false
      shared: false
    matomo:
      enabled: false
      shared: false
    prometheus:
      enabled: false
      shared: false
    sso:
      enabled: false
      shared: false
