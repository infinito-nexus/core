---
- name: "📄 Render LDIF files at {{ OPENLDAP_LDIF_PATH_HOST }}{{ folder }} (peers)"
  ansible.builtin.include_tasks:
    file: "{{ lookup('path_absolute', 'roles/sys-svc-compose/tasks/utils/render_replicated_templates.yml') }}"
  vars:
    role_templates:
      - src_glob: "ldif/{{ folder }}/*.j2"
        dest_dir: "{{ OPENLDAP_LDIF_PATH_HOST }}{{ folder }}"
        mode: "0770"
        notify: "Import {{ folder }} LDIF files"
