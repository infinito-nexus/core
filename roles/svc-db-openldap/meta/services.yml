---
openldap:
  # nocheck: default-placement-manager  central identity store, single-node until LDAP replication (syncrepl) is in scope
  default_placement: manager
  bond: 1
  enabled: true
  shared: true
  provides: ldap
  image: debian
  version: bookworm-slim
  name: openldap
  min_storage: 2GB
  cpus: 1.25
  mem_reservation: 1g
  mem_limit: 1.5g
  pids_limit: 1024
  network:
    local: true
    compose: true
    public: false
  provision:
    configuration: true
    credentials: true
    schemas: true
    users: true
    groups: true
    update: true
    reserved: false
  ports:
    internal:
      ldap: 389
    local:
      ldap: 389
    public:
      ldaps: 636
  lifecycle: beta
