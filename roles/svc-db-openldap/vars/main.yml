---
application_id: "svc-db-openldap"
entity_name: "{{ application_id | get_entity_name }}"

OPENLDAP_SERVER_URI: "ldap://{{ DOCKER_REACH_HOST }}:{{ lookup('config', application_id, 'services.openldap.ports.local.ldap') }}"

OPENLDAP_CONFIG_URI: "ldapi:///"

OPENLDAP_LDIF_PATH_HOST: "{{ lookup('container', application_id, 'directories.volumes') }}ldif/"
OPENLDAP_LDIF_PATH_DOCKER: "/tmp/ldif/"
OPENLDAP_LDIF_TYPES:
  - configuration
  - groups

OPENLDAP_CONTAINER: "{{ lookup('config', application_id, 'services.' ~ entity_name ~ '.name') }}"
OPENLDAP_CONTAINER_ADDRESS: "{{ lookup('container_address', application_id, entity_name) }}"
OPENLDAP_IMAGE: "{{ lookup('config', application_id, 'services.' ~ entity_name ~ '.image') }}"
OPENLDAP_VERSION: "{{ lookup('config', application_id, 'services.' ~ entity_name ~ '.version') }}"
OPENLDAP_SERVICE: "{{ entity_name }}"
OPENLDAP_BIND_DN: "{{ LDAP.DN.ADMINISTRATOR.DATA }}"
OPENLDAP_BIND_PW: "{{ LDAP.BIND_CREDENTIAL }}"

OPENLDAP_NETWORK_SWITCH_PUBLIC: "{{ lookup('config', application_id, 'services.openldap.network.public') }}"
OPENLDAP_NETWORK_SWITCH_LOCAL: "{{ lookup('config', application_id, 'services.openldap.network.local') }}"
OPENLDAP_NETWORK_EXPOSE_LOCAL: "{{ OPENLDAP_NETWORK_SWITCH_PUBLIC | bool or OPENLDAP_NETWORK_SWITCH_LOCAL | bool }}"

OPENLDAP_PROVISION_CONFIGURATION: "{{ lookup('config', application_id, 'services.openldap.provision.configuration') }}"
OPENLDAP_PROVISION_CREDENTIALS: "{{ lookup('config', application_id, 'services.openldap.provision.credentials') }}"
OPENLDAP_PROVISION_SCHEMAS: "{{ lookup('config', application_id, 'services.openldap.provision.schemas') }}"
OPENLDAP_PROVISION_USERS: "{{ lookup('config', application_id, 'services.openldap.provision.users') }}"
OPENLDAP_PROVISION_GROUPS: "{{ lookup('config', application_id, 'services.openldap.provision.groups') }}"
OPENLDAP_PROVISION_UPDATE: "{{ lookup('config', application_id, 'services.openldap.provision.update') }}"
OPENLDAP_USERS: "{{ lookup('users') | non_reserved_users }}"

OPENLDAP_PYTHON_LDAP_NATIVE_LIB_PACKAGES_BY_OS_FAMILY:
  Debian:
    - libldap2-dev
    - libsasl2-dev
    - libssl-dev
  RedHat:
    - openldap-devel
    - cyrus-sasl-devel
    - openssl-devel
  Archlinux:
    - openldap
    - cyrus-sasl

OPENLDAP_PYTHON_HEADER_PACKAGE_TEMPLATES_BY_OS_FAMILY:
  Debian:
    - python__PY_MM__-dev
    - python3-dev
  RedHat:
    - python__PY_MM__-devel
    - python__PY_MM_NODOT__-devel
    - python3-devel
  Archlinux:
    - python
