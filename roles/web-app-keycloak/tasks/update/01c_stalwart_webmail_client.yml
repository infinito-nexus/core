---
# Realm import only runs for a MISSING realm; this kcadm create-or-update
# brings the client to existing realms too (desired = the import's client
# object, one SPOT). Own minimal-scope client because Roundcube sends the
# access token as an XOAUTH2 SASL line that Stalwart caps at 4096 bytes —
# a full-scope token overflows it and login fails.
- name: "✅ Ensure the stalwart-webmail confidential client"
  vars:
    kc_desired: >-
      {{
        KEYCLOAK_DICTIONARY_REALM.clients
          | selectattr('clientId', 'equalto', KEYCLOAK_STALWART_WEBMAIL_CLIENT_ID)
          | list | first
      }}
  keycloak_kcadm_update:
    object_kind: "client"
    lookup_value: "{{ KEYCLOAK_STALWART_WEBMAIL_CLIENT_ID }}"
    desired: "{{ kc_desired }}"
    kcadm_exec: "{{ KEYCLOAK_EXEC_KCADM }}"
    realm: "{{ KEYCLOAK_REALM }}"
    assert_mode: "{{ MODE_ASSERT }}"
  no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"
  async: "{{ ASYNC_TIME if ASYNC_ENABLED | bool else omit }}"
  poll: "{{ ASYNC_POLL if ASYNC_ENABLED | bool else omit }}"
  when: KEYCLOAK_STALWART_WEBMAIL_ENABLED | bool
