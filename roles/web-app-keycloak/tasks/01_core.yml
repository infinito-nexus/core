---
- include_tasks: utils/once/flag.yml

- name: "📂 Load cleanup routine for '{{ application_id }}'"
  include_tasks: 02_cleanup.yml
  when: MODE_CLEANUP | bool

- name: "📂 Load init routine for '{{ application_id }}'"
  include_tasks: 03_init.yml

- name: "🧩 load docker, db and proxy for {{ application_id }}"
  include_role:
    name: sys-stk-full
  vars:
    compose_handlers_flush: true
    webserver_extra_configuration: "{{ lookup('template', 'nginx/helper_iframes.conf.j2') }}"

- name: "👔 Keycloak manager-side operations (file deploys + container exec)"
  include_tasks: 02_manager_ops.yml
  when: IS_STACK_HOST | bool
