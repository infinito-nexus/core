---
- name: "Keycloak login | Manager-side path (swarm)"
  when:
    - DEPLOYMENT_MODE == 'swarm'
    - KEYCLOAK_HOST_NODE is not defined or KEYCLOAK_HOST_NODE is none
  block:
    - name: "Keycloak login | Wait for keycloak task to converge"
      ansible.builtin.shell: |
        container service ps {{ lookup('container_service', application_id, entity_name) | quote }} \
          --filter desired-state=running \
          --format '{{ "{{.CurrentState}}" }}' \
          | head -1 | grep -qE '^Running'
      register: kc_running_swarm
      changed_when: false
      retries: 60
      delay: 5
      until: kc_running_swarm.rc == 0
      # Exception: explicit delegate to inventory_hostname overrides any outer
      # block delegation; container service ps must run on a swarm manager.
      delegate_to: "{{ inventory_hostname }}"

    - name: "Keycloak login | Resolve hosting node"
      ansible.builtin.shell: |
        container service ps {{ lookup('container_service', application_id, entity_name) | quote }} \
          --filter desired-state=running \
          --format '{{ "{{.Node}}" }}' | head -1
      register: kc_swarm_node_query
      changed_when: false
      delegate_to: "{{ inventory_hostname }}"

    - name: "Keycloak login | Set KEYCLOAK_HOST_NODE fact"
      ansible.builtin.set_fact:
        KEYCLOAK_HOST_NODE: "{{ kc_swarm_node_query.stdout | trim }}"

- name: "Keycloak login | Manager-side path (compose)"
  when:
    - DEPLOYMENT_MODE != 'swarm'
    - KEYCLOAK_HOST_NODE is not defined or KEYCLOAK_HOST_NODE is none
  block:
    - name: "Keycloak login | Wait for keycloak container to be running"
      ansible.builtin.shell: >
        container inspect -f '{{ "{{" }}.State.Running{{ "}}" }}'
        {{ lookup('container_address', application_id, entity_name) }}
      register: kc_running_compose
      changed_when: false
      retries: 60
      delay: 5
      until: >
        kc_running_compose.rc == 0 and (kc_running_compose.stdout | trim) == 'true'
      delegate_to: "{{ inventory_hostname }}"

    - name: "Keycloak login | Set KEYCLOAK_HOST_NODE fact"
      ansible.builtin.set_fact:
        KEYCLOAK_HOST_NODE: "{{ inventory_hostname }}"

- name: "Keycloak login | Resolve local container ID on hosting node (swarm only)"
  when:
    - DEPLOYMENT_MODE == 'swarm'
    - KEYCLOAK_LOCAL_CID is not defined or KEYCLOAK_LOCAL_CID is none
  block:
    - name: "Keycloak login | Resolve local container ID on hosting node"
      ansible.builtin.shell: |
        container ps \
          --filter "label=com.docker.swarm.service.name={{ lookup('container_service', application_id, entity_name) }}" \
          --filter status=running \
          --format '{{ "{{.ID}}" }}' | head -1
      register: kc_local_cid_query
      changed_when: false
      delegate_to: "{{ KEYCLOAK_HOST_NODE }}"

    - name: "Keycloak login | Set KEYCLOAK_LOCAL_CID fact"
      ansible.builtin.set_fact:
        KEYCLOAK_LOCAL_CID: "{{ kc_local_cid_query.stdout | trim }}"

- name: "Keycloak login | Wait for keycloak container to be healthy"
  ansible.builtin.shell: >
    container inspect --format '{{ "{{" }}.State.Health.Status{{ "}}" }}'
    {{ KEYCLOAK_LOCAL_CID | quote }}
  register: kc_health
  retries: 60
  delay: 5
  until: (kc_health.stdout | trim) == 'healthy'
  changed_when: false
  delegate_to: "{{ KEYCLOAK_HOST_NODE }}"

- name: Try login with permanent admin (uses container ENV)
  ansible.builtin.shell: | # nocheck: container-exec-resolver  KEYCLOAK_LOCAL_CID resolved at delegate_to runtime; container_address would return a manager-only subshell
    container exec -i {{ KEYCLOAK_LOCAL_CID | quote }} sh -lc '
      {{ KEYCLOAK_KCADM }} config credentials \
        --server {{ KEYCLOAK_SERVER_INTERNAL_URL }} \
        --realm master \
        --user "$KEYCLOAK_PERMANENT_ADMIN_USERNAME" \
        --password "$KEYCLOAK_PERMANENT_ADMIN_PASSWORD"
    '
  register: kc_login_perm
  changed_when: false
  failed_when: false
  delegate_to: "{{ KEYCLOAK_HOST_NODE }}"

- name: Ensure permanent Keycloak admin exists (bootstrap path when permanent login fails)
  ansible.builtin.include_tasks: 04_login_bootstrap_admin.yml
  when: kc_login_perm.rc != 0
