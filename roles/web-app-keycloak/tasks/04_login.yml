---
- name: "⏳ Keycloak login | Wait for keycloak container to be running"
  ansible.builtin.shell: >
    container inspect -f '{{ "{{" }}.State.Running{{ "}}" }}'
    {{ lookup('container_address', application_id, entity_name) }}
  register: kc_running_compose
  changed_when: false
  retries: 60
  delay: 5
  until: >
    kc_running_compose.rc == 0 and (kc_running_compose.stdout | trim) == 'true'
  delegate_to: "{{ inventory_hostname }}"
  when: DEPLOYMENT_MODE == 'compose'

- name: "🔍 Keycloak login | Resolve hosting node + container id"
  ansible.builtin.include_tasks: "{{ lookup('path_absolute', 'roles/sys-svc-compose/tasks/utils/swarm/resolve_host_cid.yml') }}"
  vars:
    resolve_service_key: "{{ entity_name }}"
    resolve_output_prefix: KEYCLOAK
    resolve_compose_cid: "{{ lookup('container_address', application_id, entity_name) }}"
    resolve_converge_retries: 120
    resolve_converge_delay: 5
    resolve_cid_filters: "--filter health=healthy"

- name: "⏳ Keycloak login | Wait for keycloak container to be healthy"
  ansible.builtin.shell: >
    container inspect --format '{{ "{{" }}.State.Health.Status{{ "}}" }}'
    {{ KEYCLOAK_LOCAL_CID | quote }}
  register: kc_health
  retries: 60
  delay: 5
  until: (kc_health.stdout | trim) == 'healthy'
  changed_when: false
  delegate_to: "{{ KEYCLOAK_HOST_NODE }}"

- name: 🔑 Try login with permanent admin (uses container ENV)
  ansible.builtin.shell: | # nocheck: container-exec-resolver  KEYCLOAK_LOCAL_CID resolved at delegate_to runtime; container_address would return a manager-only subshell
    container exec -i {{ KEYCLOAK_LOCAL_CID | quote }} sh -lc '
      {{ KEYCLOAK_KCADM }} config credentials \
        --server {{ KEYCLOAK_SERVER_INTERNAL_URL }} \
        --realm master \
        --user "$KEYCLOAK_PERMANENT_ADMIN_USERNAME" \
        --password "$KEYCLOAK_PERMANENT_ADMIN_PASSWORD"
    '
  register: kc_login_perm
  changed_when: false
  failed_when: false
  delegate_to: "{{ KEYCLOAK_HOST_NODE }}"

- name: ✅ Ensure permanent Keycloak admin exists (bootstrap when login fails)
  ansible.builtin.include_tasks:
    file: 04_login_bootstrap_admin.yml
    apply:
      delegate_to: "{{ KEYCLOAK_HOST_NODE }}"
  when: kc_login_perm.rc != 0
