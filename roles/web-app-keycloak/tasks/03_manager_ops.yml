---
- name: "📂 Load Login routines for '{{ application_id }}'"
  include_tasks: utils/login.yml

- name: ✅ Ensure jq is installed
  become: true
  package:
    name: jq
    state: present

- name: "👔 Keycloak | Manager-side updates delegated to the hosting node"
  include_tasks:
    file: 03_manager_ops/manager_ops_on_host.yml
    apply:
      delegate_to: "{{ KEYCLOAK_HOST_NODE }}"

- name: "🚿 Flush handlers before leaving Keycloak scope"
  meta: flush_handlers
