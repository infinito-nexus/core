---
- name: "📂 Load Client Update routines for '{{ application_id }}'"
  include_tasks: "{{ role_path }}/tasks/update/01_client.yml"

- name: "📂 Ensure the stalwart-webui public client (existing realms)"
  include_tasks: "{{ role_path }}/tasks/update/01b_stalwart_webui_client.yml"
  when: KEYCLOAK_STALWART_WEBUI_ENABLED | bool

- name: "📂 Ensure the stalwart-webmail confidential client (existing realms)"
  include_tasks: "{{ role_path }}/tasks/update/01c_stalwart_webmail_client.yml"
  when: KEYCLOAK_STALWART_WEBMAIL_ENABLED | bool

- name: "📂 Load Mail Update routines for '{{ application_id }} - {{ KEYCLOAK_REALM }}'"
  include_tasks: "{{ role_path }}/tasks/update/02_mail_realm.yml"

- name: "📂 Load Mail Update routines for '{{ application_id }} - master'"
  include_tasks: "{{ role_path }}/tasks/update/03_mail_master.yml"

- name: "📂 Load RBAC Update routines for '{{ application_id }}'"
  include_tasks: "{{ role_path }}/tasks/update/04_rbac_client_scope.yml"

- name: "📂 Load LDAP shared-federation routines for '{{ application_id }}'"
  include_tasks: "{{ role_path }}/tasks/update/05_ldap/shared.yml"
  when:
    - KEYCLOAK_LDAP_ENABLED | bool
    - KEYCLOAK_LDAP_SHARED | bool

- name: "🧹 Remove LDAP federation routines for '{{ application_id }}' when LDAP disabled"
  include_tasks: "{{ role_path }}/tasks/update/05_ldap/disabled.yml"
  when: not KEYCLOAK_LDAP_ENABLED | bool

- name: "📂 Load reCAPTCHA Update routines for '{{ application_id }}'"
  include_tasks: "{{ role_path }}/tasks/update/06_recaptcha.yml"
  when: KEYCLOAK_RECAPTCHA_ENABLED | bool

- name: "📂 Load UserProfile (declarative) Update routines for '{{ application_id }}'"
  include_tasks: "{{ role_path }}/tasks/update/07_userprofile.yml"

- name: "📂 Load Realm User provisioning routines for '{{ application_id }}'"
  include_tasks: "{{ role_path }}/tasks/update/08_users/realm.yml"
  when: not KEYCLOAK_LDAP_ENABLED | bool

- name: "📂 Load RBAC realm group provisioning routines for '{{ application_id }}'"
  include_tasks: "{{ role_path }}/tasks/update/08b_rbac_groups_realm.yml"
  when: not KEYCLOAK_LDAP_ENABLED | bool

- name: "📂 Load Users Update routines for '{{ application_id }}' (emailVerified)"
  include_tasks: "{{ role_path }}/tasks/update/08_users/email_verified.yml"
  when: KEYCLOAK_USER_EMAILS_VERIFIED | bool
