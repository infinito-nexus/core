---
application_id: "svc-bkp-local-2-device"
system_service_id: "{{ application_id }}"

BACKUP_TO_USB_DESTINATION: "{{ BACKUP_TO_USB_MOUNT}}{{ BACKUP_TO_USB_TARGET }}"
BACKUPS_SERVICE_MNT_NAME: "{{ BACKUP_TO_USB_MOUNT | trim('/') | replace('/','-') }}.mount"

BACKUP_TO_USB_MOUNT: "{{ lookup('config', application_id, 'services.local-2-device.mount') }}"
BACKUP_TO_USB_TARGET: "{{ lookup('config', application_id, 'services.local-2-device.target') }}"
BACKUP_TO_USB_SOURCE: "{{ lookup('config', application_id, 'services.local-2-device.source') }}"
