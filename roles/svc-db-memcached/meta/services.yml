---
memcached:
  modes:
    compose:
      enabled: true
    swarm:
      enabled: true
  # nocheck: default-placement-manager  central cache engine: single shared in-memory instance pinned to one node, reached cross-stack over the shared overlay
  placement: manager
  bond: 1
  enabled: true
  shared: true
  image: memcached
  version: alpine
  name: memcached
  min_storage: 1GB
  backup:
    disabled: true
  cpus: "0.25"
  mem_reservation: "64m"
  mem_limit: "256m"
  pids_limit: 256
  ports:
    local:
      memcached: 11211
    internal:
      memcached: 11211
  lifecycle: beta
