---
- name: "📦 Install userspace nfs-ganesha packages"
  ansible.builtin.package:
    name: "{{ SVC_STORAGE_NFS_SERVER_PACKAGES['ganesha'][ansible_facts['os_family']] }}"
    state: present

- name: "🔧 Mask the broken nfs-ganesha-config helper unit"
  ansible.builtin.systemd:
    name: nfs-ganesha-config.service
    masked: true

- name: "✅ Ensure the ganesha config directory exists"
  ansible.builtin.file:
    path: /etc/ganesha
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: "🔧 Pin NFSv4 idmap Domain (else www-data renders as nobody)"
  ansible.builtin.lineinfile:
    path: /etc/idmapd.conf
    regexp: "^#?\\s*Domain\\s*="
    line: "Domain = localdomain"
    insertafter: "^\\[General\\]"
    create: true
    owner: root
    group: root
    mode: "0644"

- name: "📄 Render /etc/ganesha/ganesha.conf"
  ansible.builtin.template: # nocheck: stack-host-template (per-host NFS server config (NFS host is its own group, not the stack host))
    src: ganesha.conf.j2
    dest: /etc/ganesha/ganesha.conf
    owner: root
    group: root
    mode: "0644"
  notify: "Restart NFS ganesha"

- name: "📁 Ensure the nfs-ganesha systemd drop-in dir exists"
  ansible.builtin.file:
    path: "/etc/systemd/system/{{ SVC_STORAGE_NFS_SERVER_SERVICE['ganesha'][ansible_facts['os_family']] }}.service.d"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: "🧩 Install nfs-ganesha auto-restart drop-in"
  ansible.builtin.copy:
    src: nfs-ganesha-restart.conf
    dest: "/etc/systemd/system/{{ SVC_STORAGE_NFS_SERVER_SERVICE['ganesha'][ansible_facts['os_family']] }}.service.d/restart.conf"
    owner: root
    group: root
    mode: "0644"

- name: "🟢 Enable and start nfs-ganesha"
  ansible.builtin.systemd:
    name: "{{ SVC_STORAGE_NFS_SERVER_SERVICE['ganesha'][ansible_facts['os_family']] }}"
    enabled: true
    state: started
    daemon_reload: true

- name: "🚿 Flush handlers (ganesha restart applies the rendered export set)"
  ansible.builtin.meta: flush_handlers
