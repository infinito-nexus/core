---
flags:
  style-src-attr:
    unsafe-inline: true
  script-src-elem:
    unsafe-inline: true
whitelist:
  connect-src:
    - "*.{{ DOMAIN_PRIMARY }}"
    - "{{ DOMAIN_PRIMARY }}"
    - https://cdn.jsdelivr.net # nocheck: external-cdn,url  TODO: migrate to lookup('asset') or confirm the upstream app loads this CDN itself
  script-src-elem:
    - https://cdn.jsdelivr.net # nocheck: external-cdn,url  TODO: migrate to lookup('asset') or confirm the upstream app loads this CDN itself
  style-src-elem:
    - https://cdn.jsdelivr.net # nocheck: external-cdn,url  TODO: migrate to lookup('asset') or confirm the upstream app loads this CDN itself
  frame-ancestors:
    - "{{ lookup('domain', 'web-app-keycloak') }}"
