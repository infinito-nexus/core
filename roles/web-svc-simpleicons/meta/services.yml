---
# nocheck: dockerfile-custom
# nocheck: dynamic-flag
# nocheck: sso
sso:
  enabled: false
  shared: false
# nocheck: dynamic-flag
dashboard:
  enabled: false
  shared: false
# nocheck: dynamic-flag
matomo:
  enabled: false
  shared: false
# nocheck: dynamic-flag
# nocheck: playwright-service-flag — DB engine, covered by role-local integration tests
redis:
  backup:
    disabled: true
  enabled: false
  shared: "{{ 'svc-db-redis' in group_names }}"
# nocheck: dynamic-flag
# nocheck: playwright-service-flag — css consumer, no Playwright surface (provider: web-svc-css)
css:
  enabled: false
  shared: false
# nocheck: dynamic-flag
# nocheck: playwright-service-flag — captcha backend, infrastructural
recaptcha:
  enabled: false
# nocheck: playwright-service-flag — self-provider
simpleicons:
  modes:
    compose:
      enabled: true
    swarm:
      enabled: true
  bond: 1
  enabled: true
  shared: true
  image: node
  version: 26-bookworm
  local_image: simpleicons-server
  local_version: latest
  min_storage: 1GB
  cpus: 0.5
  mem_reservation: 128m
  mem_limit: 256m
  pids_limit: 128
  ports:
    local:
      http: 8044
    internal:
      http: 3000
  proxy:
    service_key: simpleicons
  lifecycle: beta
prometheus:
  bond: 1
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
