---
# Matrix-deploy variant overrides for web-svc-simpleicons.
# See docs/contributing/artefact/files/role/variants.md for the file format.

# variant pinning every dynamic services.yml flag to true so the
# matrix exercises the in-group_names branch of web-svc-simpleicons.

- services:
    prometheus:
      enabled: true
      shared: true
    redis:
      shared: true
    tor:
      enabled: true
- services:
    prometheus:
      enabled: false
      shared: false
    redis:
      shared: false
    tor:
      enabled: false
      shared: false # nocheck: variants-static-override
