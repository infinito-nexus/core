---
unbound:
  # nocheck: default-placement-manager  engine on-disk state (trust anchors / root hints), node-local in swarm
  placement: manager
  enabled: true
  shared: true
  bond: 1
  image: ghcr.io/mailu/unbound
  name: unbound
  version: "2024.06"
  min_storage: 1GB
  backup:
    disabled: true
  cpus: "0.5"
  mem_reservation: "128m"
  mem_limit: "512m"
  pids_limit: 256
  ports:
    local:
      unbound: 53
  lifecycle: beta

# nocheck: playwright-service-flag, dynamic-flag infrastructure backup consumer
container_backup: # nocheck: bond-baseline backup host joins outside the variant topology
  bond: 1
  enabled: "{{ 'svc-bkp-volume-2-local' in group_names }}"
  shared: true
