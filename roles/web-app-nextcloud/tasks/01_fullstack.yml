---
- name: "🧩 load docker, db and proxy for {{ application_id }}"
  include_role:
    name: sys-stk-full
  vars:
    compose_handlers_flush: false
    application_id: web-app-nextcloud
    webserver_client_max_body_size: 10G

- name: "📄 Deploy '{{ NEXTCLOUD_INIT_GATE_HOST }}'"
  copy:
    src: "{{ NEXTCLOUD_INIT_GATE_FILE }}"
    dest: "{{ NEXTCLOUD_INIT_GATE_HOST }}"
    mode: "0755"
  when: IS_STACK_HOST | bool
  notify:
    - compose build
    - compose up

- when: NEXTCLOUD_WHITEBOARD_ENABLED | bool
  block:
    - name: "📁 Create '{{ NEXTCLOUD_WHITEBOARD_SERVICE_DIRECTORY }}' Directory"
      file:
        path: "{{ NEXTCLOUD_WHITEBOARD_SERVICE_DIRECTORY }}"
        state: directory
        owner: "{{ NEXTCLOUD_DOCKER_USER_ID }}"
        group: "{{ NEXTCLOUD_DOCKER_USER_ID }}"
        mode: "0755"

    - name: "📄 Deploy Whiteboard Dockerfile to {{ NEXTCLOUD_WHITEBOARD_SERVICE_DOCKERFILE }}"
      stack_host_template:
        src: "Dockerfiles/Whiteboard.j2"
        dest: "{{ NEXTCLOUD_WHITEBOARD_SERVICE_DOCKERFILE }}"
      notify: compose build

- name: "📁 create {{ NEXTCLOUD_HOST_CONF_ADD_PATH }}"
  file:
    path: "{{ NEXTCLOUD_HOST_CONF_ADD_PATH }}"
    state: directory
    owner: "{{ NEXTCLOUD_DOCKER_USER_ID }}"
    group: "{{ NEXTCLOUD_DOCKER_USER_ID }}"
    mode: "0755"

- name: "📄 Render Nextcloud config at {{ NEXTCLOUD_HOST_CONF_ADD_PATH }} (local + peers)"
  ansible.builtin.include_tasks:
    file: "{{ lookup('path_absolute', 'roles/sys-svc-compose/tasks/utils/render_replicated_templates.yml') }}"
  vars:
    role_templates:
      - src_glob: "config/*.j2"
        dest_dir: "{{ NEXTCLOUD_HOST_CONF_ADD_PATH }}"
        owner: "{{ NEXTCLOUD_DOCKER_USER_ID }}"
        group: "{{ NEXTCLOUD_DOCKER_USER_ID }}"
        mode: "0644"

- name: "🔐 NEXTCLOUD | Ensure host-mounted config files ownership/permissions (recursive)"
  ansible.builtin.file:
    path: "{{ NEXTCLOUD_HOST_CONF_ADD_PATH }}"
    state: directory
    recurse: true
    owner: "{{ NEXTCLOUD_DOCKER_USER_ID }}"
    group: "{{ NEXTCLOUD_DOCKER_USER_ID }}"
    mode: "u=rwX,g=rX,o=rX"

- name: "📄 Render Nextcloud internal nginx config (local + swarm peers)"
  ansible.builtin.include_tasks:
    file: "{{ lookup('path_absolute', 'roles/sys-svc-compose/tasks/utils/render_replicated_templates.yml') }}"
  vars:
    role_templates:
      - src: "docker.conf.j2"
        dest: "{{ NEXTCLOUD_HOST_NGINX_PATH }}"
