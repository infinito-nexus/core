---
- name: 🚿 Flush handlers so Nextcloud container is restarted and ready
  meta: flush_handlers

- name: "⏳ Wait until Nextcloud is reachable on its local HTTP port"
  wait_for:
    host: "{{ DOCKER_REACH_HOST }}"
    port: "{{ lookup('config', application_id, 'services.nextcloud.ports.local.http') }}"
    timeout: "{{ lookup('timeout', 120) | int }}"
    delay: 2
    state: started

- name: ⏳ Wait until Nextcloud is installed (occ status)
  shell: "{{ NEXTCLOUD_DOCKER_EXEC_OCC }} status"
  register: occ_status
  retries: 60
  delay: 5
  until: >
    occ_status.rc == 0 and
    (occ_status.stdout | default('')) is search('installed: true')
  changed_when: false

# nocheck: container-exec-resolver NEXTCLOUD_CONTAINER_ADDRESS is a swarm-mode subshell that only a shell can expand; command/argv would pass it literally
- name: "📄 Install the infinito additional-config loader into config/"
  ansible.builtin.shell:
    cmd: >-
      container exec -i -u root {{ NEXTCLOUD_CONTAINER_ADDRESS }}
      sh -c 'cat > /var/www/html/config/zzz-infinito.config.php
      && chmod 0444 /var/www/html/config/zzz-infinito.config.php'
    stdin: "{{ lookup('template', 'include.php.j2') }}"
  changed_when: true
