---
- name: Setup the full docker stack
  include_tasks: 01_fullstack.yml
  vars:
    domain: "{{ NEXTCLOUD_DOMAIN }}"
    http_port: "{{ NEXTCLOUD_PORT }}"

- name: Setup config.php
  include_tasks: 02_config.yml

- name: Flush all handlers immediately so that occ can be used
  meta: flush_handlers

- name: Wait until Redis is ready (PONG)
  command: "container exec {{ NEXTCLOUD_REDIS_CONTAINER }} redis-cli ping"
  register: redis_ping
  retries: 60
  delay: 2
  until: redis_ping.stdout is search('PONG')

- name: Update\Upgrade Nextcloud
  include_tasks: 03_upgrade.yml

- name: Load system configuration steps
  include_tasks: "{{ nextcloud_step }}"
  loop:
    - 04_admin.yml
    - 05_system_config.yml
  loop_control:
    loop_var: nextcloud_step

- name: Setup Nextcloud Plugins
  include_tasks: 06_plugin.yml
  loop: "{{ NEXTCLOUD_PLUGIN_ITEMS }}"
  loop_control:
    loop_var: plugin_item
  vars:
    plugin_key: "{{ plugin_item.key }}"
    plugin_value: "{{ plugin_item.value }}"
  when: NEXTCLOUD_PLUGINS_ENABLED | bool

- name: Disable the cloud_bbb app on an onion node
  ansible.builtin.command: "{{ NEXTCLOUD_DOCKER_EXEC_OCC }} app:disable bbb"
  register: _nc_onion_bbb_disable
  changed_when: "'already disabled' not in _nc_onion_bbb_disable.stdout"
  when:
    - NEXTCLOUD_PLUGINS_ENABLED | bool
    - NEXTCLOUD_OIDC_HOST is search('\\.onion$')

- name: Reconcile administrator identities after plugin setup
  include_tasks: 07_admin_identities.yml
