---
- name: "🔍 Resolve {{ application_id }} hosting node + container id"
  ansible.builtin.include_tasks: "{{ lookup('path_absolute', 'roles/sys-svc-compose/tasks/utils/swarm/resolve_host_cid.yml') }}"
  vars:
    resolve_service_key: mastodon
    resolve_output_prefix: MASTODON
    resolve_compose_cid: "{{ MASTODON_CONTAINER_ADDRESS }}"

- name: "▶️ Execute migration for '{{ application_id }}'"
  ansible.builtin.shell: > # nocheck: container-exec-resolver  runtime-resolved CID, delegated to the hosting node
    container exec {{ MASTODON_LOCAL_CID | quote }}
    bundle exec rails db:migrate
  delegate_to: "{{ MASTODON_HOST_NODE }}"

- name: "🌱 MASTODON | Seed database (idempotent)"
  ansible.builtin.shell: > # nocheck: container-exec-resolver  runtime-resolved CID, delegated to the hosting node
    container exec {{ MASTODON_LOCAL_CID | quote }}
    bash -lc 'bin/rails db:seed'
  delegate_to: "{{ MASTODON_HOST_NODE }}"
  register: mastodon_seed
  changed_when: false
  failed_when: mastodon_seed.rc != 0
