---
- name: "🧹 Cleanup Mastodon media cache older than 14 days"
  ansible.builtin.shell: > # nocheck: container-exec-resolver  runtime-resolved CID, delegated to the hosting node
    container exec -u root {{ MASTODON_LOCAL_CID | quote }} bin/tootctl media remove --days=14
  delegate_to: "{{ MASTODON_HOST_NODE }}"
  register: mastodon_cleanup
  changed_when: mastodon_cleanup.rc == 0
  failed_when: mastodon_cleanup.rc != 0
