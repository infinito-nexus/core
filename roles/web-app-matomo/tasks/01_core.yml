---
- include_tasks: utils/once/flag.yml

- name: "🔍 Matomo | Resolve token from store/config"
  include_tasks: 02_token_store.yml

- name: "🧩 load docker, db and proxy for {{ application_id }}"
  include_role:
    name: sys-stk-full
  vars:
    compose_handlers_flush: false

- name: "👔 Matomo manager-side operations (file deploys + container exec)"
  include_tasks: 03_manager_ops.yml
  when: IS_STACK_HOST | bool
