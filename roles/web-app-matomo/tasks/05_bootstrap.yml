---
- block:
    - name: "▶️ Matomo bootstrap | Run bootstrap ({{ DEPLOYMENT_MODE }})"
      ansible.builtin.include_tasks: "05_bootstrap/flavors/{{ DEPLOYMENT_MODE }}.yml"

  rescue:
    - name: "🎯 Matomo bootstrap | Select effective bootstrap result for diagnostics"
      ansible.builtin.set_fact:
        matomo_bootstrap_run: "{{ matomo_bootstrap_compose if DEPLOYMENT_MODE == 'compose' else matomo_bootstrap_swarm }}"

    - name: "💾 Matomo bootstrap | Dump bootstrap diagnostics ({{ DEPLOYMENT_MODE }})"
      ansible.builtin.include_tasks: "05_bootstrap/debug/{{ DEPLOYMENT_MODE }}.yml"
      when: MODE_DEBUG | bool

    - name: "🛑 Matomo bootstrap | Abort with bootstrap root cause"
      ansible.builtin.fail:
        msg: >-
          Matomo bootstrap run failed after {{ matomo_bootstrap_run.attempts | default(MATOMO_BOOTSTRAP_RETRIES) }} attempt(s)
          with rc={{ matomo_bootstrap_run.rc | default('n/a') }}.
          stderr={{ (matomo_bootstrap_run.stderr | default('') | trim) if not (MASK_CREDENTIALS_IN_LOGS | bool) else ('<masked,len=' ~ ((matomo_bootstrap_run.stderr
          | default('') | string | length) | string) ~ '>') }}
          stdout={{ (matomo_bootstrap_run.stdout | default('') | trim) if not (MASK_CREDENTIALS_IN_LOGS | bool) else ('<masked,len=' ~ ((matomo_bootstrap_run.stdout
          | default('') | string | length) | string) ~ '>') }}

- name: "🔧 Matomo bootstrap | Set effective token (existing, else parse bootstrap stdout)"
  ansible.builtin.set_fact:
    matomo_token_value: >-
      {{
        (matomo_token_value | default('') | string | trim)
        if (matomo_token_value is defined and (matomo_token_value | string | trim) != '')
        else (
          ((matomo_bootstrap_compose.stdout if DEPLOYMENT_MODE == 'compose' else matomo_bootstrap_swarm.stdout) | default('') | string)
          | regex_search('(?m)^[a-f0-9]{32,64}$')
          | default('', true)
          | trim
        )
      }}

- name: "✅ Matomo bootstrap | Assert we have a token now"
  ansible.builtin.assert:
    that:
      - matomo_token_value is defined
      - matomo_token_value | length > 0
      - matomo_token_value is match("^[a-f0-9]{32,64}$")
    fail_msg: >-
      Matomo bootstrap did not yield a valid token.
      stdout={{ (matomo_bootstrap_compose.stdout if DEPLOYMENT_MODE == 'compose' else matomo_bootstrap_swarm.stdout) | default('') | trim }}
  when: MODE_ASSERT_LOCAL | bool

- name: "💾 Matomo | Persist + inject token via sys-token-store (store + runtime users)"
  ansible.builtin.include_role:
    name: sys-token-store
    tasks_from: write.yml
  vars:
    sys_token_store_user_key: "{{ MATOMO_ADMIN_USER_KEY }}"
    sys_token_store_app: "{{ application_id }}"
    sys_token_store_token: "{{ matomo_token_value }}"
  no_log: "{{ MASK_CREDENTIALS_IN_LOGS | bool }}"
  when:
    - matomo_token_value is defined
    - matomo_token_value | length > 0

- name: "🔎 Matomo | Stat compose dir of candidate web-svc matomo consumers"
  ansible.builtin.stat:
    path: "{{ lookup('container', matomo_inj_consumer.id, 'directories.instance') }}"
  loop: "{{ lookup('roles_with_service', 'matomo', scope='all') | selectattr('id', 'match', '^web-svc-') | list }}"
  loop_control:
    loop_var: matomo_inj_consumer
    label: "{{ matomo_inj_consumer.id }}"
  register: matomo_inj_candidates
  changed_when: false
  when:
    - matomo_token_value is defined
    - matomo_token_value | length > 0

- name: "📄 Matomo | Re-render injection for deployed web-svc consumers"
  ansible.builtin.include_role:
    name: sys-front-inj-all
  vars:
    application_id: "{{ matomo_inj_dir.matomo_inj_consumer.id }}"
    domain: "{{ lookup('domain', matomo_inj_dir.matomo_inj_consumer.id) }}"
    matomo_token_override: "{{ matomo_token_value }}"
  loop: "{{ matomo_inj_candidates.results | default([]) | selectattr('stat.exists', 'defined') | selectattr('stat.exists') | list }}"
  loop_control:
    loop_var: matomo_inj_dir
    label: "{{ matomo_inj_dir.matomo_inj_consumer.id }}"
  when:
    - matomo_token_value is defined
    - matomo_token_value | length > 0
