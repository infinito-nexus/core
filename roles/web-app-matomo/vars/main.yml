---
application_id: "web-app-matomo"
domain: "{{ lookup('domain',application_id) }}"
http_port: "{{ lookup('config', application_id, 'services.matomo.ports.local.http') }}"
entity_name: "{{ application_id | get_entity_name }}"

MATOMO_SERVICE: "{{ entity_name }}"
MATOMO_NAME: "{{ lookup('config', application_id, 'services.' ~ MATOMO_SERVICE ~ '.name') }}"
MATOMO_CONFIG: "/var/www/html/config/config.ini.php"
MATOMO_SERVICE_URL: "http://{{ MATOMO_SERVICE }}"

MATOMO_BOOTSTRAP_SERVICE: "bootstrap"
MATOMO_BOOTSTRAP_PROFILE: "{{ MATOMO_BOOTSTRAP_SERVICE }}"
MATOMO_BOOTSTRAP_NAME: "{{ lookup('config', application_id, 'services.' ~ MATOMO_BOOTSTRAP_SERVICE ~ '.name') }}"
MATOMO_BOOTSTRAP_TIMEOUT: "{{ lookup('config', application_id, 'services.' ~ MATOMO_BOOTSTRAP_SERVICE ~ '.timeout') }}"
MATOMO_BOOTSTRAP_ENV_FILE: "{{ [lookup('container', application_id, 'directories.env'), MATOMO_BOOTSTRAP_SERVICE ~ '.env'] | path_join }}"
MATOMO_BOOTSTRAP_RETRIES: 7
MATOMO_BOOTSTRAP_RETRY_DELAY_S: 20

MATOMO_INSTALLER_STEP_DEADLINE_S: 420
MATOMO_BOOTSTRAP_SWARM_ATTEMPTS: 3
MATOMO_BOOTSTRAP_SWARM_POLL_DELAY_S: 15

MATOMO_ADMIN_USER_KEY: "administrator"
MATOMO_ADMIN_USER_NAME: "{{ lookup('users', MATOMO_ADMIN_USER_KEY).username }}"
MATOMO_ADMIN_PASSWORD: "{{ lookup('users', MATOMO_ADMIN_USER_KEY).password }}"
MATOMO_ADMIN_EMAIL: "{{ lookup('users', MATOMO_ADMIN_USER_KEY).email }}"
MATOMO_SITE_NAME: "{{ lookup('config', application_id, 'services.matomo.site_name') }}"
MATOMO_SITE_URL: "{{ lookup('tls', application_id, 'url.base') }}"
MATOMO_EXCLUDED_IPS: "{{ lookup('config', application_id, 'services.matomo.excluded_ips') }}"

MATOMO_TOKEN_DESCRIPTION: "{{ lookup('config', application_id, 'services.matomo.token.description') }}"

matomo_index_php_url: "http://{{ DOCKER_REACH_HOST }}:{{ http_port }}/index.php"
