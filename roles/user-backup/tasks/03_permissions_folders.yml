---
- name: 📦 Install ACL utilities
  ansible.builtin.package:
    name: acl
    state: present

- name: ✅ Ensure backups root exists and owned by backup
  file:
    path: "{{ DIR_BACKUPS }}"
    state: directory
    owner: backup
    group: backup
    mode: "0700"

- name: 🔐 Apply POSIX ACLs for the backup user (non-NFS backends)
  ansible.builtin.include_tasks: 03b_acl.yml
  when: storage.backend != 'nfs'

- name: 📁 Fix ownership level 0..2 directories to backup:backup
  ansible.builtin.shell: >
    find "{{ DIR_BACKUPS }}" -mindepth 0 -maxdepth 2 -xdev -type d -exec chown backup:backup {} +
  changed_when: false

- name: 📁 Fix perms level 0..2 directories to 0700
  ansible.builtin.shell: >
    find "{{ DIR_BACKUPS }}" -mindepth 0 -maxdepth 2 -xdev -type d -exec chmod 700 {} +
  changed_when: false
