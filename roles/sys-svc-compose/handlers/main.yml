---
- name: Aggressively prune Docker data (keep networks + keep in-use images)
  become: true
  ansible.builtin.script:
    cmd: prune.sh
  changed_when: true
  when: STORAGE_CONSTRAINED | bool
  listen:
    - compose up
    - compose build

- ansible.builtin.import_tasks: compose.yml
  when: DEPLOYMENT_MODE == 'compose'

- ansible.builtin.import_tasks: swarm.yml
  when: DEPLOYMENT_MODE == 'swarm'
