---
- include_tasks: 01_core.yml
  when: run_once_sys_svc_compose is not defined

- name: "🧭 Route docker cleanup/health deps through service-loader"
  ansible.builtin.include_role:
    name: sys-service-loader
    tasks_from: list_or_shoot.yml
  vars:
    list_or_shoot_roles:
      - sys-ctl-cln-docker
      - sys-ctl-hlth-container
      - sys-ctl-hlth-volumes
      - sys-ctl-rpr-container-hard

- name: "🧭 Route svc-bkp-volume-2-local through service-loader (when deployed)"
  ansible.builtin.include_role:
    name: sys-service-loader
    tasks_from: list_or_shoot.yml
  vars:
    list_or_shoot_roles:
      - svc-bkp-volume-2-local
  when: "'svc-bkp-volume-2-local' in group_names"

- name: "🖥️ Stack-host-only prep (dirs, repo, files, CA trust) for '{{ application_id }}'"
  include_tasks: "02_stack_host_prep.yml"
  when: IS_STACK_HOST | bool

- name: "📁 Pre-create NFS subdirs for '{{ application_id }}' (swarm + NFS only)"
  include_tasks: "utils/nfs_prep.yml"

- name: "✅ Ensure instance dir for '{{ application_id }}' is up"
  include_tasks: "utils/up.yml"
  when: IS_STACK_HOST | bool
