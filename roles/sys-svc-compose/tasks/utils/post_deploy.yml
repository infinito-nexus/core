---
- name: "Wait until database container for '{{ application_id }}' is healthy"
  ansible.builtin.command: >-
    container container inspect
    --format={% raw %}{{.State.Health.Status}}{% endraw %}
    {{ lookup('database', application_id, 'container') }}
  register: _app_db_health
  retries: 60
  delay: 2
  until: (_app_db_health.stdout | trim) == 'healthy'
  changed_when: false
  delegate_to: "{{ STACK_HOST }}"
  run_once: true
  when:
    - DEPLOYMENT_MODE == 'swarm'
    - lookup('database', application_id, 'enabled') | bool
