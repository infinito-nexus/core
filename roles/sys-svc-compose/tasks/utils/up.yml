---
- name: "🔍 Check running containers for '{{ application_id }}'"
  command: >-
    compose ps -q --filter status=running
  args:
    chdir: "{{ lookup('container', application_id, 'directories.instance') }}"
  register: docker_ps
  changed_when: >
    (docker_ps.stdout | trim) == ""
  failed_when: >
    docker_ps.rc != 0
    and (
      (docker_ps.stderr | default(''))
      | regex_search('(no configuration file provided|no such file or directory|env file .* not found)') is none
    )
  when:
    - >
      not (
        docker_compose_template.changed | default(false)
        or
        env_template.changed          | default(false)
      )
    - compose_mode == 'compose'
  notify: compose up

- name: "🔔 Notify swarm deploy (under DEPLOYMENT_MODE == swarm)"
  ansible.builtin.debug:
    msg: "Triggering swarm stack deploy for {{ application_id }}"
  changed_when: true
  when: compose_mode == 'swarm'
  notify: swarm deploy

- name: "🔄 Flush compose up handlers for '{{ application_id }}'"
  meta: flush_handlers
  when: compose_handlers_flush | bool

- name: "🚀 Post-deploy steps for '{{ application_id }}'"
  ansible.builtin.include_tasks:
    file: post_deploy.yml
    apply:
      delegate_to: "{{ STACK_HOST }}"
      run_once: true
  when: compose_handlers_flush | bool
