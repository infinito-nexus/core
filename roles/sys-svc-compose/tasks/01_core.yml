---
- name: "Resolve deployment_mode for this host"
  ansible.builtin.set_fact:
    deployment_mode: >-
      {{ 'swarm' if 'svc-docker-swarm' in group_names else 'compose' }}
  when: deployment_mode is not defined or deployment_mode == 'compose'

- include_tasks: utils/once/flag.yml

- include_role:
    name: sys-svc-container
    public: false
  when: run_once_sys_svc_container is not defined

- name: Remove all compose pull locks
  file:
    path: "{{ DIR_COMPOSE_PULL_LOCK }}"
    state: absent

- name: "reset (if enabled) for {{ role_name}}"
  include_tasks: 02_reset.yml
  when: MODE_RESET | bool

- name: "create {{ DIR_COMPOSITIONS }}"
  file:
    path: "{{ DIR_COMPOSITIONS }}"
    state: directory
    mode: "0700"
    owner: root
    group: root

- name: "Ensure compose wrapper system deps (PyYAML)"
  ansible.builtin.package:
    name: "{{ sys_svc_compose_pyyaml_package[ansible_os_family] }}"
    state: present

- name: Install compose wrapper
  become: true
  ansible.builtin.copy:
    src: "compose.py"
    dest: "{{ BIN_COMPOSE }}"
    mode: "0755"
    owner: root
    group: root
