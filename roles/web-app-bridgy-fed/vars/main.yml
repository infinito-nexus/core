---
# General
application_id: "web-app-bridgy-fed"

container_port: "{{ lookup('config', application_id, 'services.bridgy-fed.ports.internal.http') }}"
domain: "{{ container_hostname }}"
http_port: "{{ lookup('config', application_id, 'services.bridgy-fed.ports.local.http') }}"
container_hostname: "{{ lookup('domain',application_id) }}"

BRIDGY_CONTAINER: "{{ lookup('config', application_id, 'services.bridgy-fed.name') }}"

BRIDGY_ADMIN_EMAIL: "{{ lookup('users', 'administrator').email }}"

BRIDGY_REPO_URL: "{{ lookup('config', application_id, 'services.bridgy-fed.repository') }}"
BRIDGY_REF: "{{ lookup('config', application_id, 'services.bridgy-fed.ref') }}"

BRIDGY_APPVIEW_HOST: "api.bsky.app"
BRIDGY_PLC_HOST: "plc.directory"
BRIDGY_BGS_HOST: "bsky.network"
BRIDGY_PDS_HOST: "atproto.brid.gy"
