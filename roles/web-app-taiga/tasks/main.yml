---
- name: "load docker, db and proxy for {{ application_id }}"
  include_role:
    name: sys-stk-full
  vars:
    compose_handlers_flush: false
    compose_repository_url: "{{ TAIGA_REPOSITORY }}"
    compose_repository_ref: "{{ TAIGA_REF }}"
    compose_repository_pull: true

- name: "Taiga manager-side operations (file deploys + container exec)"
  include_tasks: 02_manager_ops.yml
  when: IS_STACK_HOST | bool
