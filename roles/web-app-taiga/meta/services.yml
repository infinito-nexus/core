---
# nocheck: dockerfile-custom
sso:
  bond: 1
  enabled: "{{ 'web-app-keycloak' in group_names }}"
  shared: "{{ 'web-app-keycloak' in group_names }}"
  flavor: oidc
  oidc:
    repository: https://github.com/infinito-nexus/taiga-oidc.git
    ref: c623b753047ce9923f3e38614d86e81fc5eb2bb1
ldap:
  bond: 1
  enabled: "{{ 'svc-db-openldap' in group_names }}"
  shared: "{{ 'svc-db-openldap' in group_names }}"
# nocheck: dynamic-flag
logout:
  bond: 1
  enabled: "{{ 'web-svc-logout' in group_names }}"
  shared: "{{ 'web-svc-logout' in group_names }}"
dashboard:
  bond: 1
  enabled: "{{ 'web-app-dashboard' in group_names }}"
  shared: "{{ 'web-app-dashboard' in group_names }}"
matomo:
  bond: 1
  enabled: "{{ 'web-app-matomo' in group_names }}"
  shared: "{{ 'web-app-matomo' in group_names }}"
email:
  bond: 1
  enabled: "{{ MAIL_PROVIDER in group_names }}"
  shared: "{{ MAIL_PROVIDER in group_names }}"
# nocheck: playwright-service-flag — DB engine, covered by role-local integration tests
postgres:
  bond: 1
  enabled: true # nocheck: dynamic-flag
  shared: "{{ 'svc-db-postgres' in group_names }}"
taiga:
  modes:
    compose:
      enabled: true
    swarm:
      enabled: true
  # nocheck: default-placement-manager  embedded rabbitmq engine state; node-local in swarm
  placement: manager
  repository: https://github.com/taigaio/taiga-docker
  ref: main
  version: latest
  min_storage: 10GB
  cpus: "1.0"
  mem_reservation: 1g
  mem_limit: 1.5g
  pids_limit: 512
  ports:
    local:
      sso: 16491
      http: 8027
    internal:
      http: 80
  proxy:
    service_key: gateway
  run_after:
    - web-app-matomo
    - web-app-keycloak
  lifecycle: beta
async:
  cpus: "1.0"
  mem_reservation: 1g
  mem_limit: 1.5g
  pids_limit: 512
front:
  image: node
  version: 26-alpine
  cpus: "0.3"
  mem_reservation: 256m
  mem_limit: 512m
  pids_limit: 256
gateway:
  image: nginx
  version: alpine
  cpus: "0.3"
  mem_reservation: 256m
  mem_limit: 512m
  pids_limit: 256
events:
  image: taigaio/taiga-events
  version: 6.10.0
  cpus: "0.3"
  mem_reservation: 256m
  mem_limit: 512m
  pids_limit: 256
async-rabbitmq:
  image: rabbitmq
  version: "4.3-management-alpine"
  cpus: "1.0"
  mem_reservation: 1g
  mem_limit: 1.5g
  pids_limit: 512
events-rabbitmq:
  image: rabbitmq
  version: "4.3-management-alpine"
  cpus: "0.5"
  mem_reservation: 512m
  mem_limit: 1g
  pids_limit: 512
manager:
  # nocheck: single-replica
  replicas: 1
  name: "taiga-manager"
  cpus: "0.5"
  mem_reservation: 512m
  mem_limit: 1g
  pids_limit: 256
protected:
  image: taigaio/taiga-protected
  version: 6.10.1
  cpus: "0.2"
  mem_reservation: 128m
  mem_limit: 256m
  pids_limit: 128
seaweedfs:
  bond: 1
  enabled: "{{ 'web-app-seaweedfs' in group_names }}"
  shared: "{{ 'web-app-seaweedfs' in group_names }}"
css:
  bond: 1
  enabled: "{{ 'web-svc-css' in group_names }}"
  shared: "{{ 'web-svc-css' in group_names }}"
# nocheck: dynamic-flag
# nocheck: playwright-service-flag — canonical:cdn alias of static-asset provider
javascript:
  enabled: false
  shared: false
prometheus:
  bond: 1
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
# nocheck: dynamic-flag
# nocheck: playwright-service-flag, dynamic-flag infrastructure backup consumer
container_backup: # nocheck: bond-baseline backup host joins outside the variant topology
  bond: 1
  enabled: "{{ 'svc-bkp-volume-2-local' in group_names }}"
  shared: true
