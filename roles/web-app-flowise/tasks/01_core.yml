---
- include_tasks: utils/once/flag.yml

- name: "load docker and db for {{ application_id }}"
  include_role:
    name: sys-stk-backend
  vars:
    compose_handlers_flush: false

- name: "Render Flowise LiteLLM config (local + swarm peers)"
  ansible.builtin.include_tasks:
    file: "{{ [playbook_dir, 'roles/sys-svc-compose/tasks/utils/render_replicated_templates.yml'] | path_join }}"
  vars:
    role_templates:
      - src: "litellm.config.yaml.j2"
        dest: "{{ FLOWISE_LITELLM_CONFIG_PATH_HOST }}"

- name: "flush handlers of compose"
  meta: flush_handlers

- name: "Include role sys-stk-front-proxy for '{{ application_id }}'"
  include_role:
    name: sys-stk-front-proxy
  vars:
    domain: "{{ lookup('domain',application_id) }}"
    http_port: "{{ lookup('config', application_id, 'services.flowise.ports.local.http') }}"
