---
# nocheck: seaweedfs-required
logout:
  bond: 1
  enabled: "{{ 'web-svc-logout' in group_names }}"
  shared: "{{ 'web-svc-logout' in group_names }}"
dashboard:
  bond: 1
  enabled: "{{ 'web-app-dashboard' in group_names }}"
  shared: "{{ 'web-app-dashboard' in group_names }}"
matomo:
  bond: 1
  enabled: "{{ 'web-app-matomo' in group_names }}"
  shared: "{{ 'web-app-matomo' in group_names }}"
sso:
  bond: 1
  enabled: "{{ 'web-app-keycloak' in group_names }}"
  shared: "{{ 'web-app-keycloak' in group_names }}"
  flavor: oauth2
  oauth2:
    origin:
      host: flowise
      port: 3000
    allowed_groups:
      - "{{ lookup('rbac_group_path', application_id='web-app-flowise', role='administrator') }}"
# nocheck: dynamic-flag — LDAP is disabled for this role; the literal false is intentional, not group-gated.
ldap:
  enabled: false
  shared: false
litellm:
  backup:
    no_stop_required: true
  image: ghcr.io/berriai/litellm
  version: main-v1.77.3.dynamic_rates
  name: litellm
  ports:
    internal:
      http: 4000
  cpus: "1.0"
  mem_reservation: 0.5g
  mem_limit: 1g
  pids_limit: 1024
  min_storage: 1GB
# nocheck: playwright-service-flag - DB engine, covered by role-local integration tests
qdrant:
  bond: 1
  enabled: "{{ 'svc-db-qdrant' in group_names }}"
  shared: "{{ 'svc-db-qdrant' in group_names }}"
# nocheck: playwright-service-flag - DB engine, covered by role-local integration tests
postgres:
  bond: 1
  enabled: true # nocheck: dynamic-flag
  shared: "{{ 'svc-db-postgres' in group_names }}"
# nocheck: playwright-service-flag: shared provider entity; the app itself is covered by this role's own Playwright spec
flowise:
  modes:
    compose:
      enabled: true
    swarm:
      enabled: true
  bond: 1
  enabled: true # nocheck: dynamic-flag
  shared: true
  backup:
    no_stop_required: false
  image: flowiseai/flowise
  version: 3.1.3
  name: flowise
  min_storage: 10GB
  cpus: "1.0"
  mem_reservation: 1g
  mem_limit: 2g
  pids_limit: 1024
  ports:
    local:
      http: 8056
      sso: 16480
    internal:
      http: 3000
  proxy:
    service_key: flowise
  run_after:
    - web-app-keycloak
    - web-app-matomo
    - web-app-mailu
  lifecycle: beta
# nocheck: dynamic-flag
# nocheck: playwright-service-flag — DB engine, covered by role-local integration tests
redis:
  backup:
    disabled: true
  enabled: false
  shared: "{{ 'svc-db-redis' in group_names }}"
# nocheck: playwright-service-flag — AI backend, infrastructural
ollama:
  bond: 1
  enabled: "{{ 'svc-ai-ollama' in group_names }}"
  shared: "{{ 'svc-ai-ollama' in group_names }}"
# nocheck: playwright-service-flag — css consumer, no Playwright surface (provider: web-svc-css)
css:
  bond: 1
  enabled: "{{ 'web-svc-css' in group_names }}"
  shared: "{{ 'web-svc-css' in group_names }}"
# nocheck: dynamic-flag
# nocheck: playwright-service-flag — canonical:cdn alias of static-asset provider
javascript:
  enabled: false
  shared: true
email:
  bond: 1
  enabled: "{{ 'web-app-mailu' in group_names }}"
  shared: "{{ 'web-app-mailu' in group_names }}"
prometheus:
  bond: 1
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
# nocheck: dynamic-flag
# nocheck: playwright-service-flag, dynamic-flag infrastructure backup consumer
container_backup: # nocheck: bond-baseline backup host joins outside the variant topology
  bond: 1
  enabled: "{{ 'svc-bkp-volume-2-local' in group_names }}"
  shared: true
