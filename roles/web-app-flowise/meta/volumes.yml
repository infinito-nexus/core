---
flowise_data:
  type: volume
  mounts:
    - service: flowise
      target: /root/.flowise

qdrant_data:
  type: volume
  name: flowise_qdrant_data
  mounts:
    - service: qdrant
      target: /qdrant/storage

litellm_config:
  type: config
  source: "{{ [lookup('container', 'web-app-flowise', 'directories.config'), 'litellm.config.yaml'] | path_join }}"
  mode: "0440"
  mounts:
    - service: litellm
      target: /etc/litellm/config.yaml
