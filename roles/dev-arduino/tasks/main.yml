---
- name: 📦 install arduino developer tools
  package:
    name:
      - arduino
      - arduino-docs
    state: present

- name: "🔧 Add user {{ lookup('users', WORKSTATION_USER).username }} to arduino groups"
  ansible.builtin.user:
    name: "{{ lookup('users', WORKSTATION_USER).username }}"
    groups:
      - uucp
      - lock
    append: true
