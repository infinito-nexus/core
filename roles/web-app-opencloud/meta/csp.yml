---
flags:
  style-src-attr:
    unsafe-inline: true
  script-src-elem:
    unsafe-inline: true
    unsafe-eval: true
  script-src-attr:
    unsafe-inline: true
    unsafe-eval: true
whitelist:
  connect-src:
    - "{{ lookup('tls', 'web-app-keycloak', 'url.base') }}"
    - "{{ lookup('domain', 'web-app-opentalk') }}"
  frame-src:
    - "{{ lookup('tls', 'web-app-keycloak', 'url.base') }}"
    - "{{ lookup('domain', 'web-app-opentalk') }}"
  worker-src:
    - "blob:"
