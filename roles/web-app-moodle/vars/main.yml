---
application_id: "web-app-moodle"
entity_name: "{{ application_id | get_entity_name }}"
swarm_stack_converge_retries: 600

MOODLE_CODE_DIR: "/var/www/html"
MOODLE_DATA_DIR: "/var/www/moodledata"
MOODLE_SOURCE_DIR: "/opt/moodle-source"
MOODLE_ENTRYPOINT_PATH: "/usr/local/bin/moodle-entrypoint.sh"

MOODLE_BUILD_DIR: "build"
MOODLE_BUILD_FILES:
  entrypoint: "moodle-entrypoint.sh"
  config_php: "config.php"
  install_source: "install/moodle-source.sh"
  install_oidc: "install/auth-oidc.sh"
  opcache_ini: "php-conf/opcache-recommended.ini"
  runtime_ini: "php-conf/moodle-runtime.ini"
  fpm_pool: "php-conf/zz-moodle-pool.conf"
MOODLE_VERSION_FILE: "version.php" # bootstrap-detection sentinel
MOODLE_AUTH_SUBDIR: "auth" # top-level auth/ tree
MOODLE_CLI_RELPATH: "admin/cli" # admin CLI script dir

MOODLE_OIDC_PLUGIN_RELPATH: "{{ [MOODLE_AUTH_SUBDIR, 'oidc'] | path_join }}"
MOODLE_OIDC_PLUGIN_DIR: "{{ [MOODLE_CODE_DIR, MOODLE_OIDC_PLUGIN_RELPATH] | path_join }}"
MOODLE_CLI_DIR: "{{ [MOODLE_CODE_DIR, MOODLE_CLI_RELPATH] | path_join }}"
MOODLE_CONFIG: "{{ [MOODLE_CODE_DIR, 'config.php'] | path_join }}"

MOODLE_RUNTIME_USER: "www-data"
MOODLE_RUNTIME_USER_GROUP: "{{ MOODLE_RUNTIME_USER }}:{{ MOODLE_RUNTIME_USER }}"

MOODLE_BRANCH: "{{ lookup('config', application_id, 'services.moodle.branch') }}"
MOODLE_RELEASE: "{{ lookup('config', application_id, 'services.moodle.release') }}"
MOODLE_TARBALL_FILENAME: "moodle-{{ MOODLE_RELEASE }}.tgz"
MOODLE_TARBALL_URL: "https://download.moodle.org/download.php/direct/{{ MOODLE_BRANCH }}/{{ MOODLE_TARBALL_FILENAME }}"

MOODLE_MSMTP_SRC: "{{ lookup('path_absolute', 'roles/sys-svc-mail-msmtp/templates/msmtprc.conf.j2') }}"
MOODLE_MSMTP_ABS: "{{ [ lookup('container', application_id, 'directories.config'), 'msmtprc.conf'] | path_join }}"

MOODLE_IMAGE: "{{ lookup('config', application_id, 'services.moodle.image') }}"
MOODLE_VERSION: "{{ lookup('config', application_id, 'services.moodle.version') }}"
MOODLE_CONTAINER: "{{ lookup('config', application_id, 'services.moodle.name') }}"
MOODLE_CONTAINER_ADDRESS: "{{ lookup('container_address', application_id, entity_name) }}"
MOODLE_DB_CONTAINER_ADDRESS: "{{ lookup('container_address', 'svc-db-mariadb', 'mariadb') }}"
MOODLE_NGINX_CONTAINER: "{{ lookup('config', application_id, 'services.nginx.name') }}"
MOODLE_CRON_CONTAINER: "{{ lookup('config', application_id, 'services.cron.name') }}"

MOODLE_OIDC_ENABLED: "{{ lookup('config', application_id, 'services.sso.enabled') }}"
MOODLE_LDAP_ENABLED: "{{ lookup('config', application_id, 'services.ldap.enabled') }}"

MOODLE_OIDC_CUSTOM_SCOPE: "{{ lookup('config', 'web-app-keycloak', 'services.keycloak.scopes.moodle') }}"
MOODLE_OIDC_SCOPES: "openid profile email phone address {{ MOODLE_OIDC_CUSTOM_SCOPE }}"

MOODLE_SITE_TITLE: "{{ lookup('config', application_id, 'services.moodle.site_titel') }}"

MOODLE_FPM_PORT: "{{ lookup('config', application_id, 'services.moodle.ports.internal.fpm') }}"
MOODLE_NGINX_PORT: "{{ lookup('config', application_id, 'services.moodle.ports.internal.http') }}"

MOODLE_PHP_MEMORY_LIMIT: "{{ lookup('config', application_id, 'services.moodle.performance.php.memory_limit') }}"
MOODLE_PHP_UPLOAD_MAX_FILESIZE: "{{ lookup('config', application_id, 'services.moodle.performance.php.upload_max_filesize') }}"
MOODLE_PHP_POST_MAX_SIZE: "{{ lookup('config', application_id, 'services.moodle.performance.php.post_max_size') }}"
MOODLE_PHP_MAX_EXECUTION_TIME: "300"
MOODLE_PHP_MAX_INPUT_VARS: "5000"
