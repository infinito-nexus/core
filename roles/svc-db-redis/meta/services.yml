---
redis:
  # nocheck: default-placement-manager  central cache engine, node-local on-disk state (ACL file + optional AOF), single-node until redis replication is in scope
  placement: manager
  bond: 1
  enabled: true
  shared: true
  image: redis
  name: redis-central
  version: alpine
  min_storage: 1GB
  backup:
    disabled: true
  cpus: "0.5"
  mem_reservation: "128m"
  mem_limit: "512m"
  pids_limit: 512
  ports:
    local:
      redis: 6379
    internal:
      redis: 6379
  lifecycle: beta

# nocheck: playwright-service-flag, dynamic-flag infrastructure backup consumer
container_backup: # nocheck: bond-baseline backup host joins outside the variant topology
  bond: 1
  enabled: "{{ 'svc-bkp-volume-2-local' in group_names }}"
  shared: true
