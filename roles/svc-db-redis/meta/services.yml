---
redis:
  bond: 1
  enabled: true
  shared: true
  image: redis
  version: alpine
  min_storage: 1GB
  backup:
    disabled: true
  lifecycle: pre-alpha
  cpus: "0.5"
  mem_reservation: "128m"
  mem_limit: "512m"
  pids_limit: 512
tor:
  bond: 1
  enabled: "{{ 'svc-net-tor' in group_names }}"
  shared: true  # nocheck: dynamic-flag
