---
# nocheck: dockerfile-custom
runner:
  modes:
    compose:
      enabled: true
    swarm:
      enabled: true
  lifecycle: beta
  workload: node-local
  proxy:
    service_key: runner-1
  github_owner: infinito-nexus
  github_repo: core
  docker_base: /mnt/docker
  image: ubuntu
  # todo: bump to the current ubuntu release once download.docker.com publishes a repo for its codename (26.10 "stonking" has none yet)
  # nocheck: docker-version
  version: "24.04"
  docker_gid_fallback: 999
  project_prefix: runner
  sysctl_conf: /etc/sysctl.d/99-github-runner.conf
  image_name: infinito-runner
  image_tag: latest
  install_dir: /opt/github-runner
  cpus: 2
