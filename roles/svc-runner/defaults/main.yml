runner_name: "{{ inventory_hostname }}"
runner_distribution: ""
runner_labels: "self-hosted,linux,{{ runner_distribution }}"
runner_install_dir: /opt/github-runner
runner_user: github-runner
runner_uid: 900
runner_gid: 900
# Matches the GitHub-hosted 2-core runner quota; drives auto-scaling via runner_count.
runner_cpus: 2
runner_count: "{{ [ansible_processor_vcpus | int // runner_cpus | int, 1] | max }}"
runner_docker_base: "{{ lookup('config', application_id, 'services.svc-runner.docker_base') }}"
runner_project_prefix: runner
runner_sysctl_conf: /etc/sysctl.d/99-github-runner.conf
runner_image_name: infinito-runner
runner_image_tag: latest
# GitHub registration — lowest precedence so -e extra-vars always win
RUNNER_GITHUB_OWNER: "{{ lookup('env', 'GITHUB_REPOSITORY_OWNER') | default(lookup('config', application_id, 'services.svc-runner.github_owner'), true) }}"
RUNNER_GITHUB_REPO: "{{ (lookup('env', 'GITHUB_REPOSITORY') | split('/') | last) | default(lookup('config', application_id, 'services.svc-runner.github_repo'), true) }}"
RUNNER_API_TOKEN: "{{ lookup('env', 'GH_TOKEN') | default(lookup('env', 'GITHUB_TOKEN'), true) }}"
