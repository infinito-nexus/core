---
RUNNER_NAME: "{{ inventory_hostname }}"
RUNNER_DISTRIBUTION: ""
RUNNER_LABELS: "self-hosted,linux,{{ RUNNER_DISTRIBUTION }}"
RUNNER_COUNT: "{{ [ansible_facts['processor_vcpus'] | int // RUNNER_CPUS | int, 1] | max }}"
RUNNER_SRC_DIR: "{{ lookup('env', 'INFINITO_SRC_DIR') }}" # nocheck: compose dev-container checkout; swarm CI overrides with the node checkout via inventories/development/swarm.yml
INFINITO_IMAGE_TAG: "{{ lookup('env', 'INFINITO_IMAGE_TAG') | default('latest', true) }}" # nocheck
INFINITO_GHCR_MIRROR_PREFIX: "{{ lookup('env', 'INFINITO_GHCR_MIRROR_PREFIX') | default('', true) }}" # nocheck
