---
- name: "🧩 load docker, db and proxy for {{ application_id }}"
  include_role:
    name: sys-stk-full

- name: "📄 Render Jenkins JCasC config"
  stack_host_template:
    src: casc.yaml.j2
    dest: "{{ JENKINS_CASC_FILE }}"
    mode: "0644"
  notify:
    - compose up
  when: IS_STACK_HOST | bool

- name: "🎬 Stage Jenkins build-context sidecar files into the compose dir"
  stack_host_copy:
    src: "{{ item }}"
    dest: "{{ [ lookup('container', application_id, 'directories.instance'), item | basename ] | path_join }}"
    mode: "0644"
  loop:
    - plugins.txt
    - "{{ lookup('path_absolute', 'roles/sys-ca-selfsigned/files/java-with-ca-trust.sh') }}"
  notify:
    - compose build
    - compose up
