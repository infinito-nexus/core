---
# Matrix-deploy variant overrides. Variant 0 is
# the canonical OIDC variant (Jenkins's `oic-auth` plugin against
# Keycloak). Variant 1 flips the role onto the `ldap` plugin against
# `svc-db-openldap`.

# variant 0: OIDC variant (canonical default).

- services:
    container_backup:
      enabled: true
    dashboard:
      enabled: true
      shared: true
    logout:
      enabled: true
      shared: true
    matomo:
      enabled: true
      shared: true
    sso:
      enabled: true
      shared: true
    prometheus:
      enabled: true
      shared: true
    ldap:
      enabled: true
      shared: true
    css:
      enabled: true
      shared: true
- services:
    container_backup:
      enabled: false
      shared: false # nocheck: variants-static-override backup shared stays literally true
    sso:
      enabled: false
      shared: false # nocheck: variants-static-override backup shared stays literally true
    dashboard:
      enabled: false
      shared: false # nocheck: variants-static-override backup shared stays literally true
    logout:
      enabled: false
      shared: false # nocheck: variants-static-override backup shared stays literally true
    matomo:
      enabled: false
      shared: false # nocheck: variants-static-override backup shared stays literally true
    prometheus:
      enabled: false
      shared: false # nocheck: variants-static-override backup shared stays literally true
    ldap:
      enabled: false
      shared: false # nocheck: variants-static-override backup shared stays literally true
    css:
      enabled: false
      shared: false # nocheck: variants-static-override backup shared stays literally true
- services:
    container_backup:
      enabled: false
      shared: false # nocheck: variants-static-override backup shared stays literally true
    ldap:
      enabled: true
      shared: true
    sso:
      enabled: false
      shared: false # nocheck: variants-static-override backup shared stays literally true
    css:
      enabled: false
      shared: false # nocheck: variants-static-override backup shared stays literally true
    dashboard:
      enabled: false
      shared: false # nocheck: variants-static-override backup shared stays literally true
    logout:
      enabled: false
      shared: false # nocheck: variants-static-override backup shared stays literally true
    matomo:
      enabled: false
      shared: false # nocheck: variants-static-override backup shared stays literally true
    prometheus:
