---
- include_tasks: utils/once/flag.yml

- name: "🧩 load docker, proxy for '{{ application_id }}'"
  include_role:
    name: sys-stk-full
    public: true
  vars:
    compose_handlers_flush: true
    compose_repository_pull: false
    webserver_vhost_flavour: "basic"
    application_id: "web-svc-collabora"

- name: "🖥️ Collabora stack-host-only coolconfig setup"
  when: IS_STACK_HOST | bool
  block:
    - name: "🔍 Resolve collabora hosting node + container id"
      ansible.builtin.include_tasks: "{{ lookup('path_absolute', 'roles/sys-svc-compose/tasks/utils/swarm/resolve_host_cid.yml') }}"
      vars:
        resolve_service_key: collabora
        resolve_output_prefix: COLLABORA
        resolve_compose_cid: "{{ COLLABORA_CONTAINER_ADDRESS }}"

    - name: 🔄 Update Collabora systemplate to include new fonts
      shell: > # nocheck: container-exec-resolver  runtime-resolved CID, delegated to the hosting node
        container exec {{ COLLABORA_LOCAL_CID | quote }} coolconfig update-system-template
      register: collabora_fonts
      changed_when: >
        (not ASYNC_ENABLED | bool )
        and
        ('updated' in (collabora_fonts.stdout | default('')))
      async: "{{ ASYNC_TIME  if (ASYNC_ENABLED |  bool) else omit }}"
      poll: "{{ ASYNC_POLL if (ASYNC_ENABLED |  bool) else omit }}"
      delegate_to: "{{ COLLABORA_HOST_NODE }}"

    - name: 🖥️ Allow Nextcloud host IP for Collabora preview conversion
      shell: > # nocheck: container-exec-resolver  runtime-resolved CID, delegated to the hosting node
        container exec {{ COLLABORA_LOCAL_CID | quote }} coolconfig set net.post_allow.host {{ networks.internet.ip4 }}
      register: collabora_preview
      changed_when: >
        (not ASYNC_ENABLED | bool )
        and
        ('already present' not in (collabora_preview.stdout | default('')))
      async: "{{ ASYNC_TIME if ASYNC_ENABLED | bool else omit }}"
      poll: "{{ ASYNC_POLL if ASYNC_ENABLED | bool else omit }}"
      delegate_to: "{{ COLLABORA_HOST_NODE }}"
