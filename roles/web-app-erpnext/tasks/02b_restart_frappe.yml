---
# Restart Frappe after install-app so the long-lived containers pick up the new
# app (they cache the app set at startup and 500 on /login otherwise). Compose
# uses the bare container names; swarm tasks are named <entity>_<service-key>,
# so swarm restarts via `service update --force` instead.
- name: "🔄 restart Frappe containers to pick up newly-installed app (compose mode)"
  ansible.builtin.shell: |
    set -euo pipefail
    container restart \
      {{ ERPNEXT_BACKEND_CONTAINER }} \
      {{ ERPNEXT_FRONTEND_CONTAINER }} \
      {{ ERPNEXT_WEBSOCKET_CONTAINER }} \
      {{ ERPNEXT_SCHEDULER_CONTAINER }} \
      {{ ERPNEXT_QUEUE_SHORT_CONTAINER }} \
      {{ ERPNEXT_QUEUE_LONG_CONTAINER }}
  changed_when: false
  when: DEPLOYMENT_MODE == 'compose'

- name: "🔄 restart Frappe services to pick up newly-installed app (swarm mode)"
  ansible.builtin.command: >-
    container service update --force {{ entity_name }}_{{ item }}
  loop:
    - backend
    - frontend
    - websocket
    - scheduler
    - queue-short
    - queue-long
  changed_when: false
  timeout: 600
  when: DEPLOYMENT_MODE == 'swarm'
