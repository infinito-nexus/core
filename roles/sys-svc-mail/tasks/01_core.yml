---
- include_tasks: utils/once/flag.yml

- name: 📂 Include dependencies
  include_role:
    name: "sys-hostname"
  when: not (run_once_sys_hostname | default(false) | bool)

- name: "✅ Assert the mail provider was preloaded before configuring external mail"
  ansible.builtin.assert:
    that:
      - >-
        lookup('vars', 'run_once_' ~ (MAIL_PROVIDER | replace('-', '_')),
        default='__missing__') != '__missing__'
      - (lookup('users', 'no-reply').tokens | default({})).get(MAIL_PROVIDER, '') | length > 0
    fail_msg: >-
      {{ MAIL_PROVIDER }} must be preloaded by sys-service-loader before
      sys-svc-mail runs. Missing run_once_{{ MAIL_PROVIDER | replace('-', '_') }}
      or missing users['no-reply'].tokens['{{ MAIL_PROVIDER }}'] indicates that
      a service was loaded outside the constructor service-loader path.
  when:
    - MAIL_PROVIDER in group_names
    - MODE_ASSERT_LOCAL | bool

- name: 🔧 Setup emails via localhost
  include_role:
    name: sys-svc-mail-smtp
  when:
    - run_once_sys_svc_mail_smtp is not defined
    - not (lookup('email').external | bool)

- name: 🔧 Setup msmtp client
  include_role:
    name: sys-svc-mail-msmtp
  when:
    - run_once_sys_svc_mail_msmtp is not defined
