---
application_id: "web-app-mattermost"
entity_name: "{{ application_id | get_entity_name }}"

container_port: "{{ lookup('config', application_id, 'services.mattermost.ports.local.http') }}"

MATTERMOST_CONTAINER: "{{ lookup('config', application_id, 'services.mattermost.name') }}"
MATTERMOST_CONTAINER_ADDRESS: "{{ lookup('container_address', application_id, entity_name) }}"

# OIDC via MM_GITLABSETTINGS_* (Team Edition workaround for Keycloak)
MATTERMOST_OIDC_ENABLED: "{{ lookup('config', application_id, 'services.sso.enabled') }}"

MATTERMOST_KEYCLOAK_CONTAINER_ADDRESS: "{{ lookup('container_address', 'web-app-keycloak', 'keycloak') }}"
MATTERMOST_KEYCLOAK_ADMIN_USER: "{{ lookup('config', 'web-app-keycloak', 'services.keycloak.accounts.system.username') }}"
MATTERMOST_KEYCLOAK_ADMIN_PASS: "{{ lookup('users', 'administrator').password }}"

MATTERMOST_LDAP_CONTAINER_ADDRESS: "{{ lookup('container_address', 'svc-db-openldap', 'openldap') }}"
