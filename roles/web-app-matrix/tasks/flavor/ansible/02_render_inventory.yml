---
- name: "ensure MDAD inventory host_vars dir exists"
  ansible.builtin.file:
    path: "{{ MATRIX_MDAD_DIR }}/inventory/host_vars/{{ MATRIX_SYNAPSE_DOMAIN }}"
    state: directory
    mode: "0755"

- name: "render MDAD inventory hosts file"
  ansible.builtin.template:
    src: "flavor/ansible/hosts.j2"
    dest: "{{ MATRIX_MDAD_DIR }}/inventory/hosts"
    mode: "0644"

- name: "render MDAD host_vars vars.yml"
  ansible.builtin.template:
    src: "flavor/ansible/vars.yml.j2"
    dest: "{{ MATRIX_MDAD_DIR }}/inventory/host_vars/{{ MATRIX_SYNAPSE_DOMAIN }}/vars.yml"
    mode: "0644"
  register: _matrix_mdad_vars

- name: "reconfigure matrix-mdad on inventory change"
  ansible.builtin.shell: |
    set -euo pipefail
    _mp="$(docker volume inspect -f '{% raw %}{{ .Mountpoint }}{% endraw %}' matrix_matrix_mdad_state)"
    rm -f "${_mp}/bootstrap.done"
    if docker ps -q -f name=^matrix-mdad$ | grep -q .; then
      docker restart matrix-mdad
    fi
  args:
    executable: /bin/bash
  become: true
  when: _matrix_mdad_vars is changed
