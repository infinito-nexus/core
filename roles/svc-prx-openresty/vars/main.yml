---
# General
application_id: "svc-prx-openresty"

service_is_stateful: true

# Openresty

# Probapbly hard to implement to use dynamic entity_name here, so sticking with hard coded entity in conf path
OPENRESTY_IMAGE: "{{ lookup('config','svc-prx-openresty', 'services.openresty.image') }}"
OPENRESTY_VERSION: "{{ lookup('config','svc-prx-openresty', 'services.openresty.version') }}"
OPENRESTY_CONTAINER: "{{ lookup('config','svc-prx-openresty', 'services.openresty.name') }}"

OPENRESTY_CUSTOM_IMAGE: "openresty_custom"
OPENRESTY_CUSTOM_VERSION: "{{ OPENRESTY_VERSION }}"

OPENRESTY_PROMETHEUS_ENABLED: "{{ ('web-app-prometheus' in lookup('applications')) | lower }}"
OPENRESTY_LUA_PROMETHEUS_URL_MAIN: "https://raw.githubusercontent.com/infinito-nexus/nginx-lua-prometheus/master/prometheus.lua"
OPENRESTY_LUA_PROMETHEUS_URL_COUNTER: "https://raw.githubusercontent.com/infinito-nexus/nginx-lua-prometheus/master/prometheus_resty_counter.lua"
OPENRESTY_LUA_PROMETHEUS_URL_KEYS: "https://raw.githubusercontent.com/infinito-nexus/nginx-lua-prometheus/master/prometheus_keys.lua"
