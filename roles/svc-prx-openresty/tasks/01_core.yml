---
- include_tasks: utils/once/flag.yml

- when: DEPLOYMENT_MODE == 'swarm'
  block:
    - name: "Stat the docker socket so the swarm openresty worker can be group-added to it"
      ansible.builtin.stat:
        path: /var/run/docker.sock
      register: _openresty_docker_sock

    - name: "Set OPENRESTY_DOCKER_SOCK_GID from the live socket gid"
      ansible.builtin.set_fact:
        OPENRESTY_DOCKER_SOCK_GID: "{{ _openresty_docker_sock.stat.gid }}"
      when: _openresty_docker_sock.stat.exists | default(false)

- name: "Ensure all openresty bind-mount source dirs exist (must precede swarm stack-deploy)"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ lookup('nginx','files.configuration') | dirname }}"
    - "{{ lookup('nginx','directories.configuration.base') }}"
    - "{{ lookup('nginx','directories.data.www') }}"
    - "{{ lookup('nginx','directories.data.well_known') }}"
    - "{{ LETSENCRYPT_WEBROOT_PATH }}"
    - "{{ LETSENCRYPT_BASE_PATH }}"
    - "{{ TLS_SELFSIGNED_BASE_PATH }}"

- name: Ensure base nginx.conf exists (bootstrap)
  ansible.builtin.copy:
    dest: "{{ lookup('nginx','files.configuration') }}"
    force: false
    mode: "0644"
    content: |
      events {}
      http { server { listen 8080; return 200; } }

- name: "Setup container network for {{ application_id }}"
  include_tasks: "{{ [playbook_dir, 'roles/sys-svc-compose/tasks/utils/network/routine.yml' ] | path_join }}"
  vars:
    compose_handlers_flush: true

- name: "swarm: add openresty to the docker.sock supplementary group (compose group_add is rejected by docker stack deploy)"
  ansible.builtin.command: >-
    container service update --detach=false
    --group-add {{ OPENRESTY_DOCKER_SOCK_GID | quote }}
    {{ lookup('container_service', application_id, 'openresty') | quote }}
  changed_when: true
  delegate_to: "{{ STACK_HOST }}"
  when:
    - DEPLOYMENT_MODE == 'swarm'
    - OPENRESTY_DOCKER_SOCK_GID is defined

- name: "Verify that '{{ role_name }}' works"
  include_tasks: 02_assert.yml
  when: MODE_ASSERT_LOCAL | bool

- include_tasks: utils/once/flag.yml
