---
openresty:
  # nocheck: default-placement-manager  edge proxy + TLS terminator at a known IP; sys-front-inj-* Lua pipeline cannot ride the overlay yet (Future Extension: Traefik with Yaegi)
  placement: manager
  bond: 1
  enabled: true
  shared: true
  name: openresty
  min_storage: 1GB
  cpus: 0.5
  mem_reservation: 1g
  mem_limit: 2g
  image: openresty/openresty
  version: alpine
  lifecycle: beta
  pids_limit: 256

# nocheck: playwright-service-flag, dynamic-flag infrastructure backup consumer
container_backup: # nocheck: bond-baseline backup host joins outside the variant topology
  bond: 1
  enabled: "{{ 'svc-bkp-volume-2-local' in group_names }}"
  shared: true
