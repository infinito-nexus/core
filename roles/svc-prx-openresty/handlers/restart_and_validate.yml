---
# Swarm bind-mounts of a FILE pin the source inode at task-create time.
# stack_host_template writes atomically (write-tmp + rename), so the
# source inode changes; the running task keeps the old, deleted inode
# mounted and `openresty -s reload` reads stale config. Force a task
# redeploy on the manager to remount the live inode.
- name: Compose-mode validate + in-place reload (swarm uses service-update instead)
  when: DEPLOYMENT_MODE != 'swarm'
  block:
    - name: Validate OpenResty configuration (Pre-Flight-Check)
      ansible.builtin.shell: >
        container exec {{ lookup('container_address', 'svc-prx-openresty', 'openresty') }} openresty -t -q
      register: openresty_test_pre
      changed_when: false
      failed_when: >
        openresty_test_pre.rc != 0 and
        ('is not running' not in ((openresty_test_pre.stderr | default('')) | lower)) and
        ('no such container' not in ((openresty_test_pre.stderr | default('')) | lower)) and
        ('is restarting' not in ((openresty_test_pre.stderr | default('')) | lower))

    - name: Reload OpenResty configuration (in-place, preserves listeners)
      ansible.builtin.shell: >
        container exec {{ lookup('container_address', 'svc-prx-openresty', 'openresty') }}
        openresty -s reload
      register: openresty_restart
      changed_when: true
      failed_when: >
        openresty_restart.rc != 0 and
        ('is not running' not in ((openresty_restart.stderr | default('')) | lower)) and
        ('no such container' not in ((openresty_restart.stderr | default('')) | lower))

- name: Force OpenResty service redeploy (remounts bind to live inode)
  ansible.builtin.command: >-
    container service update --force
    {{ lookup('container_service', 'svc-prx-openresty', 'openresty') }}
  register: openresty_swarm_update
  changed_when: openresty_swarm_update.rc == 0
  when:
    - DEPLOYMENT_MODE == 'swarm'
    - IS_STACK_HOST | bool

- name: "MODE_DEBUG: wait + validate OpenResty"
  when: MODE_DEBUG | bool
  block:
    - ansible.builtin.command: container ps -a --format '{{"{{.Names}} {{.Status}}"}}'
      register: docker_ps
      changed_when: false
      failed_when: false
      ignore_errors: true

    - ansible.builtin.shell: >
        container logs --tail=200 {{ lookup('container_address', 'svc-prx-openresty', 'openresty') }}
      register: openresty_logs
      changed_when: false
      failed_when: false
      ignore_errors: true

    - ansible.builtin.debug:
        msg: |
          Container status:
          {{ docker_ps.stdout | default('') }}

          OpenResty logs (last 200 lines):
          {{ openresty_logs.stdout | default('') }}
          {{ openresty_logs.stderr | default('') }}
      ignore_errors: true
