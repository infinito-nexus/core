---
- name: "Assert NFS server + export base are configured"
  ansible.builtin.assert:
    that:
      - storage.nfs.server is defined
      - storage.nfs.server | length > 0
      - storage.nfs.export_base is defined
      - storage.nfs.export_base | length > 0
    fail_msg: |
      svc-storage-nfs-client requires `storage.nfs.server` and
      `storage.nfs.export_base` to be set in group_vars (see
      group_vars/all/15_storage.yml). Reachable NFS server IP/hostname
      and the matching export base path are mandatory.

- name: "Install NFS client packages"
  ansible.builtin.package:
    name: "{{ SVC_STORAGE_NFS_CLIENT_PACKAGES[ansible_facts.os_family] }}"
    state: present

- name: "Ensure probe mount point exists"
  ansible.builtin.file:
    path: "{{ SVC_STORAGE_NFS_CLIENT_PROBE_DIR }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: "Probe-mount the NFS export"
  ansible.posix.mount:
    path: "{{ SVC_STORAGE_NFS_CLIENT_PROBE_DIR }}"
    src: "{{ storage.nfs.server }}:{{ STORAGE_NFS_STATE_PATH }}"
    fstype: "{{ 'nfs4' if (storage.nfs.version | int) >= 4 else 'nfs' }}"
    opts: "{{ STORAGE_NFS_MOUNT_OPTS }},_netdev,noauto"
    state: ephemeral
  register: svc_storage_nfs_client_probe
  failed_when:
    - svc_storage_nfs_client_probe is failed

- name: "Probe-write a marker to confirm the mount is RW"
  ansible.builtin.copy:
    dest: "{{ SVC_STORAGE_NFS_CLIENT_PROBE_DIR }}/.svc-storage-nfs-client-probe"
    content: |
      probed-by={{ inventory_hostname }}
      probed-at={{ ansible_facts.date_time.iso8601 }}
    mode: "0644"

- name: "Unmount probe mount"
  ansible.posix.mount:
    path: "{{ SVC_STORAGE_NFS_CLIENT_PROBE_DIR }}"
    state: unmounted

- name: "Detect {{ DIR_VAR_LIB }} pre-mount state"
  ansible.builtin.script:
    cmd: "{{ role_path }}/files/premount_state.sh"
    executable: /bin/bash
  environment:
    DIR_VAR_LIB: "{{ DIR_VAR_LIB }}"
  register: _svc_storage_nfs_client_premount_state
  changed_when: false

- name: "Assert no pre-existing local data at {{ DIR_VAR_LIB }} (mount-over would hide it)"
  ansible.builtin.assert:
    that:
      - (_svc_storage_nfs_client_premount_state.stdout | trim) in ["mounted", "empty"]
    fail_msg: >-
      Pre-existing local data found at {{ DIR_VAR_LIB }}; NFS mount-over
      would silently hide it. Migrate or remove the local tree manually,
      then re-run the deploy.

- name: "Ensure infinito state mount point exists"
  ansible.builtin.file:
    path: "{{ DIR_VAR_LIB }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: "Persistently mount cluster-shared infinito state from NFS"
  ansible.posix.mount:
    path: "{{ DIR_VAR_LIB }}"
    src: "{{ storage.nfs.server }}:{{ STORAGE_NFS_STATE_PATH }}"
    fstype: "{{ 'nfs4' if (storage.nfs.version | int) >= 4 else 'nfs' }}"
    opts: "{{ STORAGE_NFS_MOUNT_OPTS }},_netdev"
    state: mounted
