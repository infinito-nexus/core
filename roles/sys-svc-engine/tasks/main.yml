---
# nocheck: run-once
- name: "For '{{ application_id }}': Freeze engine consumer id"
  ansible.builtin.set_fact:
    _engine_consumer_id: "{{ engine_consumer_id | default(application_id) }}"
  changed_when: false

- name: "For '{{ _engine_consumer_id }}': Provision shared engines on their central providers"
  include_tasks: provision.yml
  loop: "{{ ['rabbitmq', 'elasticsearch', 'typesense'] }}"
  loop_control:
    loop_var: _engine_type
  when: lookup('engine', _engine_type, _engine_consumer_id, 'shared') | bool
