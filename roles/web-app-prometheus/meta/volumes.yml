---
data:
  type: volume
  name: prometheus_data
  mounts:
    - service: prometheus
      target: /prometheus

alertmanager_data:
  type: volume
  name: prometheus_alertmanager_data
  mounts:
    - service: alertmanager
      target: /alertmanager

# Swarm materialises config objects as root:root; the prom/* images run as
# `nobody`, so 0440 (no "other" read bit) makes them unreadable -> exit 2.
# 0444 keeps them read-only while letting the non-root runtime user load them.
prometheus_config:
  type: config
  source: "{{ [lookup('container', 'web-app-prometheus', 'directories.config'), 'prometheus.yml'] | path_join }}"
  mode: "0444"
  mounts:
    - service: prometheus
      target: /etc/prometheus/prometheus.yml

alert_rules:
  type: config
  source: "{{ [lookup('container', 'web-app-prometheus', 'directories.config'), 'alert_rules.yml'] | path_join }}"
  mode: "0444"
  mounts:
    - service: prometheus
      target: /etc/prometheus/alert_rules.yml

blackbox_config:
  type: config
  source: "{{ [lookup('container', 'web-app-prometheus', 'directories.config'), 'blackbox.yml'] | path_join }}"
  mode: "0444"
  mounts:
    - service: blackbox-exporter
      target: /etc/blackbox_exporter/config.yml

alertmanager_config:
  type: config
  source: "{{ [lookup('container', 'web-app-prometheus', 'directories.config'), 'alertmanager.yml'] | path_join }}"
  mode: "0444"
  mounts:
    - service: alertmanager
      target: /etc/alertmanager/alertmanager.yml

host_rootfs:
  type: bind
  source: "/"
  read_only: true
  mounts:
    - service: cadvisor
      target: /rootfs
    - service: node-exporter
      target: /rootfs

host_var_run:
  type: bind
  source: "/var/run"
  read_only: true
  mounts:
    - service: cadvisor
      target: /var/run

host_sys:
  type: bind
  source: "/sys"
  read_only: true
  mounts:
    - service: cadvisor
      target: /sys
    - service: node-exporter
      target: /host/sys

host_var_lib_docker:
  type: bind
  source: "/var/lib/docker/"
  read_only: true
  mounts:
    - service: cadvisor
      target: /var/lib/docker

# /dev/disk does not exist on swarm DinD nodes, so the bind makes the swarm
# service Reject ("bind source path does not exist"). cadvisor only uses it to
# enrich per-disk stats, which is optional, so gate the mount to compose where
# the host path is real.
host_dev_disk:
  type: bind
  source: "/dev/disk/"
  read_only: true
  mounts:
    - service: cadvisor
      target: /dev/disk
      when: "{{ DEPLOYMENT_MODE == 'compose' }}"

host_proc:
  type: bind
  source: "/proc"
  read_only: true
  mounts:
    - service: node-exporter
      target: /host/proc
