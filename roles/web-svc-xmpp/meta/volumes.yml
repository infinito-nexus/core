---
data:
  type: volume
  name: ejabberd_data
  mounts:
    - service: ejabberd
      target: /home/ejabberd/database
conf:
  type: volume
  name: ejabberd_conf
  mounts:
    - service: ejabberd
      target: /home/ejabberd/conf
upload:
  type: volume
  name: ejabberd_upload
  mounts:
    - service: ejabberd
      target: /home/ejabberd/upload
logs:
  type: volume
  name: ejabberd_logs
  mounts:
    - service: ejabberd
      target: /home/ejabberd/logs
ejabberd_yml:
  type: config
  source: "{{ [lookup('container', 'web-svc-xmpp', 'directories.instance'), 'ejabberd.yml'] | path_join }}"
  mode: "0440"
  mounts:
    - service: ejabberd
      target: /home/ejabberd/conf/ejabberd.yml
