---
# nocheck: dynamic-flag
logout:
  enabled: false
  shared: false
prometheus:
  bond: 1
  enabled: "{{ 'web-app-prometheus' in group_names }}"
  shared: "{{ 'web-app-prometheus' in group_names }}"
sso:
  bond: 1
  enabled: "{{ 'web-app-keycloak' in group_names }}"
  shared: "{{ 'web-app-keycloak' in group_names }}"
  flavor: oidc
ldap:
  bond: 1
  enabled: "{{ 'svc-db-openldap' in group_names }}"
  shared: "{{ 'svc-db-openldap' in group_names }}"
xmpp:
  image: ejabberd/ecs
  version: latest
  name: ejabberd
  ports:
    local:
      http: 8082
    public:
      c2s: 5222
      s2s: 5269
    internal:
      http: 5280
      c2s: 5222
      s2s: 5269
  proxy:
    service_key: ejabberd
  run_after:
    - web-app-keycloak
    - svc-db-openldap
  lifecycle: beta
  min_storage: 5GB
  cpus: "0.5"
  mem_reservation: 256m
  mem_limit: 1g
  pids_limit: 512
