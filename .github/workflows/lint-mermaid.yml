name: "🔍 Lint: Mermaid"

on:
  workflow_call:

permissions:
  contents: read

jobs:
  lint-mermaid:
    name: 🧹 Lint Mermaid
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v7.0.0

      - name: 🔧 Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: 📦 Install @mermaid-js/mermaid-cli
        run: npm install -g @mermaid-js/mermaid-cli

      - name: ▶️ Render every mermaid diagram
        run: bash scripts/lint/mermaid.sh
