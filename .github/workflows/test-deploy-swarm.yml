name: "🐝 Test: Deploy (swarm)"

on:
  workflow_call:
    inputs:
      whitelist:
        description: "Optional space-separated whitelist of app ids"
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      whitelist:
        description: "Optional space-separated whitelist of app ids"
        required: false
        type: string
        default: ""

permissions:
  contents: read
  packages: read

env:
  INFINITO_DEPLOY_TYPE: server
  NIX_CONFIG: |
    access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
  INFINITO_IMAGE_TAG: ci-${{ github.sha }}
  INFINITO_GHCR_MIRROR_PREFIX: mirror
  INFINITO_APP_DISCOVERY_RUNNER: host

jobs:
  discover:
    name: 🌐 Discover apps
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      apps: ${{ steps.discover.outputs.apps }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🔍 Resolve repository owner
        shell: bash
        run: |
          set -euo pipefail
          echo "GITHUB_REPOSITORY_OWNER=$(scripts/meta/resolve/repository/owner.sh)" >> "$GITHUB_ENV"

      - name: 📦 Install jq
        shell: bash
        run: ./scripts/install/apt.sh jq

      - name: Install deps (jq + envsubst)
        shell: bash
        run: ./scripts/install/apt.sh jq gettext-base

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project (host venv)
        shell: bash
        run: |
          make install-force
          # shellcheck source=/dev/null
          source scripts/meta/env/load.sh
          echo "${VENV}/bin" >> "${GITHUB_PATH}"

      - name: Resolve effective whitelist (diff vs origin/main)
        id: resolve_wl
        shell: bash
        env:
          INPUT_WHITELIST: ${{ inputs.whitelist }}
        run: ./scripts/github/resolve/effective_whitelist.sh

      - name: Discover apps
        id: discover
        shell: bash
        env:
          INFINITO_WHITELIST: ${{ steps.resolve_wl.outputs.whitelist }}
        run: ./scripts/github/resolve/output_apps.sh

  swarm:
    name: "🐝 Swarm ${{ matrix.apps }}"
    if: needs.discover.outputs.apps != '' && needs.discover.outputs.apps != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: discover

    strategy:
      fail-fast: false
      matrix:
        apps: ${{ fromJson(needs.discover.outputs.apps) }}

    env:
      APP_ID: ${{ matrix.apps }}
      MGR: swarm-mgr-01
      WRK1: swarm-wrk-01
      WRK2: swarm-wrk-02
      NFS_SERVER: nfs-server
      NFS_EXPORT_BASE: /srv/nfs
      RESCHED_TIMEOUT: "120"
      SCRIPTS: scripts/tests/deploy/swarm

    steps:
      - name: "Checkout"
        if: ${{ !env.ACT }}
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project (host venv)
        shell: bash
        run: |
          make install-force
          # shellcheck source=/dev/null
          source scripts/meta/env/load.sh
          echo "${VENV}/bin" >> "${GITHUB_PATH}"

      - name: "Create dedicated network for simulated cluster (MTU 1400)"
        # MTU 1400: TLS ServerHello fragmentation drops on host PMTU < 1500.
        run: |
          docker network create \
            --driver bridge \
            --subnet 192.168.244.0/24 \
            --opt com.docker.network.driver.mtu=1400 \
            swarm-lab

      - name: "Start NFSv4 server (empty systemd-Ubuntu)"
        run: ${{ env.SCRIPTS }}/01_start_nfs.sh

      - name: "Start 3 simulated swarm nodes (systemd Ubuntu)"
        run: ${{ env.SCRIPTS }}/02_start_swarm_nodes.sh

      - name: "Capture node + NFS-server IPs"
        run: ${{ env.SCRIPTS }}/03_capture_ips.sh

      - name: "Bootstrap Python on every node (minimum Ansible can connect)"
        run: ${{ env.SCRIPTS }}/04_bootstrap_nodes.sh

      - name: "Project setup (.dockerignore + dotenv + scripts/setup.sh)"
        run: make setup

      - name: "Provision the base inventory via the canonical CLI"
        run: ${{ env.SCRIPTS }}/05_provision_inventory.sh

      - name: "Extend inventory with workers + group memberships"
        run: python3 -m utils.tests.swarm.extend_inventory

      - name: "Write runtime extras (cluster IPs + generated SSH key)"
        run: python3 -m utils.tests.swarm.write_extras

      - name: "Debug: ansible-inventory --graph + groups for swarm-mgr-01"
        run: ${{ env.SCRIPTS }}/06_debug_inventory.sh

      - name: "Deploy ${{ matrix.apps }} via cli.administration.deploy.swarm"
        run: |
          source scripts/meta/env/load.sh
          python3 -m cli.administration.deploy.swarm \
            /tmp/inv/devices.yml \
            -p /tmp/inv/.password \
            --skip-build --skip-cleanup --skip-backup \
            -e @inventories/development/swarm.yml \
            -e @/tmp/swarm-nfs-extras.yml

      - name: "Wait for ${{ matrix.apps }} stack to converge with both services Running"
        run: ${{ env.SCRIPTS }}/07_wait_converge.sh

      - name: "Verify ${{ matrix.apps }} replicas accept routing-mesh traffic"
        run: ${{ env.SCRIPTS }}/08_verify_reachable.sh

      - name: "Seed content (pre-drain marker on NFS volume)"
        run: ${{ env.SCRIPTS }}/09_seed_content.sh

      - name: "Drain the worker running ${{ matrix.apps }} + force reschedule"
        run: ${{ env.SCRIPTS }}/10_drain_worker.sh

      - name: "Assert state survived the reschedule"
        run: ${{ env.SCRIPTS }}/11_assert_state.sh

      - name: "Collect diagnostics on failure"
        if: failure()
        run: ${{ env.SCRIPTS }}/12_collect_diagnostics.sh

      - name: "Zip generated inventory for debugging"
        if: always()
        shell: bash
        env:
          APP_ID: ${{ matrix.apps }}
        run: bash scripts/github/inventory/zip_swarm_for_upload.sh

      - name: "Upload inventory artifact"
        if: ${{ always() && !env.ACT }}
        uses: actions/upload-artifact@v7
        with:
          name: inventory-swarm-${{ matrix.apps }}
          path: /tmp/inventory-swarm-${{ matrix.apps }}.zip
          if-no-files-found: ignore

      - name: "Cleanup"
        if: always()
        run: ${{ env.SCRIPTS }}/13_cleanup.sh
