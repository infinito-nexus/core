name: "🐝 Test: Deploy (swarm)"

on:
  workflow_call:
    inputs:
      distros:
        description: "Space-separated distro list (shown in the discover job name)"
        required: false
        type: string
        default: "arch debian ubuntu fedora centos"
      whitelist:
        description: "Optional space-separated whitelist of app ids"
        required: false
        type: string
        default: ""
      lifecycles:
        description: "Lifecycle envelope for discovery (comma/space-separated). Empty: default (alpha beta rc stable)."
        required: false
        type: string
        default: ""
      blacklist:
        description: "Optional space-separated app ids to drop from discovery"
        required: false
        type: string
        default: ""
      marker:
        description: "Optional suffix appended to the discover job name (e.g. ' ⭐' for the priority line)"
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      distros:
        description: "Space-separated distro list (shown in the discover job name)"
        required: false
        type: string
        default: "arch debian ubuntu fedora centos"
      whitelist:
        description: "Optional space-separated whitelist of app ids"
        required: false
        type: string
        default: ""
      lifecycles:
        description: "Lifecycle envelope for discovery (comma/space-separated). Empty: default (alpha beta rc stable)."
        required: false
        type: string
        default: ""
      blacklist:
        description: "Optional space-separated app ids to drop from discovery"
        required: false
        type: string
        default: ""

permissions:
  contents: read
  packages: read

env:
  NIX_CONFIG: |
    access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
  INFINITO_IMAGE_TAG: ci-${{ github.sha }}
  INFINITO_GHCR_MIRROR_PREFIX: mirror
  INFINITO_APP_DISCOVERY_RUNNER: host
  INFINITO_DEPLOY_MODE: swarm
  INFINITO_LIFECYCLES: ${{ inputs.lifecycles }}
  INFINITO_BLACKLIST: ${{ inputs.blacklist }}

jobs:
  discover:
    name: 🚢 Swarm (${{ inputs.distros }})${{ inputs.marker }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      apps: ${{ steps.discover.outputs.apps }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: 🔍 Resolve repository owner
        shell: bash
        run: |
          set -euo pipefail
          echo "GITHUB_REPOSITORY_OWNER=$(scripts/meta/resolve/repository/owner.sh)" >> "$GITHUB_ENV"

      - name: 📦 Install jq
        shell: bash
        run: ./scripts/install/apt.sh jq

      - name: 📦 Install deps (jq + envsubst)
        shell: bash
        run: ./scripts/install/apt.sh jq gettext-base

      - name: 🔧 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: 📦 Install project (host venv)
        shell: bash
        run: |
          make install-force
          # shellcheck source=/dev/null
          source scripts/meta/env/load.sh
          echo "${VENV}/bin" >> "${GITHUB_PATH}"

      - name: 🔍 Resolve effective whitelist (diff vs origin/main)
        id: resolve_wl
        shell: bash
        env:
          INPUT_WHITELIST: ${{ inputs.whitelist }}
        run: ./scripts/github/resolve/effective_whitelist.sh

      - name: 🔍 Discover apps
        id: discover
        shell: bash
        env:
          INFINITO_WHITELIST: ${{ steps.resolve_wl.outputs.whitelist }}
        run: ./scripts/github/resolve/output_apps.sh

  swarm:
    name: "🐝 ${{ matrix.apps }}${{ matrix.variant && format(' {0}',matrix.variant) || '' }}"
    if: needs.discover.outputs.apps != '' && needs.discover.outputs.apps != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 345
    needs: discover

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.apps) }}

    env:
      APP_ID: ${{ matrix.apps }}
      RESCHED_TIMEOUT: "120"
      SCRIPTS: scripts/tests/deploy/swarm/routine

    steps:
      - name: 🧹 Free disk space
        if: ${{ !env.ACT }}
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: "⬇️ Checkout"
        if: ${{ !env.ACT }}
        uses: actions/checkout@v7

      - name: 💾 Enlarge swap space
        if: ${{ !env.ACT }}
        shell: bash
        run: ./scripts/github/runner/enlarge_swap.sh

      - name: "🔍 Resolve SWARM_NAME (mandatory; default to the matrix app)"
        shell: bash
        run: echo "SWARM_NAME=${SWARM_NAME:-${{ matrix.apps }}}" >> "$GITHUB_ENV"

      - name: "📥 Load swarm topology SPOT into job env"
        shell: bash
        run: scripts/tests/deploy/swarm/utils/topology/export.sh

      - name: 🔧 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: 📦 Install project (host venv)
        shell: bash
        run: |
          make install-force
          # shellcheck source=/dev/null
          source scripts/meta/env/load.sh
          echo "${VENV}/bin" >> "${GITHUB_PATH}"

      - name: "🥾 Bring up + bootstrap the simulated cluster (compose up, IPs, lab DNS)"
        run: ${{ env.SCRIPTS }}/01_bootstrap.sh

      - name: "🔧 Project setup (.dockerignore + dotenv + scripts/setup.sh)"
        run: make setup

      - name: "🚀 Matrix-deploy ${{ matrix.apps }}: provision/deploy/e2e/verify per round"
        timeout-minutes: 345
        shell: bash
        env:
          variant: ${{ matrix.variant }}
        run: |
          source scripts/meta/env/load.sh
          if [ "$(id -u)" -eq 0 ]; then
            python3 -m utils.tests.swarm.matrix 2>&1 | tee "/tmp/ansible-${{ matrix.apps }}.log"
          else
            sudo -E env "PATH=$PATH" "HOME=$HOME" "SWARM_NAME=${SWARM_NAME:-}" "variant=${variant:-}" "disable=${disable:-}" python3 -m utils.tests.swarm.matrix 2>&1 | tee "/tmp/ansible-${{ matrix.apps }}.log"
          fi

      - name: "📊 Role runtimes"
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          log="/tmp/ansible-${{ matrix.apps }}.log"
          if [ ! -f "${log}" ]; then
            echo "No ansible log at ${log}; deploy never started."
            exit 0
          fi
          python3 -m cli.meta.ci.roles.runtime "${log}" \
            --format csv --output "/tmp/role-runtimes-${{ matrix.apps }}.csv"
          python3 -m cli.meta.ci.roles.runtime "/tmp/role-runtimes-${{ matrix.apps }}.csv" \
            --format markdown >> "$GITHUB_STEP_SUMMARY"

      - name: "⬆️ Upload role runtimes CSV"
        if: ${{ always() && !env.ACT }}
        uses: actions/upload-artifact@v7
        with:
          name: role-runtimes-swarm-${{ matrix.apps }}${{ matrix.variant_slug && format('-{0}', matrix.variant_slug) || '' }}
          path: /tmp/role-runtimes-${{ matrix.apps }}.csv
          if-no-files-found: ignore

      - name: "🌱 Seed content (pre-drain marker on NFS volume)"
        run: ${{ env.SCRIPTS }}/05_seed_content.sh

      - name: "💪 Drain the worker running ${{ matrix.apps }} + force reschedule"
        run: ${{ env.SCRIPTS }}/06_drain_worker.sh

      - name: "✅ Assert state survived the reschedule"
        run: ${{ env.SCRIPTS }}/07_assert_state.sh

      - name: "🩺 Collect rescue diagnostics (recursive DiD snapshot)"
        if: failure()
        timeout-minutes: 25
        shell: bash
        run: |
          INFINITO_RESCUE_DIAGNOSTICS_DIR="/tmp/rescue-diagnostics/${{ matrix.apps }}" \
            python3 utils/diagnostics/container.py \
            "${{ matrix.apps }}" "post-deploy failure" || true

      - name: "⬆️ Upload rescue diagnostics"
        if: ${{ always() && !env.ACT }}
        uses: actions/upload-artifact@v7
        with:
          name: rescue-diagnostics-swarm-${{ matrix.apps }}${{ matrix.variant_slug && format('-{0}', matrix.variant_slug) || '' }}
          path: /tmp/rescue-diagnostics/
          if-no-files-found: ignore

      - name: "📊 Collect diagnostics on failure"
        if: failure()
        timeout-minutes: 15
        run: scripts/tests/deploy/swarm/utils/collect/diagnostics.sh

      - name: "🗜️ Zip generated inventory for debugging"
        if: always()
        shell: bash
        env:
          APP_ID: ${{ matrix.apps }}
        run: bash scripts/github/inventory/zip/swarm_for_upload.sh

      - name: "⬆️ Upload inventory artifact"
        if: ${{ always() && !env.ACT }}
        uses: actions/upload-artifact@v7
        with:
          name: inventory-swarm-${{ matrix.apps }}
          path: /tmp/inventory-swarm-${{ matrix.apps }}.zip
          if-no-files-found: ignore

      - name: "📊 Collect Playwright reports from the manager"
        if: always()
        timeout-minutes: 15
        shell: bash
        env:
          APP_ID: ${{ matrix.apps }}
        run: scripts/tests/deploy/swarm/utils/collect/playwright_reports.sh

      - name: "🕸️ Swarm structure summary"
        if: always()
        shell: bash
        run: scripts/tests/deploy/swarm/utils/collect/topology_summary.sh

      - name: "📋 Playwright step summary"
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          python3 utils/github/playwright_summary.py \
            /tmp/playwright-artifacts \
            "${{ matrix.apps }}" \
            >> "$GITHUB_STEP_SUMMARY"

      - name: "⬆️ Upload Playwright artifacts"
        if: ${{ always() && !env.ACT }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-swarm-${{ matrix.apps }}${{ matrix.variant_slug && format('-{0}', matrix.variant_slug) || '' }}
          path: /tmp/playwright-artifacts/
          if-no-files-found: ignore

      - name: "🧹 Cleanup"
        if: always()
        timeout-minutes: 15
        run: scripts/tests/deploy/swarm/utils/clean/teardown.sh
