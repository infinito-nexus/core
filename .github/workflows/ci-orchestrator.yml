name: "🎵 CI: Orchestrator"
on:
  workflow_call:
    inputs:
      distros:
        description: "Space-separated distro list"
        required: false
        type: string
        default: "arch debian ubuntu fedora centos"
      whitelist:
        description: "Optional space-separated whitelist of app ids"
        required: false
        type: string
        default: ""
      lifecycles:
        description: "Lifecycle envelope for test-deploy discovery (comma/space-separated)."
        required: false
        type: string
        default: ""
      modes:
        description: "Deploy modes to run (space-separated: 'swarm compose host'). Only listed modes run their deploy job."
        required: false
        type: string
        default: "swarm compose host"
      priority:
        description: "Optional space-separated app ids for the priority line: deployed first in every mode; the regular line runs the remaining roles only after every priority job succeeded."
        required: false
        type: string
        default: ""
      image_wait_attempts:
        description: "Polling attempts for waiting on prebuilt or mirrored images"
        required: false
        type: string
        default: "1980"
      image_wait_sleep_seconds:
        description: "Polling interval in seconds for waiting on prebuilt or mirrored images"
        required: false
        type: string
        default: "10"
      roles_only:
        description: "When 'true', skip the env-matrix test-development job."
        required: false
        type: string
        default: "false"
      trusted_pr:
        description: "True when the PR carries the maintainer '🛡️ Trusted' label; skips the fork-prereq wait."
        required: false
        type: boolean
        default: false

concurrency:
  group: infinito-test-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: read
  packages: write
  security-events: write

jobs:
  wait-fork-prereq-run:
    name: ⏳ Wait for fork run
    runs-on: ubuntu-latest
    env:
      WAIT_REQUIRED: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository && !inputs.trusted_pr }}
    steps:
      - name: 🏷️ Mark fork prerequisites as ready outside fork PRs or for trusted PRs
        if: ${{ env.WAIT_REQUIRED != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Fork prerequisites are implicitly ready (non-fork PR or '🛡️ Trusted' label)."

      - name: ⬇️ Checkout trusted workflow repo (helpers)
        if: ${{ env.WAIT_REQUIRED == 'true' }}
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: 🔑 Login to GHCR for CI image checks
        if: ${{ env.WAIT_REQUIRED == 'true' }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: ⏳ Wait for privileged fork CI images
        if: ${{ env.WAIT_REQUIRED == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_FILE: entry-pull-request-change.yml
          TARGET_EVENT: pull_request_target
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_UPDATED_AT: ${{ github.event.pull_request.updated_at }}
          INFINITO_DISTROS: "arch debian ubuntu fedora centos"
          IMAGE_TAG: ci-${{ github.sha }}
          WAIT_ATTEMPTS: ${{ inputs.image_wait_attempts }}
          WAIT_SLEEP_SECONDS: ${{ inputs.image_wait_sleep_seconds }}
        run: ./scripts/meta/wait/images.sh

  fork-prereqs-ready:
    name: 🚦 Gate Dependencies
    needs: wait-fork-prereq-run
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: ✅ Assert privileged prerequisites are ready
        shell: bash
        env:
          RESULT: ${{ needs.wait-fork-prereq-run.result }}
        run: ./scripts/github/gate/fork_prereqs.sh

  security-codeql:
    uses: ./.github/workflows/security-codeql.yml

  lint:
    uses: ./.github/workflows/lint.yml

  test:
    uses: ./.github/workflows/test.yml

  build-ci-images:
    uses: ./.github/workflows/images-build-ci.yml
    with:
      distros: "arch debian ubuntu fedora centos"
      concurrency_channel: ci-orchestrator-build-consumer
    secrets: inherit
  
  test-dns:
    needs: 
      - build-ci-images
    uses: ./.github/workflows/test-dns.yml
    with:
      distros: "arch debian ubuntu fedora centos"
  
  images-mirror-missing:
    uses: ./.github/workflows/images-mirror-missing.yml
    with:
      concurrency_channel: ci-orchestrator-mirror-consumer
      image_wait_attempts: ${{ inputs.image_wait_attempts }}
      image_wait_sleep_seconds: ${{ inputs.image_wait_sleep_seconds }}
    secrets: inherit

  test-deploy-single-node-priority:
    name: ⭐ Priority · single-node
    if: ${{ inputs.priority != '' && (contains(inputs.modes, 'compose') || contains(inputs.modes, 'host')) }}
    needs:
      - test-dns
      - images-mirror-missing
      - lint
      - test
    uses: ./.github/workflows/test-deploy-single-node.yml
    with:
      distros: ${{ inputs.distros }}
      whitelist: ${{ inputs.priority }}
      lifecycles: ${{ inputs.lifecycles }}
      modes: ${{ inputs.modes }}
      marker: " ⭐"

  test-deploy-swarm-priority:
    name: ⭐ Priority · swarm
    if: ${{ inputs.priority != '' && contains(inputs.modes, 'swarm') }}
    needs:
      - lint
      - test
      - build-ci-images
      - images-mirror-missing
    uses: ./.github/workflows/test-deploy-swarm.yml
    with:
      distros: ${{ inputs.distros }}
      whitelist: ${{ inputs.priority }}
      lifecycles: ${{ inputs.lifecycles }}
      marker: " ⭐"

  test-deploy-single-node:
    name: 🔁 Regular · single-node
    if: >-
      ${{ always()
          && (contains(inputs.modes, 'compose') || contains(inputs.modes, 'host'))
          && needs.lint.result == 'success'
          && needs.test.result == 'success'
          && needs.test-dns.result == 'success'
          && needs.images-mirror-missing.result == 'success'
          && contains(fromJSON('["success","skipped"]'), needs.test-deploy-single-node-priority.result)
          && contains(fromJSON('["success","skipped"]'), needs.test-deploy-swarm-priority.result) }}
    needs:
      - test-dns
      - images-mirror-missing
      - test-deploy-single-node-priority
      - test-deploy-swarm-priority
      - lint
      - test
    uses: ./.github/workflows/test-deploy-single-node.yml
    with:
      distros: ${{ inputs.distros }}
      whitelist: ${{ inputs.whitelist }}
      lifecycles: ${{ inputs.lifecycles }}
      modes: ${{ inputs.modes }}
      blacklist: ${{ inputs.priority }}

  test-deploy-swarm:
    name: 🔁 Regular · swarm
    if: >-
      ${{ always()
          && contains(inputs.modes, 'swarm')
          && needs.lint.result == 'success'
          && needs.test.result == 'success'
          && needs.build-ci-images.result == 'success'
          && needs.images-mirror-missing.result == 'success'
          && contains(fromJSON('["success","skipped"]'), needs.test-deploy-single-node-priority.result)
          && contains(fromJSON('["success","skipped"]'), needs.test-deploy-swarm-priority.result) }}
    needs:
      - build-ci-images
      - images-mirror-missing
      - test-deploy-single-node-priority
      - test-deploy-swarm-priority
      - lint
      - test
    uses: ./.github/workflows/test-deploy-swarm.yml
    with:
      distros: ${{ inputs.distros }}
      whitelist: ${{ inputs.whitelist }}
      lifecycles: ${{ inputs.lifecycles }}
      blacklist: ${{ inputs.priority }}

  test-runner-smoke:
    needs:
      - test-deploy-swarm
    if: ${{ always() && vars.CI_SELF_HOSTED_RUNNER_COUNT != '0' && vars.CI_SELF_HOSTED_RUNNER_COUNT != '' && (needs.test-deploy-swarm.result == 'success' || needs.test-deploy-swarm.result == 'failure') }}
    uses: ./.github/workflows/test-runner-smoke.yml
    with:
      ref: ${{ github.sha }}
    secrets: inherit

  test-install-make:
    uses: ./.github/workflows/test-install-make.yml
  test-install-pkgmgr:
    uses: ./.github/workflows/test-install-pkgmgr.yml

  test-development:
    if: ${{ inputs.roles_only != 'true' }}
    uses: ./.github/workflows/test-environment.yml
    needs:
      - images-mirror-missing
    secrets: inherit

  test-guide:
    uses: ./.github/workflows/test-guide.yml
    needs:
      - images-mirror-missing
      - build-ci-images
    secrets: inherit

  done:
    name: 🏁 Finish pipeline
    needs:
      - test-install-make
      - test-install-pkgmgr
      - test-deploy-single-node-priority
      - test-deploy-swarm-priority
      - test-deploy-single-node
      - test-deploy-swarm
      - test-runner-smoke
      - test-development
      - test-guide
      - test
      - lint
      - security-codeql
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: 🛑 Fail if any upstream job failed or was cancelled
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "Pipeline failed: at least one upstream job failed or was cancelled." >&2
          exit 1
      - name: ✅ Done
        run: echo "All checks passed."
