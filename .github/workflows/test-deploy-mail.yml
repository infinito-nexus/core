name: "📧 Test: Deploy Mail (Stalwart + Keycloak, SSO e2e)"

# Co-deploys Stalwart + Keycloak (SSO on) and runs the full mail e2e — see
# `make stalwart-e2e` and the role README.

on:
  workflow_dispatch: {}
  push:
    paths:
      - "roles/web-app-stalwart/**"
      - "roles/web-app-mailu/**"
      - "plugins/lookup/email.py"
      - ".github/workflows/test-deploy-mail.yml" # nocheck: self-path-reference

permissions:
  contents: read
  packages: read

env:
  INFINITO_DEPLOY_TYPE: "server"
  INFINITO_DISTROS: "debian"
  INFINITO_DISTRO: "debian"
  INFINITO_IMAGE_TAG: "latest"

jobs:
  mail-e2e:
    name: 🚀 Stalwart + Keycloak SSO e2e
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 🧹 Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - uses: actions/checkout@v7

      - name: 💾 Enlarge swap space
        shell: bash
        run: ./scripts/github/runner/enlarge_swap.sh

      - name: Install deps (jq + envsubst)
        shell: bash
        run: ./scripts/install/apt.sh jq gettext-base

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project (host venv)
        shell: bash
        run: make install

      - name: 📧 Deploy Stalwart + Keycloak and run the mail/SSO e2e
        shell: bash
        run: make stalwart-e2e

      - name: 🩺 Dump runner state (on failure)
        if: failure()
        shell: bash
        run: ./scripts/github/runner/dump_state.sh "mail e2e failure"
