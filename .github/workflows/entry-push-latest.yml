name: "⚡ CI: Push"

concurrency:
  group: global-ci-${{ github.repository }}-${{ github.ref_name }}
  cancel-in-progress: ${{ vars.CI_CANCEL_IN_PROGRESS != 'false' }}

on:
  push:
    branches:
      - main
      - "feature/**"
      - "hotfix/**"
      - "fix/**"
      - "update/**"
      - "chore/**"
      - "alert-autofix-*"

permissions:
  contents: write
  packages: write
  actions: write
  security-events: write

jobs:
  sync-main:
    name: 🔄 Sync main
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: 🔄 Sync main from source repository
        shell: bash
        env:
          CI_SYNC_MAIN_SOURCE_REPOSITORY_DEFAULT: infinito-nexus/core
          CI_SYNC_MAIN_SOURCE_REPOSITORY: ${{ vars.CI_SYNC_MAIN_SOURCE_REPOSITORY }}
          CI_SYNC_MAIN_SOURCE_REPOSITORY_IS_SET: ${{ contains(toJSON(vars), '"CI_SYNC_MAIN_SOURCE_REPOSITORY"') }}
        run: ./scripts/github/sync/main_from_repository.sh

  run-policy:
    name: 🧭 Decide CI policy
    needs: sync-main
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
      skip_reason: ${{ steps.decide.outputs.skip_reason }}
      commit_in_main: ${{ steps.decide.outputs.commit_in_main }}
    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: ⬇️ Fetch main
        if: github.event.created == true
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main:refs/remotes/origin/main --force

      - name: 🤔 Decide whether CI should run for this push
        id: decide
        env:
          GITHUB_EVENT_CREATED: ${{ github.event.created }}
          CI_RUN_ON_MAIN: ${{ vars.CI_RUN_ON_MAIN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: bash scripts/meta/resolve/push_ci_policy.sh

  skip-ci:
    name: ⏭️ Skip CI
    needs: run-policy
    if: needs.run-policy.outputs.should_run != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: ⏭️ Explain skip
        shell: bash
        run: |
          set -euo pipefail
          echo "Skipping CI for commit ${GITHUB_SHA}."
          echo "Reason: ${{ needs.run-policy.outputs.skip_reason }}"

  pick-distro:
    if: needs.run-policy.outputs.should_run == 'true'
    needs: run-policy
    name: 🎲 Pick distro(s)
    runs-on: ubuntu-latest
    outputs:
      distros: ${{ steps.pick.outputs.distros }}
      is_version: ${{ steps.pick.outputs.is_version }}
      version_tag: ${{ steps.pick.outputs.version_tag }}
    steps:
      - name: ⬇️ Checkout (with tags)
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - id: pick
        shell: bash
        run: bash scripts/github/resolve/pick_distro.sh

  resolve-priority:
    if: needs.run-policy.outputs.should_run == 'true'
    name: ⭐ Resolve new-role priority
    needs: run-policy
    runs-on: ubuntu-latest
    outputs:
      priority: ${{ steps.resolve.outputs.priority }}
    steps:
      - name: ⬇️ Checkout (full history)
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - id: resolve
        shell: bash
        run: |
          set -euo pipefail
          echo "priority=$(bash scripts/meta/resolve/diff/new_roles.sh)" >> "$GITHUB_OUTPUT"

  ci-orchestrator:
    if: needs.run-policy.outputs.should_run == 'true'
    name: 🎶 Orchestrate CI
    needs:
      - run-policy
      - pick-distro
      - resolve-priority
    uses: ./.github/workflows/ci-orchestrator.yml
    with:
      distros: ${{ needs.pick-distro.outputs.distros }}
      priority: ${{ needs.resolve-priority.outputs.priority }}
    secrets: inherit

  release-guard:
    name: "🛡️ Guard release"
    if: needs.run-policy.outputs.should_run == 'true' && needs.pick-distro.outputs.is_version == 'true'
    needs:
      - run-policy
      - pick-distro
      - ci-orchestrator
    runs-on: ubuntu-latest
    outputs:
      allowed: ${{ steps.guard.outputs.allowed }}
    steps:
      - name: ⬇️ Checkout (with full history)
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: ⬇️ Fetch main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main:refs/remotes/origin/main --force

      - name: "🛡️ Guard: tag commit must be contained in origin/main"
        id: guard
        shell: bash
        env:
          VERSION_TAG: ${{ needs.pick-distro.outputs.version_tag }}
        run: bash scripts/github/release/guard.sh

  release-version:
    name: 🚀 Release version
    needs:
      - run-policy
      - pick-distro
      - release-guard
    if: needs.run-policy.outputs.should_run == 'true' && needs.release-guard.outputs.allowed == 'true'
    uses: ./.github/workflows/release-version.yml
    with:
      tag: ${{ needs.pick-distro.outputs.version_tag }}
    secrets: inherit
