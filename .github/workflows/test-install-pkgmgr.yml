name: "📦 Test: Install Package Manager"

on:
  workflow_call:

permissions:
  actions: write
  contents: read
  packages: read

jobs:
  test-install-pkgmgr:
    name: 📦 PKGMGR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NIX_CONFIG: |
        access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v7.0.0

      - name: 🔍 Resolve INFINITO_VENV_DIR from default.env
        run: |
          venv_dir="$(awk -F= '/^INFINITO_VENV_DIR=/{print $2; exit}' default.env)"
          test -n "${venv_dir}" || { echo "INFINITO_VENV_DIR not found in default.env" >&2; exit 1; }
          echo "INFINITO_VENV_DIR=${venv_dir}" >> "$GITHUB_ENV"

      - name: 📦 Install & test in every pkgmgr virgin container (parallel)
        run: ./scripts/tests/install/pkgmgr.sh
