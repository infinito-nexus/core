name: "📖 Test: Guide"

on:
  workflow_call:
    inputs:
      role:
        description: "Role to test; empty picks one at random"
        required: false
        type: string
        default: ""
      priority:
        description: "Space-separated app ids; a random one is preferred over whitelist"
        required: false
        type: string
        default: ""
      whitelist:
        description: "Space-separated app ids; a random one is used when no role or priority is given"
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      role:
        description: "Role to test; empty picks one at random"
        required: false
        type: string
        default: ""
      priority:
        description: "Space-separated app ids; a random one is preferred over whitelist"
        required: false
        type: string
        default: ""
      whitelist:
        description: "Space-separated app ids; a random one is used when no role or priority is given"
        required: false
        type: string
        default: ""

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    name: 📖 Guide
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      INFINITO_IMAGE_TAG: ci-${{ github.sha }}
      INFINITO_DISTROS: "arch debian ubuntu fedora centos"
    steps:
      - uses: actions/checkout@v7.0.0

      - name: 🎲 Select the role, distro, and deploy mode
        shell: bash
        run: |
          set -euo pipefail
          python3 -m cli.meta.ci.guide_select \
            --role "${{ inputs.role }}" \
            --priority "${{ inputs.priority }}" \
            --whitelist "${{ inputs.whitelist }}" | tee -a "$GITHUB_ENV"

      - name: 🔑 Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🖥️ Install a host role inside its pkgmgr distro container
        if: ${{ env.GUIDE_MODE == 'host' }}
        shell: bash
        run: bash scripts/github/guide/host_deploy.sh

      - name: 🖥️ Boot the systemd server for a compose role
        if: ${{ env.GUIDE_MODE == 'compose' }}
        shell: bash
        run: |
          set -euo pipefail
          INFINITO_IMAGE="ghcr.io/$(scripts/meta/resolve/repository/owner.sh)/$(scripts/meta/resolve/repository/name.sh)/${INFINITO_DISTRO}:ci-${{ github.sha }}"
          echo "INFINITO_IMAGE=${INFINITO_IMAGE}" >> "$GITHUB_ENV"
          export INFINITO_IMAGE
          make compose-up

      - name: 🚀 Deploy the compose role against the server
        if: ${{ env.GUIDE_MODE == 'compose' }}
        shell: bash
        run: |
          set -euo pipefail
          awk '/^### Production$/{p=1} p && /^```bash$/{c=1; next} c && /^```$/{exit} c' \
            "roles/${GUIDE_ROLE}/README.md" > /tmp/deploy.sh
          # Exception: the deploy configures systemd units, so its body must run
          # inside the real systemd server the compose stack boots, never a
          # bash-only control container; extract the `bash -c` payload verbatim.
          perl -0777 -ne "print \$1 if /bash -c '(.*)'/s" /tmp/deploy.sh > /tmp/payload.sh
          test -s /tmp/payload.sh
          source scripts/meta/env/load.sh
          docker exec -i -e APP="$GUIDE_ROLE" -e HOST=localhost \
            "${INFINITO_CONTAINER}" bash -s < /tmp/payload.sh
