name: "⚡ CI: Manual"
run-name: "Manual CI triggered: ${{ inputs.distros }}; ${{ inputs.priority != '' && format('{0} ⭐; ', inputs.priority) || '' }}${{ inputs.whitelist != '' && inputs.whitelist || 'diff-derived (origin/main)' }}"

concurrency:
  group: global-ci-${{ github.repository }}-${{ github.ref_name }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      distros:
        description: "Space-separated distro list (overrides default). Example: 'arch debian'"
        required: false
        default: "debian"
        type: string
      whitelist:
        description: "Empty: diff vs origin/main. '__ALL__': force full deploy. Else: explicit space-separated app ids."
        required: false
        default: ""
        type: string
      test_migration:
        description: "Run the opt-in mail-provider migration scenario (Mailu → Stalwart)."
        required: false
        default: false
        type: boolean
      lifecycles:
        description: "Lifecycle envelope for test-deploy discovery (comma/space-separated)."
        required: false
        default: ""
        type: string
      modes:
        description: "Deploy modes to test (space-separated: 'swarm compose host'). Only the listed modes run their deploy job."
        required: false
        default: "swarm compose host"
        type: string
      priority:
        description: "Optional space-separated app ids for the priority line: deployed first in every mode; the regular line runs the remaining roles only after every priority job succeeded."
        required: false
        default: ""
        type: string

permissions:
  contents: read
  packages: write
  security-events: write
  actions: write

jobs:
  ci-orchestrator:
    name: 🎛️ Orchestrate CI (manual)
    uses: ./.github/workflows/ci-orchestrator.yml
    with:
      distros: ${{ inputs.distros }}
      whitelist: ${{ inputs.whitelist }}
      lifecycles: ${{ inputs.lifecycles }}
      modes: ${{ inputs.modes }}
      priority: ${{ inputs.priority }}
      roles_only: ${{ (inputs.priority != '' || (inputs.whitelist != '' && inputs.whitelist != '__ALL__')) && 'true' || 'false' }}
      test_migration: ${{ inputs.test_migration && 'true' || 'false' }}
    secrets: inherit
