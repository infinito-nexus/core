name: "🧹 Lint"

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: 🧹 Lint
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      INFINITO_LINT_RUNNER: host
    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v7.0.0

      - name: 🔧 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: 🧹 Run all lint checks via make
        shell: bash
        run: |
          set -euo pipefail
          make lint 2>&1 | tee /tmp/lint-output.txt

      - name: 🔨 Build step summary from annotations
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          python3 -m utils.annotations.summarize /tmp/lint-output.txt "Lint Annotation Summary"
