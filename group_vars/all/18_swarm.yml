---
DEPLOYMENT_MODE: "{{ 'swarm' if 'svc-docker-swarm' in group_names else 'compose' }}"

service_is_stateful: false

swarm:
  manager:
    advertise_addr: ""
  network:
    encryption: true
  registry:
    host: "{{ (groups['svc-docker-swarm-manager'] | default([]))[0] | default('') }}"
    port: 5000

SWARM_REGISTRY_PREFIX: >-
  {{
    (swarm.registry.host ~ ':' ~ swarm.registry.port ~ '/')
    if (
      DEPLOYMENT_MODE == 'swarm'
      and (swarm.registry.host | length > 0)
    )
    else ''
  }}
