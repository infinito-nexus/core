---
default_install_hook_types:
  - pre-commit
  - pre-merge-commit
  - pre-push

repos:
  - repo: local
    hooks:
      - id: make-test
        name: Run make test
        entry: make test
        language: system
        pass_filenames: false
        stages:
          - pre-commit
      - id: make-test-merge-signed
        name: Run make test-merge-signed (pre-merge-commit gate)
        entry: make test-merge-signed
        language: system
        pass_filenames: false
        always_run: true
        stages:
          - pre-merge-commit
      - id: make-lint
        name: Run make lint (pre-push gate)
        entry: make lint
        language: system
        pass_filenames: false
        always_run: true
        stages:
          - pre-push
      - id: make-test-main-merged
        name: Run make test-main-merged (pre-push gate)
        entry: make test-main-merged
        language: system
        pass_filenames: false
        always_run: true
        stages:
          - pre-push
      - id: make-test-signed
        name: Run make test-signed (pre-push gate)
        entry: make test-signed
        language: system
        pass_filenames: false
        always_run: true
        stages:
          - pre-push
