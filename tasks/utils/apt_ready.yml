---
- name: "🧯 Neutralize apt-daily in the ephemeral deploy container"
  when: DOCKER_IN_CONTAINER | bool
  block:
    - name: "🛑 Stop apt-daily timers"
      ansible.builtin.systemd:
        name: "{{ apt_timer }}"
        state: stopped
        enabled: false
      loop:
        - apt-daily.timer
        - apt-daily-upgrade.timer
      loop_control:
        loop_var: apt_timer

    - name: "🔪 Stop apt-daily services so no in-flight background apt keeps the dpkg lock"
      ansible.builtin.systemd:
        name: "{{ apt_service }}"
        state: stopped
      loop:
        - apt-daily.service
        - apt-daily-upgrade.service
      loop_control:
        loop_var: apt_service

    - name: "🚫 Mask apt-daily units to block any background-apt re-trigger"
      ansible.builtin.systemd:
        name: "{{ apt_unit }}"
        masked: true
      loop:
        - apt-daily.timer
        - apt-daily-upgrade.timer
        - apt-daily.service
        - apt-daily-upgrade.service
      loop_control:
        loop_var: apt_unit

- name: "⏳ Wait for the dpkg lock"
  ansible.builtin.command:
    argv:
      - apt-get
      - -q
      - -o
      - DPkg::Lock::Timeout=600
      - check
  changed_when: false
  timeout: "{{ lookup('timeout', 660) | int }}"
